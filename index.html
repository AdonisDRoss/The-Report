        this.vehicleSparkGraphics = this.add.graphics().setDepth(82);
        try { this.vehicleSparkGraphics.setBlendMode(Phaser.BlendModes.ADD); }
        catch (e) { try { this.vehicleSparkGraphics.setBlendMode('ADD'); } catch (_) {} }
      }
      if (!this.vehicleDamageGraphics) this.vehicleDamageGraphics = this.add.graphics().setDepth(39);
      if (!this.vehicleSparks) this.vehicleSparks = [];
      if (!this.carDamageRuntime) this.carDamageRuntime = {
        health: 100, frontCrumple: 0, rearCrumple: 0, leftDent: 0, rightDent: 0, windshieldShattered: false
      };
    };

    GameScene.prototype.spawnVehicleSparks = function(x, y, count, biasAngle = null) {
      this.ensureVehicleDamageEffects();
      count = Phaser.Math.Clamp(count | 0, 2, 36);
      for (let i = 0; i < count; i++) {
        const a = Number.isFinite(biasAngle) ? biasAngle + Phaser.Math.FloatBetween(-1.25, 1.25) : Phaser.Math.FloatBetween(0, Math.PI * 2);
        const s = Phaser.Math.FloatBetween(90, 280);
        this.vehicleSparks.push({
          x, y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          life: Phaser.Math.FloatBetween(0.22, 0.55),
          maxLife: 0.55,
          color: Math.random() > 0.35 ? 0xffaa20 : 0xff3b12
        });
      }
      if (this.vehicleSparks.length > 180) this.vehicleSparks.splice(0, this.vehicleSparks.length - 180);
    };

    GameScene.prototype.applyVehicleDamageRuntime = function(vehicle, impactForce, contactAngle, isPlayer = false) {
      this.ensureVehicleDamageEffects();
      if (impactForce < 90 || !vehicle) return;

      const dmg = vehicle.damageRuntime || (vehicle.damageRuntime = {
        health: 100, frontCrumple: 0, rearCrumple: 0, leftDent: 0, rightDent: 0, windshieldShattered: false
      });

      dmg.health = Math.max(0, dmg.health - impactForce * 0.018);
      const heading = vehicle.heading || 0;
      let rel = rhAngleWrap(contactAngle - heading);
      const add = impactForce * 0.012;

      if (rel > -Math.PI / 4 && rel <= Math.PI / 4) {
        dmg.frontCrumple = Math.min(15, dmg.frontCrumple + add);
        if (impactForce > 260) dmg.windshieldShattered = true;
      } else if (rel > Math.PI / 4 && rel <= 3 * Math.PI / 4) {
        dmg.rightDent = Math.min(10, dmg.rightDent + add);
      } else if (rel > -3 * Math.PI / 4 && rel <= -Math.PI / 4) {
        dmg.leftDent = Math.min(10, dmg.leftDent + add);
      } else {
        dmg.rearCrumple = Math.min(12, dmg.rearCrumple + add);
      }

      if (isPlayer) {
        this.carDamageRuntime = dmg;
        GAME.car.damage = Math.min(100, Math.max(GAME.car.damage || 0, 100 - Math.round(dmg.health)));
      }
    };

    GameScene.prototype.drawVehicleDamageMarker = function(g, x, y, heading, profile, damage) {
      if (!damage) return;
      const maxD = Math.max(damage.frontCrumple || 0, damage.rearCrumple || 0, damage.leftDent || 0, damage.rightDent || 0);
      if (maxD <= 0.2 && !damage.windshieldShattered) return;

      const fw = { x: Math.cos(heading), y: Math.sin(heading) };
      const sd = { x: Math.cos(heading + Math.PI / 2), y: Math.sin(heading + Math.PI / 2) };
      const halfH = (profile.h || 120) * 0.34;
      const halfW = (profile.w || 72) * 0.32;

      function local(lx, ly) {
        return { x: x + fw.x * lx + sd.x * ly, y: y + fw.y * lx + sd.y * ly };
      }

      g.fillStyle(0x08080a, 0.72);
      g.lineStyle(1, 0xcfd6df, 0.30);

      if (damage.frontCrumple > 0.5) {
        const p = local(halfH - 4, 0);
        g.fillEllipse(p.x, p.y, 18 + damage.frontCrumple, 6 + damage.frontCrumple * 0.25);
      }
      if (damage.rearCrumple > 0.5) {
        const p = local(-halfH + 5, 0);
        g.fillEllipse(p.x, p.y, 15 + damage.rearCrumple, 5 + damage.rearCrumple * 0.25);
      }
      if (damage.leftDent > 0.5) {
        const p = local(0, -halfW + 3);
        g.fillEllipse(p.x, p.y, 7 + damage.leftDent, 16 + damage.leftDent);
      }
      if (damage.rightDent > 0.5) {
        const p = local(0, halfW - 3);
        g.fillEllipse(p.x, p.y, 7 + damage.rightDent, 16 + damage.rightDent);
      }
      if (damage.windshieldShattered) {
        const p = local(halfH * 0.36, 0);
        g.lineStyle(1, 0xe8f6ff, 0.85);
        for (let i = 0; i < 7; i++) {
          const a = heading + Phaser.Math.FloatBetween(-2.8, 2.8);
          g.strokeLineShape(new Phaser.Geom.Line(p.x, p.y, p.x + Math.cos(a) * Phaser.Math.Between(5, 14), p.y + Math.sin(a) * Phaser.Math.Between(5, 14)));
        }
      }
    };

    GameScene.prototype.updateAndRenderVehicleDamageEffects = function(dt) {
      this.ensureVehicleDamageEffects();

      const dg = this.vehicleDamageGraphics;
      dg.clear();

      if (this.car) {
        this.drawVehicleDamageMarker(dg, this.car.x, this.car.y, this.car.heading || 0, rhGetVehiclePhysicsProfile('meridian_sentinel_lx'), this.car.damageRuntime || this.carDamageRuntime);
      }
      if (this.trafficCars?.length) {
        for (const car of this.trafficCars) {
          if (!car?.body || !car.damageRuntime) continue;
          this.drawVehicleDamageMarker(dg, car.body.x, car.body.y, car.heading || 0, rhGetVehiclePhysicsProfile(car.vehicleKey), car.damageRuntime);
        }
      }

      const sg = this.vehicleSparkGraphics;
      sg.clear();
      if (!this.vehicleSparks?.length) return;

      for (let i = this.vehicleSparks.length - 1; i >= 0; i--) {
        const p = this.vehicleSparks[i];
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= Math.pow(0.82, dt * 60);
        p.vy *= Math.pow(0.82, dt * 60);

        if (p.life <= 0) {
          this.vehicleSparks.splice(i, 1);
          continue;
        }
        const a = Phaser.Math.Clamp(p.life / p.maxLife, 0, 1);
        sg.fillStyle(p.color, a);
        sg.fillRect(p.x - 1.5, p.y - 1.5, 3, 3);
      }
    };

    GameScene.prototype.processPlayerTrafficBumperCollisions = function(dt) {
      if (!this.inCar || !this.car || !this.trafficCars?.length) return;
      const player = this.car;
      const pMass = PLAYER_CAR_HEAVY_HANDLING?.mass || 1850;
      const pvx = player.velocityX ?? player.vx ?? 0;
      const pvy = player.velocityY ?? player.vy ?? 0;
      const pProfile = rhGetVehiclePhysicsProfile('meridian_sentinel_lx');

      for (const other of this.trafficCars) {
        if (!other?.body) continue;
        const oProfile = rhGetVehiclePhysicsProfile(other.vehicleKey);
        const oxv = (other.bumpVX || 0) + Math.cos(other.heading || 0) * (other.speed || 0);
        const oyv = (other.bumpVY || 0) + Math.sin(other.heading || 0) * (other.speed || 0);

        const dx = other.body.x - player.x;
        const dy = other.body.y - player.y;
        const dist = Math.max(0.001, Math.hypot(dx, dy));
        const minDist = ((pProfile.w || 80) + (oProfile.w || 72)) * 0.28 + ((pProfile.h || 132) + (oProfile.h || 120)) * 0.12;

        if (dist >= minDist) continue;

        const nx = dx / dist, ny = dy / dist;
        const overlap = minDist - dist;
        const oMass = oProfile.mass || 1500;
        const totalMass = pMass + oMass;

        // Separate by inverse mass: lighter vehicle moves more.
        player.x -= nx * overlap * (oMass / totalMass) * 0.55;
        player.y -= ny * overlap * (oMass / totalMass) * 0.55;
        other.body.x += nx * overlap * (pMass / totalMass) * 0.90;
        other.body.y += ny * overlap * (pMass / totalMass) * 0.90;

        const relVX = pvx - oxv;
        const relVY = pvy - oyv;
        const speedAlongNormal = relVX * nx + relVY * ny;
        if (speedAlongNormal <= 18) continue;

        const restitution = 0.36;
        const impulse = ((1 + restitution) * speedAlongNormal) / (1 / pMass + 1 / oMass);
        const pDelta = impulse / pMass;
        const oDelta = impulse / oMass;

        player.velocityX = pvx - pDelta * nx;
        player.velocityY = pvy - pDelta * ny;
        player.vx = player.velocityX;
        player.vy = player.velocityY;
        player.speed = (player.speed || 0) * 0.72;
        player.angularVelocity = (player.angularVelocity || 0) - (nx * Math.sin(player.heading || 0) - ny * Math.cos(player.heading || 0)) * 0.65;

        other.bumpVX = (other.bumpVX || 0) + oDelta * nx * 1.25;
        other.bumpVY = (other.bumpVY || 0) + oDelta * ny * 1.25;
        other.bumpTimer = Math.max(other.bumpTimer || 0, 0.75);
        other.angularVelocity = (other.angularVelocity || 0) + Phaser.Math.Clamp((pMass / oMass) * 0.55, -1.25, 1.25) * (Math.random() > 0.5 ? 1 : -1);
        other.waitTimer = Math.max(other.waitTimer || 0, 350);

        const force = Math.abs(impulse) / 900;
        const cx = player.x + nx * (pProfile.h || 120) * 0.27;
        const cy = player.y + ny * (pProfile.h || 120) * 0.27;

        this.spawnVehicleSparks(cx, cy, Math.round(Phaser.Math.Clamp(force / 2.5, 4, 30)), Math.atan2(ny, nx));
        this.applyVehicleDamageRuntime(player, force, Math.atan2(ny, nx) + Math.PI, true);
        this.applyVehicleDamageRuntime(other, force, Math.atan2(ny, nx), false);

        if (force > 135) {
          this.cameras.main.shake(110, Phaser.Math.Clamp(force * 0.00008, 0.006, 0.032));
        }
      }
    };

    const __vdOldUpdateTrafficCars = GameScene.prototype.updateTrafficCars;
    GameScene.prototype.updateTrafficCars = function(delta = 16) {
      // First let the existing road-node AI do its route selection/yielding.
      if (typeof __vdOldUpdateTrafficCars === 'function') __vdOldUpdateTrafficCars.call(this, delta);

      if (!this.trafficCars?.length) return;
      const dt = (delta > 1 ? delta / 1000 : delta) || 0.016;

      for (const car of this.trafficCars) {
        if (!car?.body) continue;

        // Waypoint steering smoothing layered over existing node target.
        const target = RH_RD_PATCH_MAP?.[car.targetNodeId];
        if (target) {
          const dx = target.x - car.body.x, dy = target.y - car.body.y;
          const desiredAngle = Math.atan2(dy, dx);
          const err = rhAngleWrap(desiredAngle - (car.heading || desiredAngle));
          car.aiAngularVelocity = (car.aiAngularVelocity || 0) + Phaser.Math.Clamp(err, -0.55, 0.55) * 2.4 * dt;
          car.aiAngularVelocity *= Math.pow(0.78, dt * 60);
          car.heading = rhAngleWrap((car.heading || 0) + car.aiAngularVelocity * dt);

          // Brake into sharp turns without rewriting the route system.
          if (Math.abs(err) > 0.62 && car.speed > 38) car.speed *= Math.pow(0.965, delta / 16);
        }

        if (car.bumpTimer > 0) {
          car.bumpTimer -= dt;
          car.body.x += (car.bumpVX || 0) * dt;
          car.body.y += (car.bumpVY || 0) * dt;
          car.bumpVX *= Math.pow(0.80, dt * 60);
          car.bumpVY *= Math.pow(0.80, dt * 60);
          car.heading = rhAngleWrap((car.heading || 0) + (car.angularVelocity || 0) * dt);
          car.angularVelocity = (car.angularVelocity || 0) * Math.pow(0.80, dt * 60);
          if (car.body.body) car.body.body.setVelocity((car.bumpVX || 0), (car.bumpVY || 0));
        }

        if (car.sprite) {
          car.sprite.setPosition(car.body.x, car.body.y);
          car.sprite.setRotation((car.heading || -Math.PI / 2) + Math.PI / 2);
        }
      }
    };

    const __vdOldUpdateCar = GameScene.prototype.updateCar;
    GameScene.prototype.updateCar = function(dt) {
      if (typeof __vdOldUpdateCar === 'function') __vdOldUpdateCar.call(this, dt);
      this.addPersistentWheelSkidsForPlayer?.();
      this.flushPersistentSkidCanvas?.();
    };

    const __vdOldUpdate = GameScene.prototype.update;
    GameScene.prototype.update = function(time, delta) {
      __vdOldUpdate.call(this, time, delta);
      const dt = (delta || 16) / 1000;
      this.processPlayerTrafficBumperCollisions?.(dt);
      this.updateAndRenderVehicleDamageEffects?.(dt);
      this.flushPersistentSkidCanvas?.();
    };

    const __vdOldCreate = GameScene.prototype.create;
    GameScene.prototype.create = function() {
      __vdOldCreate.apply(this, arguments);
      this.ensurePersistentSkidCanvas?.();
      this.ensureVehicleDamageEffects?.();
    };
  }


  // MODULAR_VEHICLE_WEAPONS_RADAR_AI_PATCH_001:
  // Adds isolated projectile pipeline, AI proximity radar/evasion, and impact solver helpers.
  // Keeps the existing core loop; these are modular subsystems mounted onto GameScene.

  const VEHICLE_WEAPON_PROFILE = {
    enabled: true,
    fireKey: 'C',
    cooldownMs: 135,
    muzzleVelocity: 620,
    ttl: 0.62,
    damageValue: 12,
    tracerLength: 28,
    spread: 0.018
  };

  const VEHICLE_RADAR_PROFILE = {
    range: 165,
    spread: 0.42,
    centerRangeBoost: 1.12,
    obstacleRadiusScale: 0.70,
    debug: false
  };

  function rhVehicleRadiusForProfile(profile) {
    return Math.max(profile?.w || 72, profile?.h || 120) * 0.34;
  }

  function rhPointRectDistance(px, py, rect) {
    const cx = Phaser.Math.Clamp(px, rect.x, rect.x + rect.w);
    const cy = Phaser.Math.Clamp(py, rect.y, rect.y + rect.h);
    return Math.hypot(px - cx, py - cy);
  }

  if (typeof GameScene !== 'undefined') {
    GameScene.prototype.ensureModularVehicleSystems = function() {
      if (!this.vehicleProjectileGraphics) {
        this.vehicleProjectileGraphics = this.add.graphics().setDepth(86);
        try { this.vehicleProjectileGraphics.setBlendMode(Phaser.BlendModes.ADD); }
        catch (e) { try { this.vehicleProjectileGraphics.setBlendMode('ADD'); } catch (_) {} }
      }
      if (!this.vehicleRadarDebugGraphics) {
        this.vehicleRadarDebugGraphics = this.add.graphics().setDepth(92);
      }
      if (!this.vehicleProjectiles) this.vehicleProjectiles = [];
      if (!Number.isFinite(this.vehicleWeaponCooldown)) this.vehicleWeaponCooldown = 0;
      if (this.input?.keyboard && !this.vehicleFireKey) {
        this.vehicleFireKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.C);
      }
    };

    GameScene.prototype.deployDualTracerSalvo = function(posX, posY, angle, currentSpeed, width, height, rateLimitMs = VEHICLE_WEAPON_PROFILE.cooldownMs) {
      this.ensureModularVehicleSystems();
      if (!VEHICLE_WEAPON_PROFILE.enabled) return;
      if (this.vehicleWeaponCooldown > 0) return;

      const profile = VEHICLE_WEAPON_PROFILE;
      const frontX = posX + Math.cos(angle) * (height * 0.42);
      const frontY = posY + Math.sin(angle) * (height * 0.42);
      const lateralX = Math.cos(angle + Math.PI / 2) * (width * 0.26);
      const lateralY = Math.sin(angle + Math.PI / 2) * (width * 0.26);

      const carry = Math.max(0, Math.min(240, currentSpeed || 0));
      for (let i = 0; i < 2; i++) {
        const side = i === 0 ? 1 : -1;
        const a = angle + Phaser.Math.FloatBetween(-profile.spread, profile.spread);
        const spd = profile.muzzleVelocity + carry;
        this.vehicleProjectiles.push({
          id: `veh_round_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
          x: frontX + lateralX * side,
          y: frontY + lateralY * side,
          vx: Math.cos(a) * spd,
          vy: Math.sin(a) * spd,
          ttl: profile.ttl,
          maxTtl: profile.ttl,
          damageValue: profile.damageValue,
          owner: 'player_car'
        });
      }
      this.vehicleWeaponCooldown = rateLimitMs / 1000;
    };

    GameScene.prototype.fireVehicleWeapon = function() {
      if (!this.inCar || !this.car) return;
      this.ensureModularVehicleSystems();
      const profile = rhGetVehiclePhysicsProfile('meridian_sentinel_lx');
      const speed = Math.hypot(this.car.velocityX || this.car.vx || 0, this.car.velocityY || this.car.vy || 0);
      this.deployDualTracerSalvo(this.car.x, this.car.y, this.car.heading || 0, speed, profile.w || 80, profile.h || 132);
    };

    GameScene.prototype.updateAndRenderVehicleProjectiles = function(dt) {
      this.ensureModularVehicleSystems();
      this.vehicleWeaponCooldown = Math.max(0, (this.vehicleWeaponCooldown || 0) - dt);

      const g = this.vehicleProjectileGraphics;
      g.clear();
      if (!this.vehicleProjectiles?.length) return;

      for (let i = this.vehicleProjectiles.length - 1; i >= 0; i--) {
        const b = this.vehicleProjectiles[i];
        const oldX = b.x, oldY = b.y;
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.ttl -= dt;

        let remove = false;
        if (b.ttl <= 0 || b.x < 0 || b.y < 0 || b.x > WORLD_W || b.y > WORLD_H) remove = true;

        // Stop rounds on building collision rectangles.
        if (!remove && Array.isArray(COLLISION_RECTS)) {
          for (const r of COLLISION_RECTS) {
            if (r.type !== 'building') continue;
            if (b.x >= r.x && b.x <= r.x + r.w && b.y >= r.y && b.y <= r.y + r.h) {
              this.spawnVehicleSparks?.(b.x, b.y, 5, Math.atan2(b.vy, b.vx) + Math.PI);
              remove = true;
              break;
            }
          }
        }

        // Hit traffic vehicles.
        if (!remove && this.trafficCars?.length) {
          for (const car of this.trafficCars) {
            if (!car?.body) continue;
            const prof = rhGetVehiclePhysicsProfile(car.vehicleKey);
            const radius = rhVehicleRadiusForProfile(prof);
            if (Math.hypot(b.x - car.body.x, b.y - car.body.y) <= radius) {
              const impactAngle = Math.atan2(b.y - car.body.y, b.x - car.body.x);
              this.applyVehicleDamageRuntime?.(car, b.damageValue * 26, impactAngle, false);
              this.spawnVehicleSparks?.(b.x, b.y, 7, impactAngle);
              car.bumpVX = (car.bumpVX || 0) + Math.cos(impactAngle) * b.damageValue * 12;
              car.bumpVY = (car.bumpVY || 0) + Math.sin(impactAngle) * b.damageValue * 12;
              car.bumpTimer = Math.max(car.bumpTimer || 0, 0.22);
              remove = true;
              break;
            }
          }
        }

        if (remove) {
          this.vehicleProjectiles.splice(i, 1);
          continue;
        }

        const alpha = Phaser.Math.Clamp(b.ttl / b.maxTtl, 0, 1);
        g.lineStyle(2.5, 0xfff3a1, 0.92 * alpha);
        g.beginPath();
        g.moveTo(b.x, b.y);
        g.lineTo(b.x - Math.cos(Math.atan2(b.vy, b.vx)) * VEHICLE_WEAPON_PROFILE.tracerLength, b.y - Math.sin(Math.atan2(b.vy, b.vx)) * VEHICLE_WEAPON_PROFILE.tracerLength);
        g.strokePath();

        g.lineStyle(1, 0xff8a21, 0.55 * alpha);
        g.beginPath();
        g.moveTo(oldX, oldY);
        g.lineTo(b.x, b.y);
        g.strokePath();
      }
    };

    GameScene.prototype.assessTrafficRadarHazard = function(car) {
      if (!car?.body) return { overrideRequired: false, suggestedSteerDirection: 0, brake: false };
      const p = VEHICLE_RADAR_PROFILE;
      const angle = car.heading || 0;
      const scans = [-p.spread, 0, p.spread];

      let left = false, center = false, right = false;
      const obstacles = [];

      // Player car obstacle.
      if (this.inCar && this.car) {
        obstacles.push({
          x: this.car.x, y: this.car.y,
          width: 80, height: 132,
          radius: 72,
          type: 'player_car'
        });
      }

      // Nearby traffic obstacles.
      if (this.trafficCars?.length) {
        for (const other of this.trafficCars) {
          if (!other || other === car || !other.body) continue;
          const dx = other.body.x - car.body.x, dy = other.body.y - car.body.y;
          const d = Math.hypot(dx, dy);
          if (d > p.range + 90) continue;
          const op = rhGetVehiclePhysicsProfile(other.vehicleKey);
          obstacles.push({
            x: other.body.x, y: other.body.y,
            width: op.w || 72, height: op.h || 120,
            radius: rhVehicleRadiusForProfile(op),
            type: 'traffic'
          });
        }
      }

      // Building rectangles close ahead.
      if (Array.isArray(COLLISION_RECTS)) {
        for (const r of COLLISION_RECTS) {
          if (r.type !== 'building') continue;
          const d = rhPointRectDistance(car.body.x, car.body.y, r);
          if (d > p.range + 70) continue;
          obstacles.push({ x: r.x + r.w / 2, y: r.y + r.h / 2, width: r.w, height: r.h, rect: r, radius: Math.min(180, Math.max(r.w, r.h) * 0.45), type: 'building' });
        }
      }

      for (let si = 0; si < scans.length; si++) {
        const off = scans[si];
        const len = p.range * (off === 0 ? p.centerRangeBoost : 0.86);
        const ex = car.body.x + Math.cos(angle + off) * len;
        const ey = car.body.y + Math.sin(angle + off) * len;

        for (const ob of obstacles) {
          let hit = false;
          if (ob.rect) hit = rhPointRectDistance(ex, ey, ob.rect) < 34;
          else hit = Math.hypot(ex - ob.x, ey - ob.y) < (ob.radius || ob.width * p.obstacleRadiusScale);
          if (!hit) continue;
          if (si === 0) left = true;
          if (si === 1) center = true;
          if (si === 2) right = true;
        }
      }

      if (!(left || center || right)) return { overrideRequired: false, suggestedSteerDirection: 0, brake: false };

      let steer = 0;
      if (left && !right) steer = 1;
      else if (right && !left) steer = -1;
      else if (center) steer = 1;
      else steer = left ? 1 : -1;

      return { overrideRequired: true, suggestedSteerDirection: steer, brake: center || (left && right) };
    };

    GameScene.prototype.debugDrawTrafficRadar = function() {
      if (!this.vehicleRadarDebugGraphics) return;
      const g = this.vehicleRadarDebugGraphics;
      g.clear();
      if (!VEHICLE_RADAR_PROFILE.debug || !this.debug?.routes || !this.trafficCars?.length) return;

      g.lineStyle(1, 0x00f0ff, 0.18);
      for (const car of this.trafficCars) {
        if (!car?.body) continue;
        const angle = car.heading || 0;
        for (const off of [-VEHICLE_RADAR_PROFILE.spread, 0, VEHICLE_RADAR_PROFILE.spread]) {
          const len = VEHICLE_RADAR_PROFILE.range * (off === 0 ? VEHICLE_RADAR_PROFILE.centerRangeBoost : 0.86);
          g.beginPath();
          g.moveTo(car.body.x, car.body.y);
          g.lineTo(car.body.x + Math.cos(angle + off) * len, car.body.y + Math.sin(angle + off) * len);
          g.strokePath();
        }
      }
    };

    // Layer radar onto the already-patched AI update.
    const __modOldUpdateTrafficCars = GameScene.prototype.updateTrafficCars;
    GameScene.prototype.updateTrafficCars = function(delta = 16) {
      if (typeof __modOldUpdateTrafficCars === 'function') __modOldUpdateTrafficCars.call(this, delta);

      const dt = (delta > 1 ? delta / 1000 : delta) || 0.016;
      if (!this.trafficCars?.length) return;

      for (const car of this.trafficCars) {
        if (!car?.body) continue;
        const hazard = this.assessTrafficRadarHazard(car);
        if (!hazard.overrideRequired) continue;

        // Steering correction away from hazard; brake if center ray hit.
        car.heading = rhAngleWrap((car.heading || 0) + hazard.suggestedSteerDirection * 1.65 * dt);
        if (hazard.brake) car.speed = Math.max(0, (car.speed || 0) - (car.brake || 0.16) * delta * 1.35);
        if (car.body.body) {
          const spd = Math.max(0, car.speed || 0);
          car.body.body.setVelocity(Math.cos(car.heading) * spd, Math.sin(car.heading) * spd);
        }
        if (car.sprite) {
          car.sprite.setRotation((car.heading || -Math.PI / 2) + Math.PI / 2);
          car.sprite.setPosition(car.body.x, car.body.y);
        }
      }

      this.debugDrawTrafficRadar();
    };

    const __modOldUpdate = GameScene.prototype.update;
    GameScene.prototype.update = function(time, delta) {
      __modOldUpdate.call(this, time, delta);
      const dt = (delta || 16) / 1000;
      this.ensureModularVehicleSystems?.();

      if (this.inCar && this.vehicleFireKey && Phaser.Input.Keyboard.JustDown(this.vehicleFireKey)) {
        this.fireVehicleWeapon?.();
      }

      this.updateAndRenderVehicleProjectiles?.(dt);
    };

    const __modOldCreate = GameScene.prototype.create;
    GameScene.prototype.create = function() {
      __modOldCreate.apply(this, arguments);
      this.ensureModularVehicleSystems?.();
    };
  }


  // WEATHER_RAIN_LIGHTNING_PATCH_001:
  // Outdoor Raven Hook storm layer: heavy angled rain, lightning flash, camera shake.
  // Runs only on GameScene/outdoor city, not interiors.

  class WeatherEffectsManager {
    constructor(scene) {
      this.scene = scene;
      this.rainParticles = null;
      this.rainFallbackGraphics = null;
      this.fallbackDrops = [];
      this.windVelocityX = -180;
      this.rainFallVelocityY = 850;
      this.intensity = 14;
      this.nextLightningEvent = null;
      this.lightningKey = null;
      this.initialized = false;
    }

    initRainSystem() {
      if (this.initialized) return;
      this.initialized = true;

      const scene = this.scene;
      const texKey = 'rain_streak_runtime';

      if (!scene.textures.exists(texKey)) {
        const textureCanvas = scene.textures.createCanvas(texKey, 2, 32);
        if (textureCanvas) {
          const ctx = textureCanvas.getContext();
          const gradient = ctx.createLinearGradient(0, 0, 0, 32);
          gradient.addColorStop(0, 'rgba(255,255,255,0.04)');
          gradient.addColorStop(1, 'rgba(170,210,255,0.48)');
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, 2, 32);
          textureCanvas.refresh();
        }
      }

      try {
        this.rainParticles = scene.add.particles(0, 0, texKey, {
          x: { min: -240, max: VIEW_W + 240 },

  // Hard-fixes Malcolm's invisible car by rendering his car as a world-space image at the car physics container.
  // This bypasses any hidden child/container/placeholder state left by old 64-frame car code.

  function rhPlayerCarHardTexture(scene) {
    const key = PLAYER_CAR_SINGLE_ASSET?.key || 'meridian_sentinel_lx_top';
    const path = PLAYER_CAR_SINGLE_ASSET?.path || 'assets/vehicles_single/meridian_sentinel_lx_top.png';

    if (scene.textures.exists(key)) return key;

    scene._rhPlayerCarHardLoadQueued = scene._rhPlayerCarHardLoadQueued || false;
    if (!scene._rhPlayerCarHardLoadQueued) {
      scene._rhPlayerCarHardLoadQueued = true;
      try {
        scene.load.image(key, A(path));
        scene.load.once(`filecomplete-image-${key}`, () => {
          scene._rhPlayerCarHardLoadQueued = false;
          scene.forcePlayerCarWorldVisual?.();
        });
        scene.load.once('loaderror', () => { scene._rhPlayerCarHardLoadQueued = false; });
        if (!scene.load.isLoading()) scene.load.start();
      } catch (_) {
        scene._rhPlayerCarHardLoadQueued = false;
      }
    }

    const fb = 'meridian_sentinel_lx_top__hard_visible_fallback';
    if (!scene.textures.exists(fb)) {
      const tex = scene.textures.createCanvas(fb, 192, 192);
      const ctx = tex.getContext();
      ctx.clearRect(0, 0, 192, 192);

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.38)';
      ctx.beginPath();
      ctx.ellipse(96, 98, 40, 78, 0, 0, Math.PI * 2);
      ctx.fill();

      // Unmarked detective sedan body, readable but not skinny.
      ctx.fillStyle = '#151a21';
      ctx.strokeStyle = '#6f7f86';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.roundRect(65, 16, 62, 160, 18);
      ctx.fill();
      ctx.stroke();

      // Roof/cabin
      ctx.fillStyle = '#080b10';
      ctx.fillRect(72, 46, 48, 28);
      ctx.fillRect(73, 105, 46, 36);

      // Windshield dash red/blue lights.
      ctx.fillStyle = '#1a2028';
      ctx.fillRect(75, 47, 42, 12);
      ctx.fillStyle = '#ff2525';
      ctx.fillRect(82, 50, 10, 5);
      ctx.fillStyle = '#2868ff';
      ctx.fillRect(100, 50, 10, 5);

      // Bumpers and tires.
      ctx.fillStyle = '#0a0a0b';
      ctx.fillRect(55, 38, 10, 30);
      ctx.fillRect(127, 38, 10, 30);
      ctx.fillRect(55, 124, 10, 34);
      ctx.fillRect(127, 124, 10, 34);

      ctx.fillStyle = '#cbd2d6';
      ctx.fillRect(75, 13, 42, 4);
      ctx.fillRect(75, 175, 42, 4);

      tex.refresh();

    return fb;

    touchSensitivity: 2.15,
    touchCurve: 0.46,
    keyboardSensitivity: 1.0,

        .setScrollFactor(0)

      this.dynamicStickOuter = this.add.circle(0, 0, stick.maxRadius, 0x0b111a, 0.15).setStrokeStyle(4, 0xffffff, 0.28);
      this.dynamicStickInner = this.add.circle(0, 0, 42, 0x8ac7ff, 0.07).setStrokeStyle(2, 0x9bd4ff, 0.22);
      this.dynamicStickKnob = this.add.circle(0, 0, 22, 0x9bd4ff, 0.30).setStrokeStyle(2, 0xffffff, 0.42);

      this.dynamicStickVisual.add([this.dynamicStickOuter, this.dynamicStickInner, this.dynamicStickKnob, this.dynamicStickLabel]);

      this.updateBReverseHotfixStick = (pointer) => {
        if (!this.dynamicStickCenter) {
          this.dynamicStickCenter = { x: pointer.x, y: pointer.y };
          this.dynamicStickVisual.setPosition(pointer.x, pointer.y).setVisible(true);
        }
        let dx = pointer.x - this.dynamicStickCenter.x;
        let dy = pointer.y - this.dynamicStickCenter.y;
        const mag = Math.hypot(dx, dy);
        const r = stick.maxRadius || 96;
        if (mag > r) { dx = (dx / mag) * r; dy = (dy / mag) * r; }
        MOBILE_INPUT_STATE.driveSteerX = Phaser.Math.Clamp(dx / r, -1, 1);
        MOBILE_INPUT_STATE.driveSteerY = Phaser.Math.Clamp(dy / r, -1, 1);

        MOBILE_INPUT_STATE.carSteerY = MOBILE_INPUT_STATE.driveSteerY;

      this._bReverseHotfixUpOutsideHandler = (pointer) => this.releasePointer(pointer);

      this.input.on('pointerupoutside', this._bReverseHotfixUpOutsideHandler);

      // Spread out the diamond so B cannot overlap the reverse zone.
      //       Z lights
      //       X gas

      const baseX = VIEW_W - 124;
      const baseY = VIEW_H - 322;

        { x: baseX + 84,  y: baseY + 76,  w: 92,  h: 88, label:'A', color:0x1f4d2f, state:'driveHandbrake' },

  // HORN_POLICE_LIGHTS_AND_B_SHOOT_PATCH_001
  // In car:
  // - Tap Z/lights = toggle Malcolm's dashboard police lights.
  // - Hold Z/lights = horn.
  // - NPC police patrol strobes can be controlled by policePatrolLightsOn.
  // On foot:
  // - B shoots Malcolm's weapon unless he is close enough to enter the car.
  if (typeof GameScene !== 'undefined') {
    function rhIsPlayerPoliceVehicle(scene) {

    const __rhHornCreate = GameScene.prototype.create;
    GameScene.prototype.create = function() {

        this.keyHornLights = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Z);
      }

      if (typeof this.playerPoliceLightsOn !== 'boolean') this.playerPoliceLightsOn = false;
      if (typeof this.policePatrolLightsOn !== 'boolean') this.policePatrolLightsOn = true;

      // Route all older Z/lights aliases through this new tap/hold handler.
      this.keyHotfixLights = this.keyHornLights;
      this.keyRequestedLights = null;
      this.keyCleanLights = null;
      this.keyDriveLights = null;
      this.keyFinalLights = null;

      this.carHeadlightKey = null;
      this.headlightToggleKey = null;

    GameScene.prototype.playVehicleHorn = function() {
      const now = this.time?.now || 0;
      if (now - (this.lastHornAt || 0) < 520) return;
      this.lastHornAt = now;

      const ctx = this.sound?.context;
      if (ctx) {
        try {
          const gain = ctx.createGain();
          gain.gain.setValueAtTime(0.0001, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.11, ctx.currentTime + 0.025);
          gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.22);
          gain.connect(ctx.destination);

          const oscA = ctx.createOscillator();
          const oscB = ctx.createOscillator();
          oscA.type = 'square';
          oscB.type = 'square';
          oscA.frequency.setValueAtTime(220, ctx.currentTime);
          oscB.frequency.setValueAtTime(275, ctx.currentTime);
          oscA.connect(gain);
          oscB.connect(gain);
          oscA.start();
          oscB.start();
          oscA.stop(ctx.currentTime + 0.24);
          oscB.stop(ctx.currentTime + 0.24);
        } catch (e) {

        }

      this.messageTimer = 520;

    GameScene.prototype.togglePlayerEmergencyLights = function() {

        this.message = this.playerPoliceLightsOn ? 'Dashboard police lights on.' : 'Dashboard police lights off.';
        this.messageTimer = 1200;
        return;

      this.playerHeadlightsOn = GAME.car.visualState.lightsOn;

      this.messageTimer = 1200;
    };

    GameScene.prototype.drawPlayerDashPoliceStrobe = function(g, x, y, heading, time = 0) {
      const fx = Math.cos(heading), fy = Math.sin(heading);
      const sx = -Math.sin(heading), sy = Math.cos(heading);

      // Dashboard/window lights sit just behind Malcolm's front windshield, not on the roof.
      const dashX = x + fx * 20;
      const dashY = y + fy * 20;
      const redX = dashX + sx * -7;
      const redY = dashY + sy * -7;
      const blueX = dashX + sx * 7;
      const blueY = dashY + sy * 7;

      const cycle = Math.sin(time * 0.033);
      const redAlpha = cycle > 0 ? 0.95 : 0.18;
      const blueAlpha = cycle > 0 ? 0.18 : 0.95;

      this.drawStrobeBloom(g, redX, redY, 0xff1010, redAlpha * 0.78);
      this.drawStrobeBloom(g, blueX, blueY, 0x205cff, blueAlpha * 0.78);

      // Small hot cores so it reads as dash-mounted through the windshield.
      g.fillStyle(0xffffff, 0.70);
      g.fillCircle(redX, redY, 3);
      g.fillCircle(blueX, blueY, 3);
    };

    GameScene.prototype.renderVehicleLights = function(time = 0) {
      if (!this.vehicleLightGraphics) {
        this.vehicleLightGraphics = this.add.graphics().setDepth(28);
        try { this.vehicleLightGraphics.setBlendMode(Phaser.BlendModes.ADD); }
        catch (e) { try { this.vehicleLightGraphics.setBlendMode('ADD'); } catch (_) {} }
      }

      const g = this.vehicleLightGraphics;
      g.clear();

      if (this.trafficCars?.length) {
        for (const car of this.trafficCars) {
          if (!car?.body) continue;
          if (car.isPolicePatrol === true && this.policePatrolLightsOn !== false) {
            this.drawPoliceStrobe(g, car.body.x, car.body.y, car.heading || 0, time, car);
          }
        }
      }

      if (this.car) {
        if (GAME.car.visualState.lightsOn) {
          const carLike = {
            body: this.car,
            heading: this.car.heading || 0,
            vehicleKey: 'player_detective_sedan',
            isPolicePatrol: false,
            playerVehicle: true
          };
          this.drawVehicleLights(carLike, time, true);
        }

        if (this.playerPoliceLightsOn) {
          this.drawPlayerDashPoliceStrobe(g, this.car.x, this.car.y, this.car.heading || 0, time);
        }
      }
    };

    // B on foot shoots. If Malcolm is close to the car, B still enters the car.
    GameScene.prototype.handleCarOrArrest = function() {

    const __rhHornUpdate = GameScene.prototype.update;
    GameScene.prototype.update = function(time, delta) {
      // Stop older wrappers from instantly toggling lights on JustDown(Z).
      const saved = {
        keyHotfixLights: this.keyHotfixLights,
        keyRequestedLights: this.keyRequestedLights,
        keyCleanLights: this.keyCleanLights,
        keyDriveLights: this.keyDriveLights,
        keyFinalLights: this.keyFinalLights,
        keyCarLights: this.keyCarLights,
        carHeadlightKey: this.carHeadlightKey,
        headlightToggleKey: this.headlightToggleKey
      };

      this.keyHotfixLights = null;
      this.keyRequestedLights = null;
      this.keyCleanLights = null;
      this.keyDriveLights = null;
      this.keyFinalLights = null;
      this.keyCarLights = null;
      this.carHeadlightKey = null;
      this.headlightToggleKey = null;

      __rhHornUpdate.call(this, time, delta);

      this.keyHornLights = this.keyHornLights || saved.keyHotfixLights;
      this.keyHotfixLights = this.keyHornLights;
      this.keyRequestedLights = null;
      this.keyCleanLights = null;
      this.keyDriveLights = null;
      this.keyFinalLights = null;
      this.keyCarLights = null;
      this.carHeadlightKey = null;
      this.headlightToggleKey = null;

      const zDown = !!this.keyHornLights?.isDown;

      if (!this.inCar) {
        this._hornLightsKeyWasDown = zDown;
        this._hornLightsHeld = false;
        this._hornLightsDownAt = 0;
        return;
      }

      if (zDown && !this._hornLightsKeyWasDown) {
        this._hornLightsDownAt = time || 0;
        this._hornLightsHeld = false;
      }

      if (!zDown && this._hornLightsKeyWasDown) {
        const heldTime = (time || 0) - (this._hornLightsDownAt || 0);
        if (!this._hornLightsHeld && heldTime < 430) this.togglePlayerEmergencyLights();
        this._hornLightsHeld = false;
        this._hornLightsDownAt = 0;
      }

      this._hornLightsKeyWasDown = zDown;
    };

  // POLICE_LIGHTS_SIREN_SOUND_PATCH_001
  // Malcolm's dashboard police lights also control a looping siren.
  // Lights ON = siren ON. Lights OFF = siren OFF.
  if (typeof GameScene !== 'undefined') {
    GameScene.prototype.startPlayerSiren = function() {
      if (this.playerSiren?.active) return;

      const ctx = this.sound?.context;
      if (!ctx) {
        this.playerSiren = { active: true, fallback: true };
        return;
      }

      try {
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.0001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.045, ctx.currentTime + 0.12);
        gain.connect(ctx.destination);

        const oscA = ctx.createOscillator();
        const oscB = ctx.createOscillator();
        oscA.type = 'sawtooth';
        oscB.type = 'square';
        oscA.frequency.setValueAtTime(520, ctx.currentTime);
        oscB.frequency.setValueAtTime(680, ctx.currentTime);

        oscA.connect(gain);
        oscB.connect(gain);
        oscA.start();
        oscB.start();

        this.playerSiren = {
          active: true,
          ctx,
          gain,
          oscA,
          oscB,
          startedAt: this.time?.now || 0
        };
      } catch (e) {
        this.playerSiren = { active: true, fallback: true };
      }
    };

    GameScene.prototype.stopPlayerSiren = function() {
      const siren = this.playerSiren;
      if (!siren?.active) return;

      if (siren.ctx && siren.gain) {
        try {
          const t = siren.ctx.currentTime;
          siren.gain.gain.cancelScheduledValues(t);
          siren.gain.gain.setValueAtTime(Math.max(0.0001, siren.gain.gain.value || 0.0001), t);
          siren.gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);

          siren.oscA?.stop(t + 0.18);
          siren.oscB?.stop(t + 0.18);

          setTimeout(() => {
            try { siren.gain?.disconnect(); } catch (_) {}
            try { siren.oscA?.disconnect(); } catch (_) {}
            try { siren.oscB?.disconnect(); } catch (_) {}
          }, 240);
        } catch (e) {
          try { siren.oscA?.stop(); } catch (_) {}
          try { siren.oscB?.stop(); } catch (_) {}
        }
      }

      this.playerSiren = null;
    };

    GameScene.prototype.updatePlayerSirenSound = function(time = 0) {
      const siren = this.playerSiren;
      if (!siren?.active || !siren.ctx || !siren.oscA || !siren.oscB) return;

      try {
        const ctx = siren.ctx;
        const t = ctx.currentTime;
        const phase = ((time - (siren.startedAt || 0)) / 1000) % 1.6;
        const sweep = 0.5 + 0.5 * Math.sin(phase * Math.PI * 2);
        const freqA = 430 + sweep * 410;
        const freqB = 570 + (1 - sweep) * 360;

        siren.oscA.frequency.setTargetAtTime(freqA, t, 0.045);
        siren.oscB.frequency.setTargetAtTime(freqB, t, 0.045);
      } catch (e) {
        // If WebAudio fails, disable the siren object cleanly.
        this.playerSiren = null;
      }
    };

    const __rhSirenToggle = GameScene.prototype.togglePlayerEmergencyLights;
    GameScene.prototype.togglePlayerEmergencyLights = function() {
      __rhSirenToggle.apply(this, arguments);

      if (this.playerPoliceLightsOn) this.startPlayerSiren();
      else this.stopPlayerSiren();
    };

    const __rhSirenUpdate = GameScene.prototype.update;
    GameScene.prototype.update = function(time, delta) {
      __rhSirenUpdate.call(this, time, delta);

      if (this.playerPoliceLightsOn) {
        this.startPlayerSiren();
        this.updatePlayerSirenSound(time);
      } else {
        this.stopPlayerSiren();
      }
    };

    const __rhSirenShutdown = GameScene.prototype.shutdown;
    GameScene.prototype.shutdown = function() {
      this.stopPlayerSiren?.();
      if (__rhSirenShutdown) __rhSirenShutdown.apply(this, arguments);
    };
  }


  // MAP_CLARITY_DAY_NIGHT_PATCH_001
  // Adds a screen-space city lighting pass driven by existing shiftMinutes.
  // Clock already existed in HUD; this adds visible morning/day/evening/night color without affecting UI controls.
  const RAVEN_HOOK_DAY_NIGHT = {
    enabled: true,
    dawnHour: 6,
    dayHour: 9,
    duskHour: 18,
    nightHour: 21,
    maxNightAlpha: 0.46,
    duskAlpha: 0.22,
    dawnAlpha: 0.18
  };

  function rhSmoothStep(edge0, edge1, x) {
    const t = Phaser.Math.Clamp((x - edge0) / Math.max(0.0001, edge1 - edge0), 0, 1);
    return t * t * (3 - 2 * t);
  }

  if (typeof GameScene !== 'undefined') {
    const __rhDayNightOldCreate = GameScene.prototype.create;
    GameScene.prototype.create = function() {
      __rhDayNightOldCreate.apply(this, arguments);
      if (this.scene?.key !== 'GameScene') return;

      this.dayNightOverlay = this.add.rectangle(0, 0, VIEW_W, VIEW_H, 0x061022, 0)
        .setOrigin(0, 0)
        .setScrollFactor(0)
        .setDepth(95)
        .setBlendMode(Phaser.BlendModes.MULTIPLY);

      this.dayNightWarmth = this.add.rectangle(0, 0, VIEW_W, VIEW_H, 0xff8b3d, 0)
        .setOrigin(0, 0)
        .setScrollFactor(0)
        .setDepth(96)
        .setBlendMode(Phaser.BlendModes.ADD);

      this.updateDayNightCycle?.();
      this.refreshCameraIgnores?.();
    };

    GameScene.prototype.updateDayNightCycle = function() {
      if (!RAVEN_HOOK_DAY_NIGHT.enabled || !this.dayNightOverlay) return;

      const minutes = Number.isFinite(this.shiftMinutes) ? this.shiftMinutes : 8 * 60;
      const hour = ((minutes / 60) % 24 + 24) % 24;

      let nightAlpha = 0;
      let warmAlpha = 0;

      if (hour >= RAVEN_HOOK_DAY_NIGHT.nightHour || hour < RAVEN_HOOK_DAY_NIGHT.dawnHour) {
        nightAlpha = RAVEN_HOOK_DAY_NIGHT.maxNightAlpha;
      } else if (hour >= RAVEN_HOOK_DAY_NIGHT.dawnHour && hour < RAVEN_HOOK_DAY_NIGHT.dayHour) {
        const t = rhSmoothStep(RAVEN_HOOK_DAY_NIGHT.dawnHour, RAVEN_HOOK_DAY_NIGHT.dayHour, hour);
        nightAlpha = Phaser.Math.Linear(RAVEN_HOOK_DAY_NIGHT.maxNightAlpha, 0, t);
        warmAlpha = Math.sin(t * Math.PI) * RAVEN_HOOK_DAY_NIGHT.dawnAlpha;
      } else if (hour >= RAVEN_HOOK_DAY_NIGHT.duskHour && hour < RAVEN_HOOK_DAY_NIGHT.nightHour) {
        const t = rhSmoothStep(RAVEN_HOOK_DAY_NIGHT.duskHour, RAVEN_HOOK_DAY_NIGHT.nightHour, hour);
        nightAlpha = Phaser.Math.Linear(0, RAVEN_HOOK_DAY_NIGHT.maxNightAlpha, t);
        warmAlpha = Math.sin(t * Math.PI) * RAVEN_HOOK_DAY_NIGHT.duskAlpha;
      }

      this.dayNightOverlay.setAlpha(nightAlpha);
      this.dayNightWarmth?.setAlpha(warmAlpha);
    };

    const __rhDayNightOldUpdate = GameScene.prototype.update;
    GameScene.prototype.update = function(time, delta) {
      __rhDayNightOldUpdate.call(this, time, delta);
      this.updateDayNightCycle?.();
