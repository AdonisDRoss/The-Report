  let THEME_MUSIC = null;

  function startTheme(scene) {
    if (!scene || !scene.sound || !scene.cache.audio.exists(THEME_ASSET.key)) return null;

    if (!THEME_MUSIC) {
      THEME_MUSIC = scene.sound.add(THEME_ASSET.key, {
        loop: true,
        volume: THEME_ASSET.volume
      });
    }

    const playNow = () => {
      if (THEME_MUSIC && !THEME_MUSIC.isPlaying) {
        THEME_MUSIC.play();
      }
    };

    if (scene.sound.locked) {
      scene.sound.once(Phaser.Sound.Events.UNLOCKED, playNow);
    } else {
      playNow();
    }

    return THEME_MUSIC;
  }

  function toggleTheme(scene) {
    const music = THEME_MUSIC || startTheme(scene);
    if (!music) return false;

    if (music.isPlaying) {
      music.pause();
      return false;
    }

    music.resume();
    if (!music.isPlaying) music.play();
    return true;
  }

  function setThemeVolume(volume) {
    THEME_ASSET.volume = Phaser.Math.Clamp(volume, 0, 1);
    if (THEME_MUSIC) THEME_MUSIC.setVolume(THEME_ASSET.volume);

  function makeText(scene, x, y, value, size = 16, color = '#fff', fixed = false) {

    return t;

  function overlap(rect, sprite) { return Phaser.Geom.Rectangle.Overlaps(new Phaser.Geom.Rectangle(rect.x, rect.y, rect.w, rect.h), sprite.getBounds()); }

  class TitleScene extends Phaser.Scene {
    constructor() { super('TitleScene'); }

    preload() {
      this.load.image(TITLE_ASSET.key, A(TITLE_ASSET.path));
      this.load.audio(THEME_ASSET.key, A(THEME_ASSET.path));
    }

    create() {
      this.cameras.main.setBackgroundColor('#05070b');

      if (this.textures.exists(TITLE_ASSET.key)) {
        this.add.image(0, 0, TITLE_ASSET.key)
          .setOrigin(0, 0)
          .setDisplaySize(VIEW_W, VIEW_H)
          .setDepth(0);
      } else {
        const g = this.add.graphics();
        g.fillStyle(0x05070b, 1).fillRect(0, 0, VIEW_W, VIEW_H);
        makeText(this, VIEW_W / 2, 88, 'THE REPORT', 58, '#f4d28a').setOrigin(0.5);
        makeText(this, VIEW_W / 2, 150, 'RAVEN HOOK CENTRAL v0.3', 24, '#86e7ff').setOrigin(0.5);
      }

      // Menu cursor/selection is drawn in Phaser, not baked into the title image.
      this.titleCursor = makeText(this, 360, 314, '▶', 22, '#ff4fb8').setDepth(5);
      this.startHint = makeText(this, VIEW_W / 2, VIEW_H - 34, 'TAP / ENTER — NEW CASE   |   M — MUSIC', 16, '#f4d28a').setOrigin(0.5).setDepth(5);
      this.tweens.add({ targets: this.startHint, alpha: 0.35, yoyo: true, repeat: -1, duration: 650 });

      const start = () => {
        startTheme(this);
        this.scene.start(START_IN_POLICE_STATION ? 'PoliceStationScene' : 'GameScene');
      };

      // Browser/iOS audio unlock: starts the theme on the same tap/key press that starts the game.
      this.input.keyboard.once('keydown-ENTER', start);
      this.input.once('pointerdown', start);

      this.input.keyboard.on('keydown-M', () => {
        const on = toggleTheme(this);
        this.startHint.setText(on ? 'MUSIC ON — TAP / ENTER — NEW CASE' : 'MUSIC OFF — TAP / ENTER — NEW CASE');
      });

      // Desktop browsers that allow autoplay can start it here; mobile will wait for tap.
      this.time.delayedCall(250, () => {
        if (!this.sound.locked) startTheme(this);
      });
    }
  }

  class GameScene extends Phaser.Scene {
    constructor() { super('GameScene'); }
    init(data) { this.entryData = data || {}; }

    registerUi(obj) {
      if (!obj) return obj;
      if (!this.uiObjects) this.uiObjects = [];
      if (!this.uiObjects.includes(obj)) this.uiObjects.push(obj);
      if (obj.setScrollFactor) obj.setScrollFactor(0);
      return obj;
    }

    setupUiCamera() {
      if (this.uiCamera) return;
      this.uiCamera = this.cameras.add(0, 0, VIEW_W, VIEW_H)
        .setScroll(0, 0)
        .setZoom(1)
        .setName('UICamera');
      this.uiCamera.roundPixels = true;
      this.refreshCameraIgnores();
    }

    refreshCameraIgnores() {
      if (!this.uiCamera || !this.uiObjects) return;

      this.cameras.main.ignore(this.uiObjects);

      const uiSet = new Set(this.uiObjects);
      const worldObjects = this.children.list.filter(obj => !uiSet.has(obj));
      this.uiCamera.ignore(worldObjects);
    }

    preload() { /* intentionally empty: prevents iOS Safari 90/100% preload lock */ }
    create() {
      if (START_IN_POLICE_STATION && !this.entryData?.fromStationExit) {
        this.scene.start('PoliceStationScene');
        return;
      }
      this.physics.world.setBounds(0, 0, WORLD_W, WORLD_H);
      this.cameras.main.setBounds(0, 0, WORLD_W, WORLD_H);
      this.cameras.main.setBackgroundColor('#070b10');

      this.keys = this.input.keyboard.addKeys({ up:'W', down:'S', left:'A', right:'D', arrowUp:'UP', arrowDown:'DOWN', arrowLeft:'LEFT', arrowRight:'RIGHT', interact:'E', arrest:'SPACE', trunk:'T', report:'R' });
      this.mobile = MOBILE_INPUT_STATE;
      this.inCar = false; this.shiftMinutes = 8 * 60; this.playerInventory = [];
      this.message = 'Loaded mobile-safe. Optional car art will stream in after gameplay starts.';
      this.objective = "Reach Benny's Market and trigger the shoplifting case.";
      this.dispatch = 'Raven Hook Dispatch: Central patrol is active.';
      this.messageTimer = 4500; this.closestZone = null;
      this.debug = { collision:false, interaction:false, spawns:false };
      this.debugGraphics = this.add.graphics().setDepth(1100);

      this.drawGround(); this.drawBuildings(); this.createCollision(); this.createEntities(); this.applyEntrySpawn(); this.createHUD(); launchGlobalMobileControls(this); this.setupUiCamera(); this.bindKeys();
      this.cameras.main.roundPixels = true;
      this.cameras.main.startFollow(this.player, true, CAMERA.followLerp, CAMERA.followLerp);
      this.cameras.main.setDeadzone(42, 32);
      this.cameras.main.setZoom(CAMERA.playerZoom);
      this.lazyLoadGameAssets();
    }

    lazyLoadGameAssets() {
      const files = [
        { type: 'image', key: GROUND_ASSET.key, path: GROUND_ASSET.path },
        { type: 'image', key: BUILDING_SHEET_ASSET.key, path: BUILDING_SHEET_ASSET.path },
        ...BUILDING_IMAGE_ASSETS.map(b => ({ type: 'image', key: b.key, path: b.path })),
        { type: 'spritesheet', key: PLAYER_ASSET.key, path: PLAYER_ASSET.path, fw: PLAYER_ASSET.frameWidth, fh: PLAYER_ASSET.frameHeight },
        { type: 'spritesheet', key: EDDIE_CROSS_ASSET.key, path: EDDIE_CROSS_ASSET.path, fw: EDDIE_CROSS_ASSET.frameWidth, fh: EDDIE_CROSS_ASSET.frameHeight },
        { type: 'spritesheet', key: 'detective_sedan_clean_64', path: 'assets/vehicles/detective_sedan/detective_sedan_clean_64.png', fw: 128, fh: 128 },
        { type: 'spritesheet', key: 'detective_sedan_shadow_64', path: 'assets/vehicles/detective_sedan/detective_sedan_shadow_64.png', fw: 128, fh: 128 },
        { type: 'spritesheet', key: 'detective_sedan_lights_overlay_64', path: 'assets/vehicles/detective_sedan/detective_sedan_lights_overlay_64.png', fw: 128, fh: 128 },
        { type: 'spritesheet', key: 'detective_sedan_damage_64', path: 'assets/vehicles/detective_sedan/detective_sedan_damage_64.png', fw: 128, fh: 128 },
        { type: 'spritesheet', key: 'detective_sedan_trunk_open_64', path: 'assets/vehicles/detective_sedan/detective_sedan_trunk_open_64.png', fw: 128, fh: 128 },
        { type: 'spritesheet', key: 'detective_sedan_driver_door_open_64', path: 'assets/vehicles/detective_sedan/detective_sedan_driver_door_open_64.png', fw: 128, fh: 128 },
        { type: 'spritesheet', key: 'detective_sedan_smoke_fire_64', path: 'assets/vehicles/detective_sedan/detective_sedan_smoke_fire_64.png', fw: 128, fh: 128 }
      ];

      this.assetErrors = [];
      this.load.on('filecomplete', (key) => {
        if (key === GROUND_ASSET.key) this.applyGroundMap();
        if (key === BUILDING_SHEET_ASSET.key) this.applyBuildingSheet();
        if (BUILDING_IMAGE_ASSETS.some(b => b.key === key)) this.applyBuildingImages();
        if (key === PLAYER_ASSET.key) this.ensurePlayerSprite();
        if (key === EDDIE_CROSS_ASSET.key) this.ensureEddieCrossSprite();
        this.ensureSpriteLayers();
        this.syncVehicleSprites();

        if (this.textures.exists(PLAYER_ASSET.key)) {
          this.message = 'Detective player sprite loaded.';
          this.messageTimer = 1800;
        } else if (this.textures.exists('detective_sedan_clean_64')) {
          this.carArtReady = true;
          this.message = 'Detective sedan asset loaded.';
          this.messageTimer = 1800;
        }
      });

      this.load.on('loaderror', (file) => {
        const src = file?.src || file?.url || file?.key || 'unknown';
        this.assetErrors.push(src);
        console.warn('Optional asset failed:', file.key, src);

        // If the transparent filename is missing, try the non-transparent filename as a fallback.
        if (file?.key === PLAYER_ASSET.key && !this._triedPlayerFallback) {
          this._triedPlayerFallback = true;
          this.load.spritesheet(PLAYER_ASSET.key, A(PLAYER_ASSET.fallbackPath), { frameWidth: PLAYER_ASSET.frameWidth, frameHeight: PLAYER_ASSET.frameHeight });
          return;
        }

        this.message = `Asset failed: ${file?.key || 'unknown'} — fallback still playable.`;
        this.messageTimer = 2600;
      });

      for (const f of files) {
        if (this.textures.exists(f.key)) continue;
        if (f.type === 'image') this.load.image(f.key, A(f.path));
        else this.load.spritesheet(f.key, A(f.path), { frameWidth: f.fw, frameHeight: f.fh });
      }
      if (!this.load.isLoading()) this.load.start();
    }

    bindKeys() {
      this.input.keyboard.on('keydown-E', () => this.handleInteract());
      this.input.keyboard.on('keydown-SPACE', () => this.tryArrest());
      this.input.keyboard.on('keydown-T', () => this.handleTrunk());
      this.input.keyboard.on('keydown-R', () => this.tryReport());
      this.input.keyboard.on('keydown-C', () => { this.debug.collision = !this.debug.collision; this.redrawDebug(); });
      this.input.keyboard.on('keydown-I', () => { this.debug.interaction = !this.debug.interaction; this.redrawDebug(); });
      this.input.keyboard.on('keydown-P', () => { this.debug.spawns = !this.debug.spawns; this.redrawDebug(); });
      this.input.keyboard.on('keydown-B', () => this.toggleBuildingArt());

        const on = toggleTheme(this);

    applyEntrySpawn() {
      if (!this.entryData?.spawn || !this.player) return;
      const { x, y } = this.entryData.spawn;
      this.inCar = false;
      this.player.setPosition(x, y);
      if (this.player.body) {
        this.player.body.enable = true;
        this.player.body.setVelocity(0, 0);
      }
      if (this.car?.body) this.car.body.setVelocity(0, 0);
      if (this.playerSprite) this.playerSprite.setVisible(true).setPosition(x, y);
      this.message = this.entryData.message || 'Back on Raven Hook streets.';

    enterBuilding(zone) {
      const info = BUILDING_ENTRIES[zone.id];
      if (!info) {
        this.message = `${zone.label || 'Door'} is locked for now.`;
        this.messageTimer = 1800;
        return;
      }

      if (this.player?.body) this.player.body.setVelocity(0, 0);
      this.scene.start('InteriorScene', {
        buildingId: info.id,
        title: info.title,
        subtitle: info.subtitle,

      });

    toggleBuildingArt() {
      const currentVisible = this.realBuildingImages?.[0]?.visible ?? this.realBuildingSheet?.[0]?.visible ?? false;
      const nextVisible = !currentVisible;
      if (this.realBuildingImages) this.realBuildingImages.forEach(img => img.setVisible(nextVisible));
      if (this.realBuildingSheet) this.realBuildingSheet.forEach(img => img.setVisible(nextVisible));
      if (this.buildingGraphics) this.buildingGraphics.setVisible(!nextVisible);
      if (this.buildingLabels) this.buildingLabels.forEach(t => t.setVisible(!nextVisible));
      this.message = nextVisible ? 'Building PNGs ON.' : 'Building fallback boxes ON.';
      this.messageTimer = 1800;
    }

    vehicleDebug(e) {
      const vs = GAME.car.visualState; let handled = true;
      if (e.key === '1') { vs.trunkOpen = vs.driverDoorOpen = vs.hoodOpen = vs.smokeFire = vs.destroyed = false; GAME.car.damage = 0; this.message = 'Vehicle state: clean.'; }
      else if (e.key === '2') { vs.driverDoorOpen = !vs.driverDoorOpen; vs.trunkOpen = vs.hoodOpen = false; this.message = `Driver door ${vs.driverDoorOpen ? 'open' : 'closed'}.`; }
      else if (e.key === '3') { vs.trunkOpen = !vs.trunkOpen; vs.driverDoorOpen = vs.hoodOpen = false; this.message = `Trunk ${vs.trunkOpen ? 'open' : 'closed'}.`; }
      else if (e.key === '5') { vs.lightsOn = !vs.lightsOn; this.message = `Lights ${vs.lightsOn ? 'on' : 'off'}.`; }
      else if (e.key === '6') { GAME.car.damage = clamp(GAME.car.damage + 25, 0, 100); this.message = `Damage test: ${GAME.car.damage}%.`; }
      else if (e.key === '7') { vs.smokeFire = !vs.smokeFire; this.message = `Smoke/fire ${vs.smokeFire ? 'on' : 'off'}.`; }
      else if (e.key === '0') { vs.trunkOpen = vs.driverDoorOpen = vs.hoodOpen = vs.smokeFire = vs.destroyed = false; vs.lightsOn = true; GAME.car.damage = 0; this.message = 'Vehicle state reset.'; }
      else handled = false;
      if (handled) { this.messageTimer = 2500; this.syncVehicleSprites(); }
    }

      const ps = SPAWN_POINTS.find(s => s.id === 'player_start');
      this.player = this.add.rectangle(ps.x, ps.y, 22, 28, COLORS.blue, 0).setDepth(30); this.physics.add.existing(this.player); this.player.body.setCollideWorldBounds(true); this.playerFacing = 'S';

      this.physics.add.existing(this.car); this.car.body.setSize(34,62); this.car.body.setCollideWorldBounds(true); this.car.heading = -Math.PI/2; this.car.vx = 0; this.car.vy = 0; this.car.rotationFrame = 0;

    }

      }
      if (!this.carLightsSprite && this.textures.exists('detective_sedan_lights_overlay_64')) {

    applyGroundMap() {
      if (this.realGround || !this.textures.exists(GROUND_ASSET.key)) return;
      this.realGround = this.add.image(0, 0, GROUND_ASSET.key).setOrigin(0, 0).setDisplaySize(WORLD_W, WORLD_H).setDepth(0);
      if (this.groundGraphics) this.groundGraphics.setVisible(false);
      this.message = 'Raven Hook ground map loaded.';
      this.messageTimer = 1800;
    }


    applyBuildingImages() {
      if (this.realBuildingImages) return;
      const allReady = BUILDING_IMAGE_ASSETS.every(b => this.textures.exists(b.key));
      if (!allReady) return;

      if (this.realBuildingSheet) {
        this.realBuildingSheet.forEach(img => img.destroy());
        this.realBuildingSheet = null;
      }

      this.realBuildingImages = [];
      for (const b of BUILDING_IMAGE_ASSETS) {
        const [x, y, w, h] = b.place;
        const img = this.add.image(x, y, b.key)
          .setOrigin(0, 0)
          .setDisplaySize(w, h)
          .setDepth(ROOF_DEPTH);
        img.setName(b.name);
        this.realBuildingImages.push(img);
      }

      if (this.buildingGraphics) this.buildingGraphics.setVisible(false);
      if (this.buildingLabels) this.buildingLabels.forEach(t => t.setVisible(false));

      this.message = 'Building PNGs loaded from assets/buildings.';
      this.messageTimer = 2600;
    }

    applyBuildingSheet() {
      if (this.realBuildingSheet || this.realBuildingImages || !this.textures.exists(BUILDING_SHEET_ASSET.key)) return;

      const pieces = [
        { name: 'precinct', crop: [20, 25, 470, 430], place: [302, 158, 525, 402] },
        { name: 'garage', crop: [505, 55, 150, 315], place: [740, 158, 180, 286] },
        { name: 'bennys_market', crop: [720, 40, 640, 465], place: [1195, 162, 592, 386] },
        { name: 'report_room', crop: [40, 635, 220, 265], place: [222, 922, 280, 260] },
        { name: 'evidence_dropoff', crop: [335, 635, 250, 275], place: [630, 925, 274, 258] },
        { name: 'red_gull_diner', crop: [655, 640, 350, 280], place: [1155, 852, 385, 270] },
        { name: 'laundromat', crop: [1080, 640, 275, 300], place: [1645, 852, 252, 278] },
        { name: 'payphone', crop: [1010, 770, 70, 145], place: [1590, 1192, 54, 72] }
      ];

      this.realBuildingSheet = [];
      for (const p of pieces) {
        const [cx, cy, cw, ch] = p.crop;
        const [x, y, w, h] = p.place;
        const img = this.add.image(x, y, BUILDING_SHEET_ASSET.key)
          .setOrigin(0, 0)
          .setCrop(cx, cy, cw, ch)

    createEddieCrossAnims() {
      if (this.anims.exists('eddie_cross_walk_south')) return;
      const rows = [
        ['south', 0], ['southwest', 1], ['west', 2], ['northwest', 3],
        ['north', 4], ['northeast', 5], ['east', 6], ['southeast', 7]
      ];
      for (const [name, row] of rows) {
        this.anims.create({
          key: `eddie_cross_walk_${name}`,
          frames: this.anims.generateFrameNumbers(EDDIE_CROSS_ASSET.key, { start: row * 4, end: row * 4 + 3 }),
          frameRate: 9,
          repeat: -1
        });
      }
    }

    directionFromVelocity(vx, vy, fallback = 'S') {
      if (Math.abs(vx) < 2 && Math.abs(vy) < 2) return fallback;
      const angle = Phaser.Math.RadToDeg(Math.atan2(vy, vx));
      return ['E','SE','S','SW','W','NW','N','NE'][Math.round(((angle + 360) % 360) / 45) % 8];
    }

    eddieFrameForFacing(facing = 'S') {
      const rowByFacing = { S: 0, SW: 1, W: 2, NW: 3, N: 4, NE: 5, E: 6, SE: 7 };
      return (rowByFacing[facing] || 0) * 4;
    }

    eddieAnimForFacing(facing = 'E') {
      const nameByFacing = { S: 'south', SW: 'southwest', W: 'west', NW: 'northwest', N: 'north', NE: 'northeast', E: 'east', SE: 'southeast' };
      return `eddie_cross_walk_${nameByFacing[facing] || 'east'}`;
    }

    ensureEddieCrossSprite() {
      if (this.eddieSprite || !this.textures.exists(EDDIE_CROSS_ASSET.key) || !this.suspect) return;
      this.createEddieCrossAnims();
      this.eddieSprite = this.add.sprite(this.suspect.x, this.suspect.y, EDDIE_CROSS_ASSET.key, this.eddieFrameForFacing(this.suspectFacing || 'E'))
        .setOrigin(0.5, EDDIE_CROSS_ASSET.originY)
        .setScale(EDDIE_CROSS_ASSET.scale)
        .setDepth(29);
      this.eddieSprite.setVisible(!!this.suspectActive);
      this.suspect.setVisible(false);
      this.updateEddieCrossSprite(false);
      this.message = 'Eddie Cross sprite loaded.';
      this.messageTimer = 1800;
    }

    updateEddieCrossSprite(moving = false) {
      if (!this.eddieSprite || !this.suspect) return;
      this.eddieSprite.setPosition(this.suspect.x, this.suspect.y);
      this.eddieSprite.setVisible(!!this.suspectActive);
      this.suspect.setVisible(false);
      if (!this.eddieSprite.visible) return;

      const facing = this.suspectFacing || 'E';
      if (moving && !GAME.case.suspectArrested) {
        const key = this.eddieAnimForFacing(facing);
        if (this.eddieSprite.anims.currentAnim?.key !== key || !this.eddieSprite.anims.isPlaying) {
          this.eddieSprite.play(key, true);
        }
      } else {
        this.eddieSprite.anims.stop();
        this.eddieSprite.setFrame(this.eddieFrameForFacing(facing));
      }
    }

    createPlayerAnims() {
      if (this.anims.exists('detective_walk_south')) return;
      const rows = [
        ['south', 0], ['southwest', 1], ['west', 2], ['northwest', 3],
        ['north', 4], ['northeast', 5], ['east', 6], ['southeast', 7]
      ];
      for (const [name, row] of rows) {
        this.anims.create({
          key: `detective_walk_${name}`,
          frames: this.anims.generateFrameNumbers(PLAYER_ASSET.key, { start: row * 6, end: row * 6 + 5 }),
          frameRate: 8,
          repeat: -1
        });
      }
    }

    frameForFacing() {
      const rowByFacing = { S: 0, SW: 1, W: 2, NW: 3, N: 4, NE: 5, E: 6, SE: 7 };
      return (rowByFacing[this.playerFacing] || 0) * 6;
    }

    animForFacing() {
      const nameByFacing = { S: 'south', SW: 'southwest', W: 'west', NW: 'northwest', N: 'north', NE: 'northeast', E: 'east', SE: 'southeast' };
      return `detective_walk_${nameByFacing[this.playerFacing] || 'south'}`;
    }

    ensurePlayerSprite() {
      if (this.playerSprite || !this.textures.exists(PLAYER_ASSET.key) || !this.player) return;
      this.createPlayerAnims();
      this.playerSprite = this.add.sprite(this.player.x, this.player.y, PLAYER_ASSET.key, this.frameForFacing())
        .setOrigin(0.5, PLAYER_ASSET.originY)
        .setScale(PLAYER_ASSET.scale)
        .setDepth(31);
      this.player.setVisible(false);
      this.updatePlayerSprite(false);
    }

    updatePlayerSprite(moving = false) {
      if (!this.playerSprite || !this.player) return;
      this.playerSprite.setPosition(this.player.x, this.player.y);
      this.playerSprite.setVisible(this.player.body.enable && !this.inCar);
      if (!this.playerSprite.visible) return;
      if (moving) {
        const key = this.animForFacing();
        if (this.playerSprite.anims.currentAnim?.key !== key || !this.playerSprite.anims.isPlaying) this.playerSprite.play(key, true);
      } else {
        this.playerSprite.anims.stop();
        this.playerSprite.setFrame(this.frameForFacing());
      }
    }

    createHUD() {

    update(time, delta) { const dt=delta/1000; this.shiftMinutes += dt*0.85; this.updateClosestZone(); if(this.inCar) this.updateCar(dt); else this.updatePlayer(dt); this.updateCase(dt); this.updateCivilians(); this.updateHUD(); this.refreshCameraIgnores(); if(this.messageTimer>0) this.messageTimer-=delta; }
    updatePlayer() {
      const d=this.inputDir(); let vx=d.ax||0, vy=d.ay||0;
      if(!vx&&!vy){ if(d.left)vx-=1; if(d.right)vx+=1; if(d.up)vy-=1; if(d.down)vy+=1; }
      const moving = Math.abs(vx) > 0.01 || Math.abs(vy) > 0.01;
      const len=Math.hypot(vx,vy)||1; vx/=len; vy/=len;
      this.player.body.setVelocity(vx*220,vy*220);
      if(moving){ const angle=Phaser.Math.RadToDeg(Math.atan2(vy,vx)); this.playerFacing=['E','SE','S','SW','W','NW','N','NE'][Math.round(((angle+360)%360)/45)%8]; }

    }
    updateCar(dt) { const d=this.inputDir(); this.car.isBraking=d.down; const speed=Math.hypot(this.car.vx,this.car.vy); const speedRatio=clamp(speed/VEHICLE.topSpeed,0.15,1); if(d.left) this.car.heading-=VEHICLE.steeringRate*dt*speedRatio; if(d.right) this.car.heading+=VEHICLE.steeringRate*dt*speedRatio; const fx=Math.cos(this.car.heading), fy=Math.sin(this.car.heading); if((d.up || d.ay < -0.25) && GAME.car.fuel>0){ this.car.vx+=fx*VEHICLE.acceleration*dt; this.car.vy+=fy*VEHICLE.acceleration*dt; GAME.car.fuel=Math.max(0,GAME.car.fuel-dt*(0.85+speed/360)); } if(d.down || d.ay > 0.25){ this.car.vx-=fx*VEHICLE.brakeForce*dt; this.car.vy-=fy*VEHICLE.brakeForce*dt; } const fmag=this.car.vx*fx+this.car.vy*fy; this.car.vx += (fx*fmag-this.car.vx)*VEHICLE.traction; this.car.vy += (fy*fmag-this.car.vy)*VEHICLE.traction; this.car.vx*=VEHICLE.friction; this.car.vy*=VEHICLE.friction; const sp=Math.hypot(this.car.vx,this.car.vy); if(sp>VEHICLE.topSpeed){ this.car.vx=(this.car.vx/sp)*VEHICLE.topSpeed; this.car.vy=(this.car.vy/sp)*VEHICLE.topSpeed; } this.car.body.setVelocity(this.car.vx,this.car.vy); this.car.rotationFrame=this.getVehicleFrame(this.car.heading); this.carFallback && this.car.setRotation(this.car.heading+Math.PI/2); this.syncVehicleSprites(); this.cameras.main.setZoom(Phaser.Math.Linear(this.cameras.main.zoom, sp>300?CAMERA.carFastZoom:sp>160?CAMERA.carMidZoom:CAMERA.carSlowZoom,0.04)); }
    getVehicleFrame(a) { const deg=Phaser.Math.RadToDeg(a); const norm=Phaser.Math.Wrap(deg+90,0,360); return Math.round(norm/VEHICLE.frame.degreesPerFrame)%VEHICLE.frame.count; }
    syncVehicleSprites() {
      this.ensureSpriteLayers();
      if(!this.spriteLayersMade || !this.carBaseSprite) return;
      this.car.setRotation(0);
      const frame=this.car.rotationFrame||0, vs=GAME.car.visualState, dmg=GAME.car.damage;
      let base=VEHICLE.sprites.clean;

      else if(vs.driverDoorOpen && this.textures.exists(VEHICLE.sprites.driverDoorOpen)) base=VEHICLE.sprites.driverDoorOpen;

    updateCase() {

      this.addCollisionRects();

      const spawn = this.entryData.spawn || this.floorData.spawns.default;
      const startX = spawn.x;
      const startY = spawn.y;

      this.playerBody = this.add.rectangle(startX, startY, 42, 64, COLORS.blue, 0.0).setDepth(30);
      this.physics.add.existing(this.playerBody);
      this.playerBody.body.setCollideWorldBounds(true);
      this.physics.add.collider(this.playerBody, this.walls);

      this.playerFacing = spawn.facing || 'S';
      this.playerSprite = null;

      if (this.textures.exists(MALCOLM_STATION_ASSET.key)) {
        this.createPlayerAnims();
        this.playerSprite = this.add.sprite(startX, startY, MALCOLM_STATION_ASSET.key, this.frameForFacing())
          .setOrigin(0.5, MALCOLM_STATION_ASSET.originY)
          .setScale(this.stationPlayerScale)
          .setDepth(31);
      } else if (this.textures.exists(PLAYER_ASSET.key)) {
        this.createPlayerAnims();
        this.playerSprite = this.add.sprite(startX, startY, PLAYER_ASSET.key, 0)
          .setOrigin(0.5, PLAYER_ASSET.originY)
          .setScale(1.45)
          .setDepth(31);
      } else {
        this.playerFallback = this.add.rectangle(startX, startY, 42, 64, COLORS.blue, 1).setDepth(31);
      }

      this.cameras.main.startFollow(this.playerBody, true, CAMERA.followLerp, CAMERA.followLerp);
      this.cameras.main.setDeadzone(42, 32);
      this.cameras.main.setZoom(0.68);

      this.promptBg = this.add.rectangle(VIEW_W / 2, VIEW_H - 38, 760, 42, 0x02060a, 0.72)
        .setScrollFactor(0)
        .setDepth(2000);
      this.promptText = makeText(this, VIEW_W / 2, VIEW_H - 47, this.floorData.title, 15, '#f4d28a', true)
        .setOrigin(0.5)
        .setDepth(2001);
      this.infoText = makeText(this, 18, 18, `${this.floorData.title} | A/E interact | Stairs change floors | Front door exits`, 14, '#86e7ff', true)
        .setDepth(2001);
      this.registerStationUi(this.promptBg);
      this.registerStationUi(this.promptText);
      this.registerStationUi(this.infoText);

      this.input.keyboard.on('keydown-E', () => this.handleInteract());
      this.input.keyboard.on('keydown-ENTER', () => this.handleInteract());
      this.input.keyboard.on('keydown-A', () => this.handleInteract());
      this.input.keyboard.on('keydown-O', () => { if (this.stationPropsLayer) this.stationPropsLayer.setVisible(!this.stationPropsLayer.visible); });
      this.input.keyboard.on('keydown', (event) => this.handleFloorPromptKey(event));

      launchGlobalMobileControls(this);
      this.setupStationUiCamera();
      // Keep title theme alive after scene transition. On iOS this also retries after the user tap.
      this.time.delayedCall(150, () => startTheme(this));
      this.input.once('pointerdown', () => startTheme(this));


      if (this.entryData.message) this.promptText.setText(this.entryData.message);
      if (this.entryData.fromElevatorRoom) this.cameras.main.fadeIn(180, 0, 0, 0);
    }

    registerStationUi(obj) {
      if (!obj) return obj;
      if (!this.uiObjects) this.uiObjects = [];
      if (!this.uiObjects.includes(obj)) this.uiObjects.push(obj);
      if (obj.setScrollFactor) obj.setScrollFactor(0);
      if (obj.setDepth && obj.depth < 2000) obj.setDepth(2000);
      if (this.cameras?.main) this.cameras.main.ignore(obj);
      return obj;
    }

    setupStationUiCamera() {
      if (this.uiCamera) return;

      const uiObjects = (this.uiObjects || []).filter(Boolean);

      this.uiCamera = this.cameras.add(0, 0, VIEW_W, VIEW_H)
        .setScroll(0, 0)
        .setZoom(1)
        .setName('StationUICamera');

      this.uiCamera.roundPixels = true;
      this.cameras.main.ignore(uiObjects);

      const uiSet = new Set(uiObjects);
      const worldObjects = this.children.list.filter(obj => !uiSet.has(obj));
      this.uiCamera.ignore(worldObjects);
    }

    createMobileControls() {
      this.input.addPointer(5);
      this.input.mouse?.disableContextMenu();

      this.mobile = {
        up:false, down:false, left:false, right:false,
        a:false, b:false, x:false, y:false, sel:false, sta:false
      };
      this.controlZones = [];
      this.activePointerControls = new Map();

      const addBtn = (x, y, label, key, color=0x111827, radius=30, font='18px') => {
        const c = this.add.container(x, y).setScrollFactor(0).setDepth(2600);
        const bg = this.add.circle(0, 0, radius, color, 0.82).setStrokeStyle(2, 0xffffff, 0.65);
        const tx = this.add.text(0, -8, label, {
          fontFamily: 'Courier New',
          fontSize: font,
          color: '#fff',
          stroke: '#000',
          strokeThickness: 3
        }).setOrigin(0.5);

        c.add([bg, tx]);

        this.registerStationUi(c);
        this.registerStationUi(bg);
        this.registerStationUi(tx);
        this.controlZones.push({ x, y, key, radius: radius + 26 });
        return c;
      };

      const dX = 96;
      const dY = VIEW_H - 170;

      addBtn(dX, dY - 76, '▲', 'up');
      addBtn(dX, dY + 76, '▼', 'down');
      addBtn(dX - 72, dY, '◀', 'left');
      addBtn(dX + 72, dY, '▶', 'right');

      const bX = VIEW_W - 96;
      const bY = VIEW_H - 258;

      addBtn(bX, bY, 'A', 'a', 0x1f4d2f, 32);
      addBtn(bX - 72, bY + 52, 'B', 'b', 0x4d1f1f, 32);
      addBtn(bX, bY + 104, 'X', 'x', 0x1f314d, 32);
      addBtn(bX + 62, bY + 52, 'Y', 'y', 0x4d3b1f, 32);

      addBtn(VIEW_W - 230, VIEW_H - 326, 'SEL', 'sel', 0x263241, 25, '12px');
      addBtn(VIEW_W - 160, VIEW_H - 326, 'STA', 'sta', 0x263241, 25, '12px');

      this.input.on('pointerdown', (pointer) => this.handleStationPointerDown(pointer));
      this.input.on('pointermove', (pointer) => {
        if (!pointer.isDown) return;
        this.clearStationPointer(pointer);
        this.handleStationPointerDown(pointer, false);
      });
      this.input.on('pointerup', (pointer) => this.clearStationPointer(pointer));
      this.input.on('pointerupoutside', (pointer) => this.clearStationPointer(pointer));
    }

    handleStationPointerDown(pointer, fireAction = true) {
      startTheme(this);

      const hits = [];
      for (const z of this.controlZones || []) {
        const dx = pointer.x - z.x;
        const dy = pointer.y - z.y;
        if (Math.hypot(dx, dy) <= z.radius) {
          hits.push(z.key);
          break;
        }
      }

      if (!hits.length) return;

      for (const key of hits) this.mobile[key] = true;
      this.activePointerControls.set(pointer.id, hits);

      if (!fireAction) return;

      if (hits.includes('a')) this.handleInteract();
      if (hits.includes('b')) this.handleInteract();
      if (hits.includes('x')) this.promptText?.setText('X: station systems placeholder.');
      if (hits.includes('y')) this.promptText?.setText('Y: report/evidence shortcut placeholder.');
      if (hits.includes('sel')) this.promptText?.setText('SEL: station debug placeholder.');
      if (hits.includes('sta')) this.promptText?.setText('STA: pause placeholder.');
    }

    clearStationPointer(pointer) {
      const keys = this.activePointerControls?.get(pointer.id);
      if (!keys) return;
      for (const key of keys) this.mobile[key] = false;
      this.activePointerControls.delete(pointer.id);
    }

    createPlayerAnims() {
      if (this.anims.exists('station_malcolm_walk_south')) return;

      if (this.textures.exists(MALCOLM_STATION_ASSET.key)) {
        const rows = [
          ['south', 0],
          ['north', 1],
          ['west', 3],
          ['east', 3]
        ];

        for (const [name, row] of rows) {
          this.anims.create({
            key: `station_malcolm_walk_${name}`,
            frames: this.anims.generateFrameNumbers(MALCOLM_STATION_ASSET.key, {
              start: row * MALCOLM_STATION_ASSET.cols,
              end: row * MALCOLM_STATION_ASSET.cols + MALCOLM_STATION_ASSET.cols - 1
            }),
            frameRate: 10,
            repeat: -1
          });
        }
      }
    }

    frameForFacing() {
      if (this.textures.exists(MALCOLM_STATION_ASSET.key)) {
        const rowByFacing = { S: 0, SW: 3, W: 3, NW: 3, N: 1, NE: 3, E: 3, SE: 3 };
        return (rowByFacing[this.playerFacing] ?? 0) * MALCOLM_STATION_ASSET.cols;
      }

      const rowByFacing = { S: 0, SW: 1, W: 2, NW: 3, N: 4, NE: 5, E: 6, SE: 7 };
      return (rowByFacing[this.playerFacing] || 0) * 6;
    }

    animForFacing() {
      if (this.textures.exists(MALCOLM_STATION_ASSET.key)) {
        const nameByFacing = { S:'south', SW:'east', W:'east', NW:'east', N:'north', NE:'east', E:'east', SE:'east' };
        return `station_malcolm_walk_${nameByFacing[this.playerFacing] || 'south'}`;
      }

      const nameByFacing = { S:'south', SW:'southwest', W:'west', NW:'northwest', N:'north', NE:'northeast', E:'east', SE:'southeast' };
      return `station_detective_walk_${nameByFacing[this.playerFacing] || 'south'}`;
    }

    updatePlayerVisual(moving) {
      const x = this.playerBody.x;
      const y = this.playerBody.y;
      const mirrorLeft = ['W', 'SW', 'NW'].includes(this.playerFacing);

      if (this.playerSprite) {
        this.playerSprite.setPosition(x, y);
        this.playerSprite.setFlipX(mirrorLeft);

        if (moving) {
          const key = this.animForFacing();
          if (this.playerSprite.anims.currentAnim?.key !== key || !this.playerSprite.anims.isPlaying) {
            this.playerSprite.play(key, true);
          }
        } else {
          this.playerSprite.anims.stop();
          this.playerSprite.setFrame(this.frameForFacing());
        }
      }
      if (this.playerFallback) this.playerFallback.setPosition(x, y);
    }

    inputDir() {
      const left = this.keys.left.isDown || this.keys.arrowLeft.isDown || this.mobile.left;
      const right = this.keys.right.isDown || this.keys.arrowRight.isDown || this.mobile.right;
      const up = this.keys.up.isDown || this.keys.arrowUp.isDown || this.mobile.up;
      const down = this.keys.down.isDown || this.keys.arrowDown.isDown || this.mobile.down;
      let vx = (right ? 1 : 0) - (left ? 1 : 0);
      let vy = (down ? 1 : 0) - (up ? 1 : 0);
      const len = Math.hypot(vx, vy) || 1;
      return { vx: vx / len, vy: vy / len };
    }

    update(time, delta) {
      if (this.transitionCooldown > 0) this.transitionCooldown -= delta || 16;

      if (this.floorMenuOpen) {
        if (this.playerBody?.body) this.playerBody.body.setVelocity(0, 0);
        this.updatePlayerVisual(false);
        return;
      }

      const d = this.inputDir();
      const moving = Math.abs(d.vx) > 0.01 || Math.abs(d.vy) > 0.01;
      this.playerBody.body.setVelocity(d.vx * 240, d.vy * 240);

      if (moving) {
        const angle = Phaser.Math.RadToDeg(Math.atan2(d.vy, d.vx));
        this.playerFacing = ['E','SE','S','SW','W','NW','N','NE'][Math.round(((angle+360)%360)/45)%8];
      }

      this.updatePlayerVisual(moving);

      if (this.checkElevatorDoorTransition()) return;
      this.checkAutoTransitions();

      const spot = this.getCurrentHotspot();
      this.currentHotspot = spot;
      this.promptText.setText(spot ? `A/E: ${spot.label}` : `${this.floorData.title} | A/E interact`);
    }

    getCurrentHotspot() {
      const b = this.playerBody.getBounds();
      const p = { x: this.playerBody.x, y: this.playerBody.y };

      let nearest = null;
      let nearestDist = Infinity;

      for (const h of this.hotspots) {
        const r = new Phaser.Geom.Rectangle(h.x, h.y, h.w, h.h);
        if (Phaser.Geom.Rectangle.Overlaps(r, b) || Phaser.Geom.Rectangle.Contains(r, p.x, p.y)) return h;

        const cx = h.x + h.w / 2;
        const cy = h.y + h.h / 2;
        const d = Phaser.Math.Distance.Between(p.x, p.y, cx, cy);
        const reach = h.reach || 120;
        if (d < reach && d < nearestDist) {
          nearest = h;
          nearestDist = d;
        }
      }

      return nearest;
    }

    getStrictHotspot(ids = []) {
      const b = this.playerBody.getBounds();
      const p = { x: this.playerBody.x, y: this.playerBody.y };

      for (const h of this.hotspots) {
        if (ids.length && !ids.includes(h.id)) continue;

        const r = new Phaser.Geom.Rectangle(h.x, h.y, h.w, h.h);
        if (Phaser.Geom.Rectangle.Overlaps(r, b) || Phaser.Geom.Rectangle.Contains(r, p.x, p.y)) return h;
      }

      return null;
    }

    getElevatorDoorZone() {
      if (this.floorId === 'floor2') {
        // Directly in front of the visible elevator door/cab on Floor 2.
        return { x:700, y:35, w:360, h:345 };
      }

      // Do not auto-warp on Floor 1/B1/Motor Pool.
      // Their elevator spawns sit near the elevator, so auto-warp would loop immediately.
      // Those floors still enter the elevator with A/E through handleInteract().
      return null;
    }

    playerInRectZone(zone) {
      if (!zone || !this.playerBody) return false;
      const b = this.playerBody.getBounds();
      const p = { x: this.playerBody.x, y: this.playerBody.y };
      const r = new Phaser.Geom.Rectangle(zone.x, zone.y, zone.w, zone.h);
      return Phaser.Geom.Rectangle.Overlaps(r, b) || Phaser.Geom.Rectangle.Contains(r, p.x, p.y);
    }

    checkElevatorDoorTransition() {
      if (this.transitionLocked || this.floorMenuOpen || this.transitionCooldown > 0) return false;
      if (!this.playerInRectZone(this.getElevatorDoorZone())) return false;
      this.enterElevatorRoom();
      return true;
    }

    enterElevatorRoom() {
      if (this.transitionLocked || this.floorMenuOpen) return;
      this.transitionLocked = true;
      if (this.playerBody?.body) this.playerBody.body.setVelocity(0, 0);
      this.promptText?.setText('Entering elevator...');
      this.cameras.main.fadeOut(140, 0, 0, 0);
      this.time.delayedCall(150, () => {
        this.scene.start('ElevatorRoomScene', {
          fromFloor: this.floorId,
          message: 'Entered elevator.'
        });
      });
    }

    checkAutoTransitions() {
      if (this.transitionLocked || this.floorMenuOpen || this.transitionCooldown > 0) return;

      const h = this.getStrictHotspot(['stairs_to_floor2', 'stairs_to_floor1', 'station_exit_main']);
      if (!h) return;

      this.transitionLocked = true;
      if (this.playerBody?.body) this.playerBody.body.setVelocity(0, 0);

      if (h.id === 'station_exit_main') {
        this.scene.start('GameScene', {
          fromStationExit: true,
          spawn: { x: 552, y: 690 },
          message: 'Exited Raven Hook Police Station.'
        });
        return;
      }

      if (h.id === 'stairs_to_floor2') {
        this.changeStationFloor('floor2', 'stairsFromFloor1', 'Came up the stairs to Floor 2.');
        return;
      }

      if (h.id === 'stairs_to_floor1') {
        this.changeStationFloor('floor1', 'stairsFromFloor2', 'Came down the stairs to Floor 1.');
        return;
      }
    }

    handleInteract() {
      if (this.floorMenuOpen) return;

      const h = this.currentHotspot || this.getCurrentHotspot();
      if (!h) {
        if (this.playerInRectZone(this.getElevatorDoorZone())) this.enterElevatorRoom();
        return;
      }

      if (h.id === 'station_exit_main') {
        this.scene.start('GameScene', {
          fromStationExit: true,
          spawn: { x: 552, y: 690 },
          message: 'Exited Raven Hook Police Station.'
        });
        return;
      }

      if (h.id === 'station_elevator') {
        this.enterElevatorRoom();
        return;
      }

      if (h.id === 'stairs_to_floor2' || h.id === 'stairs_to_floor1') {
        this.promptText.setText('Walk onto the stairs to change floors.');
        return;
      }

      if (h.id === 'station_phone') {
        this.promptText.setText('Station phone ready. Beeper callbacks will plug in here.');
        return;
      }

      if (h.id === 'report_room') {
        this.scene.start('ReportScene');
        return;
      }

      if (h.id === 'evidence_intake') {
        this.promptText.setText('Evidence intake ready. Chain-of-custody system plugs in here.');
        return;
      }

      if (h.id === 'holding_cells') {
        this.promptText.setText('Holding cells ready. Arrested suspects will appear here.');
        return;
      }

      if (h.id === 'task_force_room') {
        this.promptText.setText("Malcolm's task force room is empty for now.");
        return;
      }

      this.promptText.setText(h.label || this.floorData.title);
    }

    showFloorPrompt() {
      this.floorMenuOpen = true;
      if (this.floorMenu) this.floorMenu.destroy(true);

      const c = this.add.container(VIEW_W / 2, VIEW_H / 2).setScrollFactor(0).setDepth(3000);
      const bg = this.add.rectangle(0, 0, 520, 300, 0x02060a, 0.92).setStrokeStyle(2, COLORS.cyan, 0.9);
      const title = this.add.text(0, -120, 'ELEVATOR', {
        fontFamily: 'Courier New',
        fontSize: '24px',
        color: '#f4d28a',
        stroke: '#000',
        strokeThickness: 4
      }).setOrigin(0.5);
      const help = this.add.text(0, 118, 'Keyboard: 2 / B / 3   |   Tap a floor   |   ESC closes', {
        fontFamily: 'Courier New',
        fontSize: '13px',
        color: '#86e7ff',
        stroke: '#000',
        strokeThickness: 3
      }).setOrigin(0.5);

      c.add([bg, title, help]);

      const addOption = (y, label, floorId) => {
        const box = this.add.rectangle(0, y, 420, 48, 0x111827, 0.95).setStrokeStyle(2, COLORS.amber, 0.85);
        const tx = this.add.text(0, y - 10, label, {
          fontFamily: 'Courier New',
          fontSize: '17px',
          color: '#ffffff',
          stroke: '#000',
          strokeThickness: 3
        }).setOrigin(0.5);
        box.setInteractive({ useHandCursor: true });
        box.on('pointerdown', () => this.changeStationFloor(floorId, 'elevator', `Elevator: ${label}`));
        c.add([box, tx]);
      };

      addOption(-55, '2 — OFFICES / CHIEF OFFICE', 'floor2');
      addOption(5, 'B1 — RECORDS / EVIDENCE', 'b1');
      addOption(65, 'B3 — MOTOR POOL', 'motorPool');

      this.floorMenu = c;
      this.registerStationUi(c);
      this.cameras.main.ignore(c);
    }

    handleFloorPromptKey(event) {
      if (!this.floorMenuOpen) return;
      const key = String(event.key || '').toLowerCase();

      if (key === 'escape') {
        this.closeFloorPrompt();
        return;
      }

      if (key === '2') {
        this.changeStationFloor('floor2', 'elevator', 'Elevator: Floor 2 offices.');
        return;
      }

      if (key === '1' || key === 'b') {
        this.changeStationFloor('b1', 'elevator', 'Elevator: B1 records / evidence.');
        return;
      }

      if (key === '3') {
        this.changeStationFloor('motorPool', 'elevator', 'Elevator: B3 motor pool.');
        return;
      }
    }

    closeFloorPrompt() {
      this.floorMenuOpen = false;
      if (this.floorMenu) {
        this.floorMenu.destroy(true);
        this.floorMenu = null;
      }
      this.promptText?.setText(this.floorData.title);
    }

    changeStationFloor(floorId, spawnKey = 'elevator', message = '') {

  class ElevatorRoomScene extends Phaser.Scene {

    create() {

      }

      this.hotspots = [ELEVATOR_ROOM_ASSET.panelHotspot, ELEVATOR_ROOM_ASSET.doorHotspot];

      this.keys = this.input.keyboard.addKeys({
        up: 'W', down: 'S', left: 'A', right: 'D',
        arrowUp: 'UP', arrowDown: 'DOWN', arrowLeft: 'LEFT', arrowRight: 'RIGHT',
        interact: 'E', enter: 'ENTER'
      });

      this.promptBg = this.add.rectangle(VIEW_W / 2, VIEW_H - 38, 760, 42, 0x02060a, 0.72)
        .setScrollFactor(0)
        .setDepth(2000);
      this.promptText = makeText(this, VIEW_W / 2, VIEW_H - 47, this.entryData.message || 'Elevator — walk to the wall panel', 15, '#f4d28a', true)
        .setOrigin(0.5)
        .setDepth(2001);
      this.infoText = makeText(this, 18, 18, 'ELEVATOR | A/E use panel | Door exits back to current floor', 14, '#86e7ff', true)
        .setDepth(2001);

      this.registerElevatorUi(this.promptBg);
      this.registerElevatorUi(this.promptText);
      this.registerElevatorUi(this.infoText);

      this.input.keyboard.on('keydown-E', () => this.handleInteract());
      this.input.keyboard.on('keydown-ENTER', () => this.handleInteract());
      this.input.keyboard.on('keydown-A', () => this.handleInteract());
      this.input.keyboard.on('keydown', (event) => this.handleFloorPromptKey(event));

      launchGlobalMobileControls(this);
      this.time.delayedCall(100, () => startTheme(this));
      this.input.once('pointerdown', () => startTheme(this));

      this.cameras.main.roundPixels = true;
      this.cameras.main.startFollow(this.playerBody, true, CAMERA.followLerp, CAMERA.followLerp);
      this.cameras.main.setDeadzone(42, 32);
      this.cameras.main.setZoom(0.78);
      this.cameras.main.fadeIn(180, 0, 0, 0);
    }

    registerElevatorUi(obj) {
      if (!obj) return obj;
      if (!this.uiObjects) this.uiObjects = [];
      if (!this.uiObjects.includes(obj)) this.uiObjects.push(obj);
      if (obj.setScrollFactor) obj.setScrollFactor(0);
      if (obj.setDepth && obj.depth < 2000) obj.setDepth(2000);
      if (this.cameras?.main) this.cameras.main.ignore(obj);
      return obj;
    }

    createPlayerAnims() {
      if (this.anims.exists('station_malcolm_walk_south')) return;
      if (!this.textures.exists(MALCOLM_STATION_ASSET.key)) return;

      const rows = [
        ['south', 0],
        ['north', 1],
        ['west', 3],
        ['east', 3]
      ];

      for (const [name, row] of rows) {
        this.anims.create({
          key: `station_malcolm_walk_${name}`,
          frames: this.anims.generateFrameNumbers(MALCOLM_STATION_ASSET.key, {
            start: row * MALCOLM_STATION_ASSET.cols,
            end: row * MALCOLM_STATION_ASSET.cols + MALCOLM_STATION_ASSET.cols - 1
          }),
          frameRate: 10,
          repeat: -1
        });
      }
    }

    frameForFacing() {
      const rowByFacing = { S: 0, SW: 0, SE: 0, N: 1, NW: 1, NE: 1, W: 3, E: 3 };
      const row = rowByFacing[this.playerFacing] ?? 0;
      return row * MALCOLM_STATION_ASSET.cols;
    }

    animForFacing() {
      if (this.playerFacing === 'N' || this.playerFacing === 'NW' || this.playerFacing === 'NE') return 'station_malcolm_walk_north';
      if (this.playerFacing === 'W' || this.playerFacing === 'SW') return 'station_malcolm_walk_west';
      if (this.playerFacing === 'E' || this.playerFacing === 'SE') return 'station_malcolm_walk_east';
      return 'station_malcolm_walk_south';
    }

    updatePlayerVisual(moving = false) {
      const x = this.playerBody.x;
      const y = this.playerBody.y;

      if (this.playerSprite) {
        this.playerSprite.setPosition(x, y);
        if (this.playerFacing === 'W' || this.playerFacing === 'SW' || this.playerFacing === 'NW') this.playerSprite.setFlipX(true);
        else this.playerSprite.setFlipX(false);

        if (moving) this.playerSprite.play(this.animForFacing(), true);
        else {
          this.playerSprite.anims.stop();
          this.playerSprite.setFrame(this.frameForFacing());
        }
      }

      if (this.playerFallback) this.playerFallback.setPosition(x, y);
    }

    inputDir() {
      const left = this.keys.left.isDown || this.keys.arrowLeft.isDown || this.mobile.left;
      const right = this.keys.right.isDown || this.keys.arrowRight.isDown || this.mobile.right;
      const up = this.keys.up.isDown || this.keys.arrowUp.isDown || this.mobile.up;
      const down = this.keys.down.isDown || this.keys.arrowDown.isDown || this.mobile.down;

      let vx = 0;
      let vy = 0;
      if (left) vx -= 1;
      if (right) vx += 1;
      if (up) vy -= 1;
      if (down) vy += 1;

      const len = Math.hypot(vx, vy) || 1;
      return { vx: vx / len, vy: vy / len };
    }

    update(time, delta) {
      if (this.floorMenuOpen) {
        if (this.playerBody?.body) this.playerBody.body.setVelocity(0, 0);
        this.updatePlayerVisual(false);
        this.handleMenuMobileInput();
        return;
      }

      const d = this.inputDir();
      const moving = Math.abs(d.vx) > 0.01 || Math.abs(d.vy) > 0.01;
      this.playerBody.body.setVelocity(d.vx * 230, d.vy * 230);

      if (moving) {
        const angle = Phaser.Math.RadToDeg(Math.atan2(d.vy, d.vx));
        this.playerFacing = ['E','SE','S','SW','W','NW','N','NE'][Math.round(((angle+360)%360)/45)%8];
      }

      this.updatePlayerVisual(moving);

      const spot = this.getCurrentHotspot();
      this.currentHotspot = spot;
      this.promptText.setText(spot ? `A/E: ${spot.label}` : 'Elevator — walk to the wall panel');
    }

    getCurrentHotspot() {
      const b = this.playerBody.getBounds();
      const p = { x: this.playerBody.x, y: this.playerBody.y };

      let nearest = null;
      let nearestDist = Infinity;

      for (const h of this.hotspots) {
        const r = new Phaser.Geom.Rectangle(h.x, h.y, h.w, h.h);
        if (Phaser.Geom.Rectangle.Overlaps(r, b) || Phaser.Geom.Rectangle.Contains(r, p.x, p.y)) return h;

        const cx = h.x + h.w / 2;
        const cy = h.y + h.h / 2;
        const d = Phaser.Math.Distance.Between(p.x, p.y, cx, cy);
        const reach = h.reach || 120;
        if (d < reach && d < nearestDist) {
          nearest = h;
          nearestDist = d;
        }
      }

      return nearest;
    }

    handleInteract() {
      if (this.floorMenuOpen) {
        this.confirmFloorSelection();
        return;
      }

      const h = this.currentHotspot || this.getCurrentHotspot();
      if (!h) return;

      if (h.id === 'elevator_panel') {
        this.showFloorPrompt();
        return;
      }

      if (h.id === 'elevator_door_exit') {
        this.exitBackToStation();
        return;
      }
    }

    tryArrest() {
      if (this.floorMenuOpen) {
        this.closeFloorPrompt();
        return;
      }
      this.exitBackToStation();
    }

    showFloorPrompt() {
      this.floorMenuOpen = true;
      this.floorMenuSelection = 0;
      if (this.floorMenu) this.floorMenu.destroy(true);

      this.floorOptions = [
        { label: '1 — MAIN STATION', floorId: 'floor1' },
        { label: '2 — OFFICES / CHIEF OFFICE', floorId: 'floor2' },
        { label: 'B1 — RECORDS / EVIDENCE', floorId: 'b1' },
        { label: 'B3 — MOTOR POOL', floorId: 'motorPool' }
      ];

      const c = this.add.container(VIEW_W / 2, VIEW_H / 2).setScrollFactor(0).setDepth(3000);
      const bg = this.add.rectangle(0, 0, 560, 360, 0x02060a, 0.94).setStrokeStyle(2, COLORS.cyan, 0.9);
      const title = this.add.text(0, -150, 'ELEVATOR PANEL', {
        fontFamily: 'Courier New',
        fontSize: '24px',
        color: '#f4d28a',
        stroke: '#000',
        strokeThickness: 4
      }).setOrigin(0.5);
      const help = this.add.text(0, 150, 'D-PAD/WASD: select  |  A/E: confirm  |  B/ESC: cancel', {
        fontFamily: 'Courier New',
        fontSize: '13px',
        color: '#86e7ff',
        stroke: '#000',
        strokeThickness: 3
      }).setOrigin(0.5);

      c.add([bg, title, help]);
      this.floorMenuRows = [];

      this.floorOptions.forEach((option, index) => {
        const y = -90 + index * 52;
        const box = this.add.rectangle(0, y, 440, 44, 0x111827, 0.95).setStrokeStyle(2, COLORS.amber, 0.85);
        const tx = this.add.text(0, y - 10, option.label, {
          fontFamily: 'Courier New',
          fontSize: '17px',
          color: '#ffffff',
          stroke: '#000',
          strokeThickness: 3
        }).setOrigin(0.5);

        box.setInteractive({ useHandCursor: true });
        box.on('pointerdown', () => {
          this.floorMenuSelection = index;
          this.confirmFloorSelection();
        });

        c.add([box, tx]);
        this.floorMenuRows.push({ box, tx });
      });

      this.floorMenu = c;
      this.registerElevatorUi(c);
      this.cameras.main.ignore(c);
      this.refreshFloorMenuHighlight();
    }

    refreshFloorMenuHighlight() {
      if (!this.floorMenuRows) return;
      this.floorMenuRows.forEach((row, index) => {
        const selected = index === this.floorMenuSelection;
        row.box.setFillStyle(selected ? 0x2d3748 : 0x111827, 0.96);
        row.box.setStrokeStyle(2, selected ? COLORS.neonPink : COLORS.amber, 0.95);
        row.tx.setColor(selected ? '#f4d28a' : '#ffffff');
      });
    }

    moveFloorMenuSelection(delta) {
      if (!this.floorOptions?.length) return;
      this.floorMenuSelection = (this.floorMenuSelection + delta + this.floorOptions.length) % this.floorOptions.length;
      this.refreshFloorMenuHighlight();
    }

    handleMenuMobileInput() {
      const state = {
        up: !!this.mobile.up,
        down: !!this.mobile.down,
        a: !!this.mobile.a,
        b: !!this.mobile.b
      };

      if (state.up && !this.prevMenuInput.up) this.moveFloorMenuSelection(-1);
      if (state.down && !this.prevMenuInput.down) this.moveFloorMenuSelection(1);
      if (state.a && !this.prevMenuInput.a) this.confirmFloorSelection();
      if (state.b && !this.prevMenuInput.b) this.closeFloorPrompt();

      this.prevMenuInput = state;
    }

    handleFloorPromptKey(event) {
      if (!this.floorMenuOpen) return;
      const key = String(event.key || '').toLowerCase();

      if (key === 'escape') {
        this.closeFloorPrompt();
        return;
      }

      if (key === 'arrowup' || key === 'w') {
        this.moveFloorMenuSelection(-1);
        return;
      }

      if (key === 'arrowdown' || key === 's') {
        this.moveFloorMenuSelection(1);
        return;
      }

      if (key === 'enter' || key === 'e' || key === 'a') {
        this.confirmFloorSelection();
        return;
      }

      if (key === '1') this.goToFloor('floor1', 'Elevator: Main station.');
      if (key === '2') this.goToFloor('floor2', 'Elevator: Floor 2 offices.');
      if (key === 'b') this.goToFloor('b1', 'Elevator: B1 records / evidence.');
      if (key === '3') this.goToFloor('motorPool', 'Elevator: B3 motor pool.');
    }

    confirmFloorSelection() {
      const option = this.floorOptions?.[this.floorMenuSelection];
      if (!option) return;
      this.goToFloor(option.floorId, `Elevator: ${option.label}`);
    }

    closeFloorPrompt() {
      this.floorMenuOpen = false;
      if (this.floorMenu) {
        this.floorMenu.destroy(true);
        this.floorMenu = null;
      }
      this.promptText?.setText('Elevator — walk to the wall panel');
    }

    goToFloor(floorId, message = '') {
      const next = POLICE_STATION_LEVEL_ASSETS[floorId] || POLICE_STATION_LEVEL_ASSETS.floor1;
      const spawn = next.spawns.elevator || next.spawns.default;

      if (this.floorMenuOpen) this.closeFloorPrompt();
      if (this.playerBody?.body) this.playerBody.body.setVelocity(0, 0);

      this.cameras.main.fadeOut(190, 0, 0, 0);
      this.time.delayedCall(205, () => {
        this.scene.start('PoliceStationScene', {
          floor: floorId,
          spawn,
          message,
          fromElevatorRoom: true
        });
      });
    }

    exitBackToStation() {
      const current = POLICE_STATION_LEVEL_ASSETS[this.fromFloor] || POLICE_STATION_LEVEL_ASSETS.floor1;
      const spawn = current.spawns.elevator || current.spawns.default;

      if (this.playerBody?.body) this.playerBody.body.setVelocity(0, 0);
      this.cameras.main.fadeOut(150, 0, 0, 0);
      this.time.delayedCall(165, () => {
        this.scene.start('PoliceStationScene', {
          floor: this.fromFloor,
          spawn,
          message: 'Exited elevator.',
          fromElevatorRoom: true
        });
      });
    }
  }

  class ReportScene extends Phaser.Scene {
    constructor(){ super('ReportScene'); }
    create(){ this.cameras.main.setBackgroundColor('#101018'); const g=this.add.graphics(); g.fillStyle(0xe0d0a5,1).fillRoundedRect(100,40,VIEW_W-200,VIEW_H-80,12); g.lineStyle(4,0x2b2117,1).strokeRoundedRect(100,40,VIEW_W-200,VIEW_H-80,12); const items=[["Correct location: Benny's Market",GAME.case.active],["Correct crime: Shoplifting",GAME.case.active],["Suspect arrested: Eddie Cross",GAME.case.suspectArrested],["Evidence collected: stolen cigarettes",GAME.case.evidenceCollected],["Evidence stored in trunk",GAME.case.evidenceInTrunk],["Witness statement: Marlene Pike",GAME.case.witnessStatement]]; let score=0; for(const i of items) if(i[1]) score+=100; if(score>=500&&!GAME.case.reportFiled){ GAME.xp+=score; GAME.case.complete=true; GAME.case.reportFiled=true; GAME.day+=1; } makeText(this,VIEW_W/2,74,'RAVEN HOOK POLICE DEPARTMENT',24,'#2b2117').setOrigin(0.5); makeText(this,VIEW_W/2,110,"INCIDENT REPORT — BENNY'S MARKET SHOPLIFTING",18,'#2b2117').setOrigin(0.5); let y=160; for(const [label,ok] of items){ makeText(this,160,y,`${ok?'✓':'✗'} ${label}`,18,ok?'#134f24':'#7a1c1c'); y+=38; } makeText(this,160,y+10,`REPORT SCORE: ${score} / 600`,22,'#2b2117'); makeText(this,160,y+50,score>=500?'Report accepted. Day advanced. XP awarded.':'Report incomplete. Return to the field and finish the case.',18,score>=500?'#134f24':'#7a1c1c'); makeText(this,VIEW_W/2,VIEW_H-78,'PRESS ENTER / TAP TO RETURN',18,'#2b2117').setOrigin(0.5); this.input.keyboard.once('keydown-ENTER',()=>this.scene.start('PoliceStationScene')); this.input.once('pointerdown',()=>this.scene.start('PoliceStationScene')); }
  }


  class MobileControlsScene extends Phaser.Scene {
    constructor() { super('MobileControlsScene'); }

    create() {
      this.input.addPointer(5);
      this.input.mouse?.disableContextMenu();
      this.activePointerControls = new Map();
      this.drawControls();
    }

    drawControls() {
      this.children.removeAll(true);

      const addBtn = (x, y, label, key, color = 0x111827, radius = 30, font = '18px') => {
        const c = this.add.container(x, y).setScrollFactor(0).setDepth(5000);
        const bg = this.add.circle(0, 0, radius, color, 0.82).setStrokeStyle(2, 0xffffff, 0.65);
        const tx = this.add.text(0, -8, label, {
          fontFamily: 'Courier New',
          fontSize: font,
          color: '#fff',
          stroke: '#000',
          strokeThickness: 3
        }).setOrigin(0.5);

        c.add([bg, tx]);
        c.setSize(radius * 2 + 18, radius * 2 + 18);
        c.setInteractive(new Phaser.Geom.Circle(0, 0, radius + 18), Phaser.Geom.Circle.Contains);
        c.on('pointerdown', (pointer) => {
          this.setControl(key, true);
          this.activePointerControls.set(pointer.id, [key]);
          this.fireAction(key);
        });
        c.on('pointerup', (pointer) => this.releasePointer(pointer));
        c.on('pointerout', (pointer) => this.releasePointer(pointer));
        return c;
      };

      const dX = 96;
      const dY = VIEW_H - 170;
      addBtn(dX, dY - 76, '▲', 'up');
      addBtn(dX, dY + 76, '▼', 'down');
      addBtn(dX - 72, dY, '◀', 'left');
      addBtn(dX + 72, dY, '▶', 'right');

      const bX = VIEW_W - 96;
      const bY = VIEW_H - 258;
      addBtn(bX, bY, 'A', 'a', 0x1f4d2f, 32);
      addBtn(bX - 72, bY + 52, 'B', 'b', 0x4d1f1f, 32);
      addBtn(bX, bY + 104, 'X', 'x', 0x1f314d, 32);
      addBtn(bX + 62, bY + 52, 'Y', 'y', 0x4d3b1f, 32);

      addBtn(VIEW_W - 230, VIEW_H - 326, 'SEL', 'sel', 0x263241, 25, '12px');
      addBtn(VIEW_W - 160, VIEW_H - 326, 'STA', 'sta', 0x263241, 25, '12px');

      this.input.on('pointerup', (pointer) => this.releasePointer(pointer));
      this.input.on('pointerupoutside', (pointer) => this.releasePointer(pointer));
      this.events.on('shutdown', () => resetMobileInputState());
    }

    setControl(key, value) {
      if (key in MOBILE_INPUT_STATE) MOBILE_INPUT_STATE[key] = value;
    }

    releasePointer(pointer) {
      const keys = this.activePointerControls.get(pointer.id);
      if (!keys) return;
      for (const key of keys) this.setControl(key, false);
      this.activePointerControls.delete(pointer.id);
    }

    getTargetScene() {
      for (const key of ['ElevatorRoomScene', 'PoliceStationScene', 'GameScene', 'InteriorScene', 'ReportScene']) {
        const scene = this.scene.get(key);
        if (scene?.scene?.isActive()) return scene;
      }
      return null;
    }

    fireAction(key) {
      const target = this.getTargetScene();
      if (!target) return;

      if (key === 'a') {
        if (typeof target.handleInteract === 'function') {
          target.handleInteract();
          return;
        }
        if (target.scene?.key === 'InteriorScene') {
          target.scene.start('GameScene', {
            fromStationExit: true,
            spawn: target.dataIn?.returnSpawn || { x: 550, y: 675 },
            message: `Exited ${target.dataIn?.title || 'building'}.`
          });
          return;
        }
        if (target.scene?.key === 'ReportScene') {
          target.scene.start('PoliceStationScene');
          return;
        }
      }

      if (key === 'b') {
        if (typeof target.tryArrest === 'function') target.tryArrest();
        else if (typeof target.handleInteract === 'function') target.handleInteract();
        return;
      }

      if (key === 'x') {
        if (typeof target.handleTrunk === 'function') target.handleTrunk();
        else if (target.promptText?.setText) target.promptText.setText('X: station systems placeholder.');
        return;
      }

      if (key === 'y') {
        if (typeof target.tryReport === 'function') target.tryReport();
        else if (target.promptText?.setText) target.promptText.setText('Y: report/evidence shortcut placeholder.');
        return;
      }

      if (key === 'sel' && target.promptText?.setText) target.promptText.setText('SEL: station debug placeholder.');
      if (key === 'sta' && target.promptText?.setText) target.promptText.setText('STA: pause placeholder.');
    }
  }

  new Phaser.Game({ type: Phaser.AUTO, parent: 'game', width: VIEW_W, height: VIEW_H, backgroundColor: '#05070b', pixelArt: true, roundPixels: true, scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }, physics: { default: 'arcade', arcade: { debug: false } }, scene: [TitleScene, PoliceStationScene, ElevatorRoomScene, GameScene, InteriorScene, ReportScene, MobileControlsScene] });
})();
</script>
