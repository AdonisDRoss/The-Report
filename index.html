    createMobileControls() {
      this.input.addPointer(5);
      this.input.mouse?.disableContextMenu();

      this.mobile = {
        up:false, down:false, left:false, right:false,
        a:false, b:false, x:false, y:false, sel:false, sta:false
      };
      this.controlZones = [];
      this.activePointerControls = new Map();

      const addBtn = (x, y, label, key, color=0x111827, radius=30, font='18px') => {
        const c = this.add.container(x, y).setScrollFactor(0).setDepth(2600);
        const bg = this.add.circle(0, 0, radius, color, 0.82).setStrokeStyle(2, 0xffffff, 0.65);
        const tx = this.add.text(0, -8, label, {
          fontFamily: 'Courier New',
          fontSize: font,
          color: '#fff',
          stroke: '#000',
          strokeThickness: 3
        }).setOrigin(0.5);

        c.add([bg, tx]);

        this.registerStationUi(c);
        this.registerStationUi(bg);
        this.registerStationUi(tx);
        this.controlZones.push({ x, y, key, radius: radius + 26 });
        return c;
      };

      const dX = 96;
      const dY = VIEW_H - 170;

      addBtn(dX, dY - 76, '▲', 'up');
      addBtn(dX, dY + 76, '▼', 'down');
      addBtn(dX - 72, dY, '◀', 'left');
      addBtn(dX + 72, dY, '▶', 'right');

      const bX = VIEW_W - 96;
      const bY = VIEW_H - 258;

      addBtn(bX, bY, 'A', 'a', 0x1f4d2f, 32);
      addBtn(bX - 72, bY + 52, 'B', 'b', 0x4d1f1f, 32);
      addBtn(bX, bY + 104, 'X', 'x', 0x1f314d, 32);
      addBtn(bX + 62, bY + 52, 'Y', 'y', 0x4d3b1f, 32);

      addBtn(VIEW_W - 230, VIEW_H - 326, 'SEL', 'sel', 0x263241, 25, '12px');
      addBtn(VIEW_W - 160, VIEW_H - 326, 'STA', 'sta', 0x263241, 25, '12px');

      this.input.on('pointerdown', (pointer) => this.handleStationPointerDown(pointer));
      this.input.on('pointermove', (pointer) => {
        if (!pointer.isDown) return;
        this.clearStationPointer(pointer);
        this.handleStationPointerDown(pointer, false);
      });
      this.input.on('pointerup', (pointer) => this.clearStationPointer(pointer));
      this.input.on('pointerupoutside', (pointer) => this.clearStationPointer(pointer));
    }

    handleStationPointerDown(pointer, fireAction = true) {
      startTheme(this);

      const hits = [];
      for (const z of this.controlZones || []) {
        const dx = pointer.x - z.x;
        const dy = pointer.y - z.y;
        if (Math.hypot(dx, dy) <= z.radius) {
          hits.push(z.key);
          break;
        }
      }

      if (!hits.length) return;

      for (const key of hits) this.mobile[key] = true;
      this.activePointerControls.set(pointer.id, hits);

      if (!fireAction) return;

      if (hits.includes('a')) this.handleInteract();
      if (hits.includes('b')) this.handleInteract();
      if (hits.includes('x')) this.malcolmShoot();
      if (hits.includes('y')) this.ramosSmallTalk();
      if (hits.includes('sel')) this.promptText?.setText('SEL: station debug placeholder.');
      if (hits.includes('sta')) this.promptText?.setText('STA: pause placeholder.');
    }

    clearStationPointer(pointer) {
      const keys = this.activePointerControls?.get(pointer.id);
      if (!keys) return;
      for (const key of keys) this.mobile[key] = false;
      this.activePointerControls.delete(pointer.id);
    }

    createPlayerAnims() {
      if (this.anims.exists('station_malcolm_walk_south')) return;

      if (this.textures.exists(MALCOLM_STATION_ASSET.key)) {
        const rows = [
          ['south', 0],
          ['north', 1],
          ['west', 3],
          ['east', 3]
        ];

        for (const [name, row] of rows) {
          this.anims.create({
            key: `station_malcolm_walk_${name}`,
            frames: this.anims.generateFrameNumbers(MALCOLM_STATION_ASSET.key, {
              start: row * MALCOLM_STATION_ASSET.cols,
              end: row * MALCOLM_STATION_ASSET.cols + MALCOLM_STATION_ASSET.cols - 1
            }),
            frameRate: 10,
            repeat: -1
          });
        }
      }
    }

    frameForFacing() {
      if (this.textures.exists(MALCOLM_STATION_ASSET.key)) {
        const rowByFacing = { S: 0, SW: 3, W: 3, NW: 3, N: 1, NE: 3, E: 3, SE: 3 };
        return (rowByFacing[this.playerFacing] ?? 0) * MALCOLM_STATION_ASSET.cols;
      }

      const rowByFacing = { S: 0, SW: 1, W: 2, NW: 3, N: 4, NE: 5, E: 6, SE: 7 };
      return (rowByFacing[this.playerFacing] || 0) * 6;
    }

    animForFacing() {
      if (this.textures.exists(MALCOLM_STATION_ASSET.key)) {
        const nameByFacing = { S:'south', SW:'east', W:'east', NW:'east', N:'north', NE:'east', E:'east', SE:'east' };
        return `station_malcolm_walk_${nameByFacing[this.playerFacing] || 'south'}`;
      }

      const nameByFacing = { S:'south', SW:'southwest', W:'west', NW:'northwest', N:'north', NE:'northeast', E:'east', SE:'southeast' };
      return `station_detective_walk_${nameByFacing[this.playerFacing] || 'south'}`;
    }

    updatePlayerVisual(moving) {
      const x = this.playerBody.x;
      const y = this.playerBody.y;
      const mirrorLeft = ['W', 'SW', 'NW'].includes(this.playerFacing);

      if (this.playerSprite) {
        this.playerSprite.setPosition(x, y);
        this.playerSprite.setFlipX(mirrorLeft);

        if (this.playerActionUntil && (this.time.now || 0) < this.playerActionUntil) return;
        this.restoreStationPlayerWalkTexture();

        if (moving) {
          const key = this.animForFacing();
          if (this.playerSprite.anims.currentAnim?.key !== key || !this.playerSprite.anims.isPlaying) {
            this.playerSprite.play(key, true);
          }
        } else {
          this.playerSprite.anims.stop();
          this.playerSprite.setFrame(this.frameForFacing());
        }
      }
      if (this.playerFallback) this.playerFallback.setPosition(x, y);
    }



    malcolmShootFrame(facing = this.playerFacing || 'S') {
      const rows = { S:0, SW:2, W:2, NW:2, N:1, NE:3, E:3, SE:3 };
      return (rows[facing] ?? 0) * MALCOLM_SHOOT_ASSET.cols;
    }

    malcolmShootAnimKey(facing = this.playerFacing || 'S') {
      const name = ({ S:'south', SW:'west', W:'west', NW:'west', N:'north', NE:'east', E:'east', SE:'east' })[facing] || 'south';
      return `malcolm_shoot_${name}`;
    }

    createMalcolmShootAnims() {
      if (this.anims.exists('station_malcolm_shoot_south') || !this.textures.exists(MALCOLM_SHOOT_ASSET.key)) return;
      const rows = [['south',0], ['north',1], ['west',2], ['east',3]];
      for (const [name, row] of rows) {
        this.anims.create({
          key: `station_malcolm_shoot_${name}`,
          frames: this.anims.generateFrameNumbers(MALCOLM_SHOOT_ASSET.key, {
            start: row * MALCOLM_SHOOT_ASSET.cols,
            end: row * MALCOLM_SHOOT_ASSET.cols + MALCOLM_SHOOT_ASSET.cols - 1
          }),
          frameRate: 12,
          repeat: 0
        });
      }
    }

    stationMalcolmShootAnimKey(facing = this.playerFacing || 'S') {
      const name = ({ S:'south', SW:'west', W:'west', NW:'west', N:'north', NE:'east', E:'east', SE:'east' })[facing] || 'south';
      return `station_malcolm_shoot_${name}`;
    }

    malcolmShoot() {
      if (this.floorMenuOpen || this.transitionLocked || !this.playerBody) return;
      const now = this.time.now || 0;
      if (now - (this.malcolmLastShotAt || 0) < 380) return;
      this.malcolmLastShotAt = now;

      this.createMalcolmShootAnims();

      if (this.playerSprite && this.textures.exists(MALCOLM_SHOOT_ASSET.key)) {
        this.playerSprite.setTexture(MALCOLM_SHOOT_ASSET.key);
        this.playerSprite.setOrigin(0.5, MALCOLM_SHOOT_ASSET.originY);
        this.playerSprite.setScale(MALCOLM_SHOOT_ASSET.stationScale);
        this.playerSprite.play(this.stationMalcolmShootAnimKey(this.playerFacing), true);
        this.playerActionUntil = now + 520;
      }

      const dir = {
        S:{x:0,y:1}, SW:{x:-0.7,y:0.7}, W:{x:-1,y:0}, NW:{x:-0.7,y:-0.7},
        N:{x:0,y:-1}, NE:{x:0.7,y:-0.7}, E:{x:1,y:0}, SE:{x:0.7,y:0.7}
      }[this.playerFacing || 'S'] || {x:0,y:1};

      const sx = this.playerBody.x + dir.x * 26;
      const sy = this.playerBody.y + dir.y * 26;
      const ex = sx + dir.x * 285;
      const ey = sy + dir.y * 285;

      const tracer = this.add.line(0, 0, sx, sy, ex, ey, 0xffe27a, 0.96).setOrigin(0, 0).setLineWidth(3).setDepth(80);
      const flash = this.add.circle(sx, sy, 10, 0xfff1a6, 0.95).setDepth(81);
      this.tweens.add({ targets:[tracer, flash], alpha:0, duration:135, onComplete:()=>{ tracer.destroy(); flash.destroy(); } });
      this.promptText?.setText('Malcolm fires.');
    }

    restoreStationPlayerWalkTexture() {
      if (!this.playerSprite || !this.textures.exists(MALCOLM_STATION_ASSET.key)) return;
      if (this.playerSprite.texture?.key !== MALCOLM_STATION_ASSET.key) {
        this.playerSprite.setTexture(MALCOLM_STATION_ASSET.key);
        this.playerSprite.setOrigin(0.5, MALCOLM_STATION_ASSET.originY);
        this.playerSprite.setScale(this.stationPlayerScale);
      }
    }

    ramosIsOnDuty() {
      return !!(GAME.ramos && GAME.ramos.onDuty && !GAME.ramos.dismissed);
    }

    ramosFrame(asset, facing) {
      const rows = { S:0, SW:2, W:2, NW:2, N:1, NE:3, E:3, SE:3 };
      return (rows[facing] ?? 0) * asset.cols;
    }

    ramosAnimKey(mode, facing) {
      const name = ({ S:'south', SW:'west', W:'west', NW:'west', N:'north', NE:'east', E:'east', SE:'east' })[facing] || 'south';
      return `ramos_${mode}_${name}`;
    }

    createRamosAnims() {
      if (this.anims.exists('ramos_walk_south')) return;

      const make = (mode, asset, frameRate, repeat) => {
        const rows = [['south',0], ['north',1], ['west',2], ['east',3]];
        for (const [name, row] of rows) {
          this.anims.create({
            key: `ramos_${mode}_${name}`,
            frames: this.anims.generateFrameNumbers(asset.key, {
              start: row * asset.cols,
              end: row * asset.cols + asset.cols - 1
            }),
            frameRate,
            repeat
          });
        }
      };

      if (this.textures.exists(RAMOS_WALK_ASSET.key)) make('walk', RAMOS_WALK_ASSET, 9, -1);
      if (this.textures.exists(RAMOS_TALK_ASSET.key)) make('talk', RAMOS_TALK_ASSET, 7, 0);
      if (this.textures.exists(RAMOS_SHOOT_ASSET.key)) make('shoot', RAMOS_SHOOT_ASSET, 10, 0);
    }

    createRamosCompanion(x, y) {
      this.ramosFacing = this.ramosFacing || 'S';
      this.ramosActionUntil = 0;

      this.ramosBody = this.add.rectangle(x, y, 28, 46, COLORS.purple, 0.0).setDepth(29);
      this.physics.add.existing(this.ramosBody);
      this.ramosBody.body.setCollideWorldBounds(true);
      this.physics.add.collider(this.ramosBody, this.walls);

      if (this.textures.exists(RAMOS_WALK_ASSET.key)) {
        this.createRamosAnims();
        this.ramosSprite = this.add.sprite(x, y, RAMOS_WALK_ASSET.key, this.ramosFrame(RAMOS_WALK_ASSET, this.ramosFacing))
          .setOrigin(0.5, RAMOS_WALK_ASSET.originY)
          .setScale(RAMOS_WALK_ASSET.stationScale || RAMOS_WALK_ASSET.scale)
          .setDepth(30);
      } else {
        this.ramosSprite = this.add.rectangle(x, y, 30, 54, COLORS.purple, 1).setDepth(30);
      }

      this.setRamosVisible(this.ramosIsOnDuty());
    }

    setRamosVisible(on) {
      if (this.ramosBody?.body) this.ramosBody.body.enable = !!on;
      if (this.ramosBody) this.ramosBody.setVisible(false);
      if (this.ramosSprite) this.ramosSprite.setVisible(!!on);
    }

    isRamosNearPlayer(range = 115) {
      if (!this.ramosIsOnDuty() || !this.ramosBody || !this.playerBody) return false;
      return Phaser.Math.Distance.Between(this.playerBody.x, this.playerBody.y, this.ramosBody.x, this.ramosBody.y) <= range;
    }

    ramosFollowOffset() {
      const offsets = {
        S:{x:-58,y:-52}, SW:{x:48,y:-44}, W:{x:66,y:8}, NW:{x:48,y:48},
        N:{x:58,y:54}, NE:{x:-48,y:48}, E:{x:-66,y:8}, SE:{x:-48,y:-44}
      };
      return offsets[this.playerFacing] || offsets.S;
    }

    ramosDirectionFromVector(vx, vy) {
      if (Math.abs(vx) < 0.01 && Math.abs(vy) < 0.01) return this.ramosFacing || 'S';
      const angle = Phaser.Math.RadToDeg(Math.atan2(vy, vx));
      return ['E','SE','S','SW','W','NW','N','NE'][Math.round(((angle+360)%360)/45)%8];
    }

    updateRamosCompanion(time, delta) {
      if (!this.ramosBody) return;

      if (!this.ramosIsOnDuty()) {
        this.setRamosVisible(false);
        return;
      }

      this.setRamosVisible(true);

      const off = this.ramosFollowOffset();
      const tx = this.playerBody.x + off.x;
      const ty = this.playerBody.y + off.y;
      const dx = tx - this.ramosBody.x;
      const dy = ty - this.ramosBody.y;
      const dist = Math.hypot(dx, dy);
      let moving = false;

      if (!this.floorMenuOpen && !this.transitionLocked && dist > 52 && this.ramosBody.body) {
        const speed = dist > 170 ? 235 : 172;
        this.ramosBody.body.setVelocity((dx / dist) * speed, (dy / dist) * speed);
        this.ramosFacing = this.ramosDirectionFromVector(dx, dy);
        moving = true;
      } else if (this.ramosBody.body) {
        this.ramosBody.body.setVelocity(0, 0);
      }

      if (!this.ramosSprite) return;
      this.ramosSprite.setPosition(this.ramosBody.x, this.ramosBody.y);

      if (this.ramosActionUntil && (this.time.now || 0) < this.ramosActionUntil) return;

      if (this.ramosSprite.setTexture && this.ramosSprite.texture?.key !== RAMOS_WALK_ASSET.key) this.ramosSprite.setTexture(RAMOS_WALK_ASSET.key);
      if (moving && this.ramosSprite.play) this.ramosSprite.play(this.ramosAnimKey('walk', this.ramosFacing), true);
      else if (this.ramosSprite.anims) {
        this.ramosSprite.anims.stop();
        if (this.ramosSprite.setFrame) this.ramosSprite.setFrame(this.ramosFrame(RAMOS_WALK_ASSET, this.ramosFacing));
      }
    }

    ramosSpeak(text) {
      this.promptText?.setText(text);
      if (this.ramosSprite && this.textures.exists(RAMOS_TALK_ASSET.key)) {
        this.ramosSprite.setTexture(RAMOS_TALK_ASSET.key);
        this.ramosSprite.play(this.ramosAnimKey('talk', this.ramosFacing || this.playerFacing || 'S'), true);
        this.ramosActionUntil = (this.time.now || 0) + 1500;
      }
    }

    ramosSmallTalk() {
      if (!this.ramosIsOnDuty()) {
        this.promptText?.setText('Ramos is back at the station.');
        return;
      }

      const i = GAME.ramos.smallTalkIndex % RAMOS_SMALL_TALK_LINES.length;
      GAME.ramos.smallTalkIndex += 1;
      this.ramosSpeak(RAMOS_SMALL_TALK_LINES[i]);
    }

    ramosShoot() {
      if (!this.ramosIsOnDuty() || !this.ramosBody) return;
      const now = this.time.now || 0;
      if (now - (this.ramosLastShotAt || 0) < 450) return;
      this.ramosLastShotAt = now;

      if (this.ramosSprite && this.textures.exists(RAMOS_SHOOT_ASSET.key)) {
        this.ramosSprite.setTexture(RAMOS_SHOOT_ASSET.key);
        this.ramosSprite.play(this.ramosAnimKey('shoot', this.ramosFacing || this.playerFacing || 'S'), true);
        this.ramosActionUntil = now + 750;
      }

      const dir = {
        S:{x:0,y:1}, SW:{x:-0.7,y:0.7}, W:{x:-1,y:0}, NW:{x:-0.7,y:-0.7},
        N:{x:0,y:-1}, NE:{x:0.7,y:-0.7}, E:{x:1,y:0}, SE:{x:0.7,y:0.7}
      }[this.ramosFacing || 'S'] || {x:0,y:1};

      const sx = this.ramosBody.x + dir.x * 24;
      const sy = this.ramosBody.y + dir.y * 24;
      const ex = sx + dir.x * 250;
      const ey = sy + dir.y * 250;

      const tracer = this.add.line(0, 0, sx, sy, ex, ey, 0xffe27a, 0.95).setOrigin(0, 0).setLineWidth(3).setDepth(80);
      const flash = this.add.circle(sx, sy, 9, 0xfff1a6, 0.9).setDepth(81);
      this.tweens.add({ targets:[tracer, flash], alpha:0, duration:140, onComplete:()=>{ tracer.destroy(); flash.destroy(); } });
      this.ramosSpeak('Ramos: Covering!');
    }

    ramosActionTalk() {
      if (!this.ramosIsOnDuty()) return false;

      if (!GAME.ramos.introduced) {
        GAME.ramos.introduced = true;
        GAME.ramos.onDuty = true;
        GAME.ramos.dismissed = false;
        GAME.ramos.inCar = false;
        this.ramosSpeak("Ramos: Detective King? Elena Ramos. Captain assigned me to ride with you. I’m your new partner.");
        return true;
      }

      if (this.floorId === 'floor1') {
        GAME.ramos.onDuty = false;
        GAME.ramos.dismissed = true;
        GAME.ramos.inCar = false;
        this.setRamosVisible(false);
        this.promptText?.setText("Malcolm: You’re relieved for now, Ramos. Ramos: I’ll report back to the station.");
        return true;
      }

      this.ramosSmallTalk();
      return true;
    }

    inputDir() {
      const left = this.keys.left.isDown || this.keys.arrowLeft.isDown || this.mobile.left;
      const right = this.keys.right.isDown || this.keys.arrowRight.isDown || this.mobile.right;
      const up = this.keys.up.isDown || this.keys.arrowUp.isDown || this.mobile.up;
      const down = this.keys.down.isDown || this.keys.arrowDown.isDown || this.mobile.down;
      let vx = (right ? 1 : 0) - (left ? 1 : 0);
      let vy = (down ? 1 : 0) - (up ? 1 : 0);
      const len = Math.hypot(vx, vy) || 1;
      return { vx: vx / len, vy: vy / len };
    }

    update(time, delta) {
      if (this.pauseMenuOpen) {
        setActorPauseVelocity(this);
        this.updatePlayerVisual(false);
        this.updateRamosCompanion(time, delta);
        return;
      }

      if (this.transitionCooldown > 0) this.transitionCooldown -= delta || 16;

      if (this.floorMenuOpen) {
        if (this.playerBody?.body) this.playerBody.body.setVelocity(0, 0);
        this.updatePlayerVisual(false);
        return;
      }

      const d = this.inputDir();
      const moving = Math.abs(d.vx) > 0.01 || Math.abs(d.vy) > 0.01;
      this.playerBody.body.setVelocity(d.vx * 240, d.vy * 240);

      if (moving) {
        const angle = Phaser.Math.RadToDeg(Math.atan2(d.vy, d.vx));
        this.playerFacing = ['E','SE','S','SW','W','NW','N','NE'][Math.round(((angle+360)%360)/45)%8];
      }

      this.updatePlayerVisual(moving);
      this.updateRamosCompanion(time, delta);
      this.updateStationPoliceNPCs(delta);

      if (this.checkElevatorDoorTransition()) return;
      this.checkAutoTransitions();

      const spot = this.getCurrentHotspot();
      this.currentHotspot = spot;
      this.promptText.setText(spot ? `A/E: ${spot.label}` : `${this.floorData.title} | A/E interact`);
    }

    getCurrentHotspot() {
      const b = this.playerBody.getBounds();
      const p = { x: this.playerBody.x, y: this.playerBody.y };

      let nearest = null;
      let nearestDist = Infinity;

      for (const h of this.hotspots) {
        const r = new Phaser.Geom.Rectangle(h.x, h.y, h.w, h.h);
        if (Phaser.Geom.Rectangle.Overlaps(r, b) || Phaser.Geom.Rectangle.Contains(r, p.x, p.y)) return h;

        const cx = h.x + h.w / 2;
        const cy = h.y + h.h / 2;
        const d = Phaser.Math.Distance.Between(p.x, p.y, cx, cy);
        const reach = h.reach || 120;
        if (d < reach && d < nearestDist) {
          nearest = h;
          nearestDist = d;
        }
      }

      return nearest;
    }

    getStrictHotspot(ids = []) {
      const b = this.playerBody.getBounds();
      const p = { x: this.playerBody.x, y: this.playerBody.y };

      for (const h of this.hotspots) {
        if (ids.length && !ids.includes(h.id)) continue;

        const r = new Phaser.Geom.Rectangle(h.x, h.y, h.w, h.h);
        if (Phaser.Geom.Rectangle.Overlaps(r, b) || Phaser.Geom.Rectangle.Contains(r, p.x, p.y)) return h;
      }

      return null;
    }

    getElevatorDoorZone() {
      if (this.floorId === 'floor2') {
        // Directly in front of the visible elevator door/cab on Floor 2.
        return { x:700, y:35, w:360, h:345 };
      }

      // Do not auto-warp on Floor 1/B1/Motor Pool.
      // Their elevator spawns sit near the elevator, so auto-warp would loop immediately.
      // Those floors still enter the elevator with A/E through handleInteract().
      return null;
    }

    playerInRectZone(zone) {
      if (!zone || !this.playerBody) return false;
      const b = this.playerBody.getBounds();
      const p = { x: this.playerBody.x, y: this.playerBody.y };
      const r = new Phaser.Geom.Rectangle(zone.x, zone.y, zone.w, zone.h);
      return Phaser.Geom.Rectangle.Overlaps(r, b) || Phaser.Geom.Rectangle.Contains(r, p.x, p.y);
    }

    checkElevatorDoorTransition() {
      if (this.transitionLocked || this.floorMenuOpen || this.transitionCooldown > 0) return false;
      if (!this.playerInRectZone(this.getElevatorDoorZone())) return false;
      this.enterElevatorRoom();
      return true;
    }

    enterElevatorRoom() {
      if (this.transitionLocked || this.floorMenuOpen) return;
      this.transitionLocked = true;
      if (this.playerBody?.body) this.playerBody.body.setVelocity(0, 0);
      this.promptText?.setText('Entering elevator...');
      this.cameras.main.fadeOut(140, 0, 0, 0);
      this.time.delayedCall(150, () => {
        this.scene.start('ElevatorRoomScene', {
          fromFloor: this.floorId,
          message: 'Entered elevator.'
        });
      });
    }

    checkAutoTransitions() {
      if (this.transitionLocked || this.floorMenuOpen || this.transitionCooldown > 0) return;

      const h = this.getStrictHotspot(['stairs_to_floor2', 'stairs_to_floor1', 'station_exit_main']);
      if (!h) return;

      this.transitionLocked = true;
      if (this.playerBody?.body) this.playerBody.body.setVelocity(0, 0);

      if (h.id === 'station_exit_main') {
        this.scene.start('GameScene', {
          fromStationExit: true,
          spawn: { x: 1010, y: 570 },
          message: 'Exited Raven Hook Police Station.'
        });
        return;
      }

      if (h.id === 'stairs_to_floor2') {
        this.changeStationFloor('floor2', 'stairsFromFloor1', 'Came up the stairs to Floor 2.');
        return;
      }

      if (h.id === 'stairs_to_floor1') {
        this.changeStationFloor('floor1', 'stairsFromFloor2', 'Came down the stairs to Floor 1.');
        return;
      }
    }

    handleInteract() {
      if (this.floorMenuOpen) return;

      // Check for nearby station police NPC first
      const nearNpc = this.getNearestStationNpc(80);
      if (nearNpc) { this.promptText?.setText(`Officer: ${nearNpc.label}`); return; }

      if (this.isRamosNearPlayer() && (!GAME.ramos.introduced || !this.currentHotspot)) {
        if (this.ramosActionTalk()) return;
      }

      const h = this.currentHotspot || this.getCurrentHotspot();
      if (!h) {
        if (this.isRamosNearPlayer()) {
          this.ramosActionTalk();
          return;
        }
        if (this.playerInRectZone(this.getElevatorDoorZone())) this.enterElevatorRoom();
        return;
      }

      if (h.id === 'station_exit_main') {
        this.scene.start('GameScene', {
          fromStationExit: true,
          spawn: { x: 1010, y: 570 },
          message: 'Exited Raven Hook Police Station.'
        });
        return;
      }

      if (h.id === 'station_elevator') {
        this.enterElevatorRoom();
        return;
      }

      if (h.id === 'stairs_to_floor2' || h.id === 'stairs_to_floor1') {
        this.promptText.setText('Walk onto the stairs to change floors.');
        return;
      }

      if (h.id === 'station_phone') {
        this.promptText.setText('Station phone ready. Beeper callbacks will plug in here.');
        return;
      }

      if (h.id === 'report_room') {
        this.scene.start('ReportScene');
        return;
      }

      if (h.id === 'evidence_intake') {
        this.promptText.setText('Evidence intake ready. Chain-of-custody system plugs in here.');
        return;
      }

      if (h.id === 'holding_cells') {
        this.promptText.setText('Holding cells ready. Arrested suspects will appear here.');
        return;
      }

      if (h.id === 'task_force_room') {
        this.promptText.setText("Malcolm's task force room is empty for now.");
        return;
      }

      this.promptText.setText(h.label || this.floorData.title);
    }

    showFloorPrompt() {
      this.floorMenuOpen = true;
      if (this.floorMenu) this.floorMenu.destroy(true);

      const c = this.add.container(VIEW_W / 2, VIEW_H / 2).setScrollFactor(0).setDepth(3000);
      const bg = this.add.rectangle(0, 0, 520, 300, 0x02060a, 0.92).setStrokeStyle(2, COLORS.cyan, 0.9);
      const title = this.add.text(0, -120, 'ELEVATOR', {
        fontFamily: 'Courier New',
        fontSize: '24px',
        color: '#f4d28a',
        stroke: '#000',
        strokeThickness: 4
      }).setOrigin(0.5);
      const help = this.add.text(0, 118, 'Keyboard: 2 / B / 3   |   Tap a floor   |   ESC closes', {
        fontFamily: 'Courier New',
        fontSize: '13px',
        color: '#86e7ff',
        stroke: '#000',
        strokeThickness: 3
      }).setOrigin(0.5);

      c.add([bg, title, help]);

      const addOption = (y, label, floorId) => {
        const box = this.add.rectangle(0, y, 420, 48, 0x111827, 0.95).setStrokeStyle(2, COLORS.amber, 0.85);
        const tx = this.add.text(0, y - 10, label, {
          fontFamily: 'Courier New',
          fontSize: '17px',
          color: '#ffffff',
          stroke: '#000',
          strokeThickness: 3
        }).setOrigin(0.5);
        box.setInteractive({ useHandCursor: true });
        box.on('pointerdown', () => this.changeStationFloor(floorId, 'elevator', `Elevator: ${label}`));
        c.add([box, tx]);
      };

      addOption(-80, '1 — LOBBY / FRONT DESK',      'floor1');
      addOption(-25, '2 — OFFICES / CHIEF OFFICE', 'floor2');
      addOption( 30, 'B1 — RECORDS / EVIDENCE',   'b1');
      addOption( 85, 'B3 — MOTOR POOL',           'motorPool');

      this.floorMenu = c;
      this.registerStationUi(c);
      this.cameras.main.ignore(c);
    }

    handleFloorPromptKey(event) {
      if (!this.floorMenuOpen) return;
      const key = String(event.key || '').toLowerCase();

      if (key === 'escape') {
        this.closeFloorPrompt();
        return;
      }

      if (key === '1') {
        this.changeStationFloor('floor1', 'elevator', 'Elevator: Floor 1 lobby.');
        return;
      }

      if (key === '2') {
        this.changeStationFloor('floor2', 'elevator', 'Elevator: Floor 2 offices.');
        return;
      }

      if (key === '3' || key === 'b') {
        this.changeStationFloor('b1', 'elevator', 'Elevator: B1 records / evidence.');
        return;
      }

      if (key === '4') {
        this.changeStationFloor('motorPool', 'elevator', 'Elevator: B3 motor pool.');
        return;
      }
    }

    closeFloorPrompt() {
      this.floorMenuOpen = false;
      if (this.floorMenu) {
        this.floorMenu.destroy(true);
        this.floorMenu = null;
      }
      this.promptText?.setText(this.floorData.title);
    }

    changeStationFloor(floorId, spawnKey = 'elevator', message = '') {
      const next = POLICE_STATION_LEVEL_ASSETS[floorId] || POLICE_STATION_LEVEL_ASSETS.floor1;
      const spawn = next.spawns[spawnKey] || next.spawns.default;
      this.scene.start('PoliceStationScene', {
        floor: floorId,
        spawn,
        message,
        fromAutoTransition: spawnKey && spawnKey.startsWith('stairs')
      });
    }

    createStationPoliceNPCs() {
      if (this.stationNpcs?.length > 0) return;
      const cfgs = [
        { routeKey:'frontDesk',   assetKey:'rhpd_f_light_01', label:'Desk is open. Sign in at the front.' },
        { routeKey:'recordsHall', assetKey:'rhpd_m_01',       label:'Records is down the hall, left side.' },
        { routeKey:'hallway',     assetKey:'rhpd_f_dark_01',  label:'Keep moving. No loitering.' },
        { routeKey:'upstairs',    assetKey:'rhpd_f_light_02', label:'Detectives are upstairs — Floor 2.' },
      ];
      for (let i = 0; i < Math.min(cfgs.length, MAX_STATION_POLICE); i++) {
        const cfg = cfgs[i];
        const route = POLICE_STATION_NPC_ROUTES[cfg.routeKey];
        if (!route?.length) continue;
        const start = route[0];
        const body = this.add.rectangle(start.x, start.y, 28, 44, 0x0000ff, 0).setDepth(29);
        this.physics.add.existing(body);
        if (body.body) body.body.setCollideWorldBounds(true);
        this.physics.add.collider(body, this.walls);
        let sprite;
        if (this.textures.exists(cfg.assetKey)) {
          if (!this.anims.exists(`snpc_walk_south_${cfg.assetKey}`)) {
            for (const [name, row] of [['south',0],['north',4],['west',2],['east',6]]) {
              this.anims.create({
                key: `snpc_walk_${name}_${cfg.assetKey}`,
                frames: this.anims.generateFrameNumbers(cfg.assetKey, { start: row * 4, end: row * 4 + 3 }),
                frameRate: 7, repeat: -1
              });
            }
          }
          sprite = this.add.sprite(start.x, start.y, cfg.assetKey, 0)
            .setOrigin(0.5, 0.88).setScale(POLICE_NPC_SCALE).setDepth(30);
        } else {
          sprite = this.add.rectangle(start.x, start.y, 28, 50, 0x2255aa, 1)
            .setStrokeStyle(2, 0x88bbff, 0.8).setDepth(30);
        }
        this.stationNpcs.push({
          body, sprite, assetKey: cfg.assetKey,
          route, routeIndex: 0,
          facing: 'S',
          pauseTimer: Phaser.Math.Between(600, 1600),
          label: cfg.label,
        });
      }
    }

    updateStationPoliceNPCs(delta = 16) {
      if (!this.stationNpcs?.length || this.floorMenuOpen) return;
      for (const npc of this.stationNpcs) {
        if (!npc.body) continue;
        const bx = npc.body.x, by = npc.body.y;
        if (npc.sprite?.setPosition) npc.sprite.setPosition(bx, by);
        else if (npc.sprite) { npc.sprite.x = bx; npc.sprite.y = by; }
        if (npc.pauseTimer > 0) {
          npc.pauseTimer -= delta;
          if (npc.body.body) npc.body.body.setVelocity(0, 0);
          if (npc.sprite?.anims?.isPlaying) npc.sprite.anims.stop();
          if (npc.sprite?.setFrame && this.textures.exists(npc.assetKey)) {
            npc.sprite.setFrame((NPC_DIR_ROW[npc.facing] ?? 0) * 4);
          }
          continue;
        }
        const target = npc.route[npc.routeIndex];
        if (!target) continue;
        const dx = target.x - bx, dy = target.y - by, d = Math.hypot(dx, dy);
        if (d < 10) {
          npc.routeIndex = (npc.routeIndex + 1) % npc.route.length;
          npc.pauseTimer = Phaser.Math.Between(800, 2400);
          if (npc.body.body) npc.body.body.setVelocity(0, 0);
          continue;
        }
        if (npc.body.body) npc.body.body.setVelocity((dx / d) * 68, (dy / d) * 68);
        const ang = Phaser.Math.RadToDeg(Math.atan2(dy, dx));
        npc.facing = ['E','SE','S','SW','W','NW','N','NE'][Math.round(((ang + 360) % 360) / 45) % 8];
        if (npc.sprite?.anims && this.textures.exists(npc.assetKey)) {
          const name = ({S:'south',SW:'west',W:'west',NW:'west',N:'north',NE:'east',E:'east',SE:'east'})[npc.facing] || 'south';
          const key = `snpc_walk_${name}_${npc.assetKey}`;
          if (npc.sprite.anims.currentAnim?.key !== key || !npc.sprite.anims.isPlaying) {
            npc.sprite.play(key, true);
          }
        }
      }
    }

    getNearestStationNpc(range = 80) {
      if (!this.stationNpcs?.length || !this.playerBody) return null;
      const px = this.playerBody.x, py = this.playerBody.y;
      for (const npc of this.stationNpcs) {
        if (!npc.body) continue;
        if (Math.hypot(npc.body.x - px, npc.body.y - py) <= range) return npc;
      }
      return null;
    }
  }




  class ElevatorRoomScene extends Phaser.Scene {
    constructor() { super('ElevatorRoomScene'); }
    init(data) { this.entryData = data || {}; }

    preload() {
      if (!this.cache.audio.exists(THEME_ASSET.key)) this.load.audio(THEME_ASSET.key, A(THEME_ASSET.path));
      this.load.image(ELEVATOR_ROOM_ASSET.key, A(ELEVATOR_ROOM_ASSET.path));

      if (!this.textures.exists(MALCOLM_STATION_ASSET.key)) {
        this.load.spritesheet(MALCOLM_STATION_ASSET.key, A(MALCOLM_STATION_ASSET.path), {
          frameWidth: MALCOLM_STATION_ASSET.frameWidth,
          frameHeight: MALCOLM_STATION_ASSET.frameHeight
        });
      }

      if (!this.cache.audio.exists(THEME_ASSET.key)) {
        this.load.audio(THEME_ASSET.key, A(THEME_ASSET.path));
      }
    }

    create() {
      this.roomW = ELEVATOR_ROOM_ASSET.width;
      this.roomH = ELEVATOR_ROOM_ASSET.height;
      this.fromFloor = POLICE_STATION_LEVEL_ASSETS[this.entryData.fromFloor] ? this.entryData.fromFloor : 'floor1';
      this.mobile = MOBILE_INPUT_STATE;
      this.floorMenuOpen = false;
      this.floorMenuSelection = 0;
      this.prevMenuInput = { up:false, down:false, a:false, b:false };
      this.uiObjects = [];

      this.physics.world.setBounds(0, 0, this.roomW, this.roomH);
      this.cameras.main.setBounds(0, 0, this.roomW, this.roomH);
      this.cameras.main.setBackgroundColor('#05070b');

      this.add.image(0, 0, ELEVATOR_ROOM_ASSET.key)
        .setOrigin(0, 0)
        .setDisplaySize(this.roomW, this.roomH)
        .setDepth(0);

      const spawn = ELEVATOR_ROOM_ASSET.spawn;
      this.playerBody = this.add.rectangle(spawn.x, spawn.y, 42, 64, COLORS.blue, 0).setDepth(30);
      this.physics.add.existing(this.playerBody);
      this.playerBody.body.setCollideWorldBounds(true);

      this.playerFacing = spawn.facing || 'N';
      this.playerSprite = null;
      this.createPlayerAnims();

      if (this.textures.exists(MALCOLM_STATION_ASSET.key)) {
        this.playerSprite = this.add.sprite(spawn.x, spawn.y, MALCOLM_STATION_ASSET.key, this.frameForFacing())
          .setOrigin(0.5, MALCOLM_STATION_ASSET.originY)
          .setScale(MALCOLM_STATION_ASSET.scale)
          .setDepth(31);
      } else {
        this.playerFallback = this.add.rectangle(spawn.x, spawn.y, 42, 64, COLORS.blue, 1).setDepth(31);
      }

      this.hotspots = [ELEVATOR_ROOM_ASSET.panelHotspot, ELEVATOR_ROOM_ASSET.doorHotspot];

      this.keys = this.input.keyboard.addKeys({
        up: 'W', down: 'S', left: 'A', right: 'D',
        arrowUp: 'UP', arrowDown: 'DOWN', arrowLeft: 'LEFT', arrowRight: 'RIGHT',
        interact: 'E', enter: 'ENTER'
      });

      this.promptBg = this.add.rectangle(VIEW_W / 2, VIEW_H - 38, 760, 42, 0x02060a, 0.72)
        .setScrollFactor(0)
        .setDepth(2000);
      this.promptText = makeText(this, VIEW_W / 2, VIEW_H - 47, this.entryData.message || 'Elevator — walk to the wall panel', 15, '#f4d28a', true)
        .setOrigin(0.5)
        .setDepth(2001);
      this.infoText = makeText(this, 18, 18, 'ELEVATOR | A/E use panel | Door exits back to current floor', 14, '#86e7ff', true)
        .setDepth(2001);

      this.registerElevatorUi(this.promptBg);
      this.registerElevatorUi(this.promptText);
      this.registerElevatorUi(this.infoText);

      this.input.keyboard.on('keydown-E', () => this.handleInteract());
      this.input.keyboard.on('keydown-ENTER', () => this.handleInteract());
      this.input.keyboard.on('keydown-A', () => this.handleInteract());
      this.input.keyboard.on('keydown', (event) => this.handleFloorPromptKey(event));

      launchGlobalMobileControls(this);
      installPauseMenu(this);
      this.time.delayedCall(100, () => startTheme(this));
      this.input.once('pointerdown', () => startTheme(this));

      this.cameras.main.roundPixels = true;
      this.cameras.main.startFollow(this.playerBody, true, CAMERA.followLerp, CAMERA.followLerp);
      this.cameras.main.setDeadzone(42, 32);
      this.cameras.main.setZoom(0.78);
      this.cameras.main.fadeIn(180, 0, 0, 0);
    }

    registerElevatorUi(obj) {
      if (!obj) return obj;
      if (!this.uiObjects) this.uiObjects = [];
      if (!this.uiObjects.includes(obj)) this.uiObjects.push(obj);
      if (obj.setScrollFactor) obj.setScrollFactor(0);
      if (obj.setDepth && obj.depth < 2000) obj.setDepth(2000);
      if (this.cameras?.main) this.cameras.main.ignore(obj);
      return obj;
    }

    createPlayerAnims() {
      if (this.anims.exists('station_malcolm_walk_south')) return;
      if (!this.textures.exists(MALCOLM_STATION_ASSET.key)) return;

      const rows = [
        ['south', 0],
        ['north', 1],
        ['west', 3],
        ['east', 3]
      ];

      for (const [name, row] of rows) {
        this.anims.create({
          key: `station_malcolm_walk_${name}`,
          frames: this.anims.generateFrameNumbers(MALCOLM_STATION_ASSET.key, {
            start: row * MALCOLM_STATION_ASSET.cols,
            end: row * MALCOLM_STATION_ASSET.cols + MALCOLM_STATION_ASSET.cols - 1
          }),
          frameRate: 10,
          repeat: -1
        });
      }
    }

    frameForFacing() {
      const rowByFacing = { S: 0, SW: 0, SE: 0, N: 1, NW: 1, NE: 1, W: 3, E: 3 };
      const row = rowByFacing[this.playerFacing] ?? 0;
      return row * MALCOLM_STATION_ASSET.cols;
    }

    animForFacing() {
      if (this.playerFacing === 'N' || this.playerFacing === 'NW' || this.playerFacing === 'NE') return 'station_malcolm_walk_north';
      if (this.playerFacing === 'W' || this.playerFacing === 'SW') return 'station_malcolm_walk_west';
      if (this.playerFacing === 'E' || this.playerFacing === 'SE') return 'station_malcolm_walk_east';
      return 'station_malcolm_walk_south';
    }

    updatePlayerVisual(moving = false) {
      const x = this.playerBody.x;
      const y = this.playerBody.y;

      if (this.playerSprite) {
        this.playerSprite.setPosition(x, y);
        if (this.playerFacing === 'W' || this.playerFacing === 'SW' || this.playerFacing === 'NW') this.playerSprite.setFlipX(true);
        else this.playerSprite.setFlipX(false);

        if (moving) this.playerSprite.play(this.animForFacing(), true);
        else {
          this.playerSprite.anims.stop();
          this.playerSprite.setFrame(this.frameForFacing());
        }
      }

      if (this.playerFallback) this.playerFallback.setPosition(x, y);
    }

    inputDir() {
      const left = this.keys.left.isDown || this.keys.arrowLeft.isDown || this.mobile.left;
      const right = this.keys.right.isDown || this.keys.arrowRight.isDown || this.mobile.right;
      const up = this.keys.up.isDown || this.keys.arrowUp.isDown || this.mobile.up;
      const down = this.keys.down.isDown || this.keys.arrowDown.isDown || this.mobile.down;

      let vx = 0;
      let vy = 0;
      if (left) vx -= 1;
      if (right) vx += 1;
      if (up) vy -= 1;
      if (down) vy += 1;

      const len = Math.hypot(vx, vy) || 1;
      return { vx: vx / len, vy: vy / len };
    }

    update(time, delta) {
      if (this.pauseMenuOpen) {
        setActorPauseVelocity(this);
        this.updatePlayerVisual(false);
        return;
      }

      if (this.floorMenuOpen) {
        if (this.playerBody?.body) this.playerBody.body.setVelocity(0, 0);
        this.updatePlayerVisual(false);
        this.handleMenuMobileInput();
        return;
      }

      const d = this.inputDir();
      const moving = Math.abs(d.vx) > 0.01 || Math.abs(d.vy) > 0.01;
      this.playerBody.body.setVelocity(d.vx * 230, d.vy * 230);

      if (moving) {
        const angle = Phaser.Math.RadToDeg(Math.atan2(d.vy, d.vx));
        this.playerFacing = ['E','SE','S','SW','W','NW','N','NE'][Math.round(((angle+360)%360)/45)%8];
      }

      this.updatePlayerVisual(moving);

      const spot = this.getCurrentHotspot();
      this.currentHotspot = spot;
      this.promptText.setText(spot ? `A/E: ${spot.label}` : 'Elevator — walk to the wall panel');
    }

    getCurrentHotspot() {
      const b = this.playerBody.getBounds();
      const p = { x: this.playerBody.x, y: this.playerBody.y };

      let nearest = null;
      let nearestDist = Infinity;

      for (const h of this.hotspots) {
        const r = new Phaser.Geom.Rectangle(h.x, h.y, h.w, h.h);
        if (Phaser.Geom.Rectangle.Overlaps(r, b) || Phaser.Geom.Rectangle.Contains(r, p.x, p.y)) return h;

        const cx = h.x + h.w / 2;
        const cy = h.y + h.h / 2;
        const d = Phaser.Math.Distance.Between(p.x, p.y, cx, cy);
        const reach = h.reach || 120;
        if (d < reach && d < nearestDist) {
          nearest = h;
          nearestDist = d;
        }
      }

      return nearest;
    }

    handleInteract() {
      if (this.floorMenuOpen) {
        this.confirmFloorSelection();
        return;
      }

      const h = this.currentHotspot || this.getCurrentHotspot();
      if (!h) return;

      if (h.id === 'elevator_panel') {
        this.showFloorPrompt();
        return;
      }

      if (h.id === 'elevator_door_exit') {
        this.exitBackToStation();
        return;
      }
    }

    tryArrest() {
      if (this.floorMenuOpen) {
        this.closeFloorPrompt();
        return;
      }
      this.exitBackToStation();
    }

    showFloorPrompt() {
      this.floorMenuOpen = true;
      this.floorMenuSelection = 0;
      if (this.floorMenu) this.floorMenu.destroy(true);

      this.floorOptions = [
        { label: '1 — MAIN STATION', floorId: 'floor1' },
        { label: '2 — OFFICES / CHIEF OFFICE', floorId: 'floor2' },
        { label: 'B1 — RECORDS / EVIDENCE', floorId: 'b1' },
        { label: 'B3 — MOTOR POOL', floorId: 'motorPool' }
      ];

      const c = this.add.container(VIEW_W / 2, VIEW_H / 2).setScrollFactor(0).setDepth(3000);
      const bg = this.add.rectangle(0, 0, 560, 360, 0x02060a, 0.94).setStrokeStyle(2, COLORS.cyan, 0.9);
      const title = this.add.text(0, -150, 'ELEVATOR PANEL', {
        fontFamily: 'Courier New',
        fontSize: '24px',
        color: '#f4d28a',
        stroke: '#000',
        strokeThickness: 4
      }).setOrigin(0.5);
      const help = this.add.text(0, 150, 'D-PAD/WASD: select  |  A/E: confirm  |  B/ESC: cancel', {
        fontFamily: 'Courier New',
        fontSize: '13px',
        color: '#86e7ff',
        stroke: '#000',
        strokeThickness: 3
      }).setOrigin(0.5);

      c.add([bg, title, help]);
      this.floorMenuRows = [];

      this.floorOptions.forEach((option, index) => {
        const y = -90 + index * 52;
        const box = this.add.rectangle(0, y, 440, 44, 0x111827, 0.95).setStrokeStyle(2, COLORS.amber, 0.85);
        const tx = this.add.text(0, y - 10, option.label, {
          fontFamily: 'Courier New',
          fontSize: '17px',
          color: '#ffffff',
          stroke: '#000',
          strokeThickness: 3
        }).setOrigin(0.5);

        box.setInteractive({ useHandCursor: true });
        box.on('pointerdown', () => {
          this.floorMenuSelection = index;
          this.confirmFloorSelection();
        });

        c.add([box, tx]);
        this.floorMenuRows.push({ box, tx });
      });

      this.floorMenu = c;
      this.registerElevatorUi(c);
      this.cameras.main.ignore(c);
      this.refreshFloorMenuHighlight();
    }

    refreshFloorMenuHighlight() {
      if (!this.floorMenuRows) return;
      this.floorMenuRows.forEach((row, index) => {
        const selected = index === this.floorMenuSelection;
        row.box.setFillStyle(selected ? 0x2d3748 : 0x111827, 0.96);
        row.box.setStrokeStyle(2, selected ? COLORS.neonPink : COLORS.amber, 0.95);
        row.tx.setColor(selected ? '#f4d28a' : '#ffffff');
      });
    }

    moveFloorMenuSelection(delta) {
      if (!this.floorOptions?.length) return;
      this.floorMenuSelection = (this.floorMenuSelection + delta + this.floorOptions.length) % this.floorOptions.length;
      this.refreshFloorMenuHighlight();
    }

    handleMenuMobileInput() {
      const state = {
        up: !!this.mobile.up,
        down: !!this.mobile.down,
        a: !!this.mobile.a,
        b: !!this.mobile.b
      };

      if (state.up && !this.prevMenuInput.up) this.moveFloorMenuSelection(-1);
      if (state.down && !this.prevMenuInput.down) this.moveFloorMenuSelection(1);
      if (state.a && !this.prevMenuInput.a) this.confirmFloorSelection();
      if (state.b && !this.prevMenuInput.b) this.closeFloorPrompt();

      this.prevMenuInput = state;
    }

    handleFloorPromptKey(event) {
      if (!this.floorMenuOpen) return;
      const key = String(event.key || '').toLowerCase();

      if (key === 'escape') {
        this.closeFloorPrompt();
        return;
      }

      if (key === 'arrowup' || key === 'w') {
        this.moveFloorMenuSelection(-1);
        return;
      }

      if (key === 'arrowdown' || key === 's') {
        this.moveFloorMenuSelection(1);
        return;
      }

      if (key === 'enter' || key === 'e' || key === 'a') {
        this.confirmFloorSelection();
        return;
      }

      if (key === '1') this.goToFloor('floor1', 'Elevator: Main station.');
      if (key === '2') this.goToFloor('floor2', 'Elevator: Floor 2 offices.');
      if (key === 'b') this.goToFloor('b1', 'Elevator: B1 records / evidence.');
      if (key === '3') this.goToFloor('motorPool', 'Elevator: B3 motor pool.');
    }

    confirmFloorSelection() {
      const option = this.floorOptions?.[this.floorMenuSelection];
      if (!option) return;
      this.goToFloor(option.floorId, `Elevator: ${option.label}`);
    }

    closeFloorPrompt() {
      this.floorMenuOpen = false;
      if (this.floorMenu) {
        this.floorMenu.destroy(true);
        this.floorMenu = null;
      }
      this.promptText?.setText('Elevator — walk to the wall panel');
    }

    goToFloor(floorId, message = '') {
      const next = POLICE_STATION_LEVEL_ASSETS[floorId] || POLICE_STATION_LEVEL_ASSETS.floor1;
      const spawn = next.spawns.elevator || next.spawns.default;

      if (this.floorMenuOpen) this.closeFloorPrompt();
      if (this.playerBody?.body) this.playerBody.body.setVelocity(0, 0);

      this.cameras.main.fadeOut(190, 0, 0, 0);
      this.time.delayedCall(205, () => {
        this.scene.start('PoliceStationScene', {
          floor: floorId,
          spawn,
          message,
          fromElevatorRoom: true
        });
      });
    }

    exitBackToStation() {
      const current = POLICE_STATION_LEVEL_ASSETS[this.fromFloor] || POLICE_STATION_LEVEL_ASSETS.floor1;
      const spawn = current.spawns.elevator || current.spawns.default;

      if (this.playerBody?.body) this.playerBody.body.setVelocity(0, 0);
      this.cameras.main.fadeOut(150, 0, 0, 0);
      this.time.delayedCall(165, () => {
        this.scene.start('PoliceStationScene', {
          floor: this.fromFloor,
          spawn,
          message: 'Exited elevator.',
          fromElevatorRoom: true
        });
      });
    }
  }

      let vy = Number.isFinite(car.velocityY) ? car.velocityY : (car.vy || 0);
      let heading = Number.isFinite(car.heading) ? car.heading : -Math.PI / 2;

      const fx = Math.cos(heading);
      const fy = Math.sin(heading);

      // Project current movement onto the nose direction.
      let forwardSpeed = vx * fx + vy * fy;

      if (input.throttle > 0 && GAME.car.fuel > 0) {
        forwardSpeed += h.accel * dt;
        GAME.car.fuel = Math.max(0, GAME.car.fuel - dt * (0.65 + Math.abs(forwardSpeed) / 410));
      } else if (input.throttle < 0) {

        if (input.handbrake) turnPower *= h.handbrakeTurnBoost;

      const dfy = Math.sin(heading);

      const desiredVY = dfy * forwardSpeed;

      car.velocityX = vx;
      car.velocityY = vy;
      car.vx = vx;
      car.vy = vy;

    if (String(modelKey).includes('solara')) { body = '#671818'; roof = '#1a1113'; }
    if (String(modelKey).includes('sterling')) { body = '#101217'; roof = '#07080a'; }
    if (String(modelKey).includes('halcyon')) { body = '#5b2028'; roof = '#171013'; }
    if (isTruck) { body = '#6a6d68'; roof = '#252827'; }
    if (isTaxi) { body = '#d59b24'; roof = '#70440f'; }
    if (isPolice) { body = '#e7e2d6'; roof = '#111923'; }
    if (isPlayer) { body = '#15191f'; roof = '#07090e'; }

    function rr(x, y, w, h, r, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fillStyle = fill;
      ctx.fill();
      if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }

    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(64, 70, isTruck ? 34 : 29, isTruck ? 56 : 51, 0, 0, Math.PI * 2); ctx.fill();

    rr(isTruck ? 37 : 41, 16, isTruck ? 54 : 46, 96, 12, body, '#080808');
    ctx.fillStyle = roof;
    ctx.fillRect(45, 18, 38, 13);
    ctx.fillRect(46, 55, 36, 21);

      ctx.fillRect(42, 17, 44, 18);

    ctx.fillRect(35, 25, 8, 18); ctx.fillRect(85, 25, 8, 18);
    ctx.fillRect(35, 86, 8, 20); ctx.fillRect(85, 86, 8, 20);

  if (typeof PLAYER_CAR_HEAVY_HANDLING === 'undefined') {

  if (typeof GameScene !== 'undefined') {

    GameScene.prototype.updateHeavyBrakeLights = function(dt, braking) {
      this.ensureHeavyVehicleEffects();
      const target = braking ? 1 : 0;
      const rate = braking ? 8.5 : 5.0; // delayed fade, not instant.
      this.brakeLightLevel += (target - this.brakeLightLevel) * Math.min(1, dt * rate);

      const g = this.carBrakeLightGraphics;

      const sideY = Math.sin(heading + Math.PI / 2) * 16;
      const alpha = 0.25 + this.brakeLightLevel * 0.55;
      const x1 = this.car.x + bx + sideX;
      const y1 = this.car.y + by + sideY;
      const x2 = this.car.x + bx - sideX;
      const y2 = this.car.y + by - sideY;

      g.fillStyle(0xff1010, alpha);
      g.fillCircle(x1, y1, 5 + 3 * this.brakeLightLevel);

    GameScene.prototype.addHeavySkidMark = function(speed, lateralSlip, handbrake) {
      this.ensureHeavyVehicleEffects();
      if (!this.car || speed < 65) return;
      if (!handbrake && Math.abs(lateralSlip) < PLAYER_CAR_HEAVY_HANDLING.skidThreshold) return;

      const heading = this.car.heading || 0;
      const rearX = this.car.x + Math.cos(heading + Math.PI) * 43;
      const rearY = this.car.y + Math.sin(heading + Math.PI) * 43;
      const sideX = Math.cos(heading + Math.PI / 2) * 15;
      const sideY = Math.sin(heading + Math.PI / 2) * 15;

      this.skidMarks.push({
        x1: rearX + sideX,
        y1: rearY + sideY,
        x2: rearX - sideX,
        y2: rearY - sideY,
        life: handbrake ? 5.8 : 3.2,
        width: handbrake ? 5 : 3,
        alpha: handbrake ? 0.42 : 0.26
      });

      if (this.skidMarks.length > 190) this.skidMarks.splice(0, this.skidMarks.length - 190);
    };

    GameScene.prototype.renderHeavySkidMarks = function(dt) {
      this.ensureHeavyVehicleEffects();
      const g = this.carSkidGraphics;
      g.clear();
      if (!this.skidMarks?.length) return;

      for (let i = this.skidMarks.length - 1; i >= 0; i--) {
        const m = this.skidMarks[i];
        m.life -= dt;
        if (m.life <= 0) {
          this.skidMarks.splice(i, 1);
          continue;
        }
        const fade = Math.min(1, m.life / 2.5);
        g.lineStyle(m.width, 0x070707, m.alpha * fade);
        g.beginPath();
        g.moveTo(m.x1, m.y1);
        g.lineTo(m.x2, m.y2);
        g.strokePath();
      }
    };

    GameScene.prototype.updateHeavyBodyRollVisual = function(dt, lateralSlip, angularVelocity, speed) {
      if (!this.carSingleSprite) return;
      const rollForce = Phaser.Math.Clamp((angularVelocity * speed * 0.075) + (lateralSlip * 0.018), -7, 7);
      this.car.currentBodyRoll = Phaser.Math.Linear(this.car.currentBodyRoll || 0, rollForce, Math.min(1, dt * 7));
      // Local X shift because the sprite lives inside the rotating car container.
      this.carSingleSprite.setPosition(Phaser.Math.Clamp(this.car.currentBodyRoll, -6, 6), 0);
    };

    // Replacement car physics: mass-scaled force + angular inertia + speed/mass grip loss.
    GameScene.prototype.updateCar = function(dt) {
      if (!this.car) return;
      if (dt > 1) dt = dt / 1000;
      dt = Phaser.Math.Clamp(dt || 0, 0, 0.05);

      this.setupPlayerTopDownCarSprite?.();
      this.resetPlayerCarPhysicsState?.();
      this.ensureHeavyVehicleEffects();

      const h = PLAYER_CAR_HEAVY_HANDLING;
      const input = this.readPlayerCarInput ? this.readPlayerCarInput() : { throttle: 0, steering: 0, handbrake: false };
      const car = this.car;

      const prevX = car.x;
      const prevY = car.y;
      car.prevX = prevX;
      car.prevY = prevY;

      let vx = Number.isFinite(car.velocityX) ? car.velocityX : (car.vx || 0);
      let vy = Number.isFinite(car.velocityY) ? car.velocityY : (car.vy || 0);
      let heading = Number.isFinite(car.heading) ? car.heading : -Math.PI / 2;
      let angularVelocity = Number.isFinite(car.angularVelocity) ? car.angularVelocity : 0;

      const forwardX = Math.cos(heading);
      const forwardY = Math.sin(heading);
      const sideX = Math.cos(heading + Math.PI / 2);
      const sideY = Math.sin(heading + Math.PI / 2);

      let forwardSpeed = vx * forwardX + vy * forwardY;
      const lateralSpeed = vx * sideX + vy * sideY;
      const speedMag = Math.hypot(vx, vy);

      // F = ma. Larger mass = slower response.
      let appliedForce = 0;
      if (input.throttle > 0 && GAME.car.fuel > 0) {
        appliedForce = h.engineForce;
        GAME.car.fuel = Math.max(0, GAME.car.fuel - dt * (0.45 + speedMag / 440));
      } else if (input.throttle < 0) {
        appliedForce = forwardSpeed > 12 ? -h.brakingForce : -h.reverseForce;
      }

      forwardSpeed += (appliedForce / h.mass) * dt;
      forwardSpeed *= Math.pow(h.rollingResistance, dt * 60);
      forwardSpeed = Phaser.Math.Clamp(forwardSpeed, -h.reverseMaxSpeed, h.maxSpeed);

      // Steering builds angular velocity instead of immediately rotating.
      if (Math.abs(forwardSpeed) > h.minTurnSpeed) {
        const reverseFlip = forwardSpeed >= 0 ? 1 : -1;
        const speedSteerFactor = Phaser.Math.Clamp(Math.abs(forwardSpeed) / 175, 0.25, 1.0);
        let torque = input.steering * h.steeringPower * speedSteerFactor * reverseFlip;
        if (input.handbrake) torque *= h.handbrakeTurnBoost;
        angularVelocity += torque * dt / (h.mass / 1550);
      }

      const angularDamping = input.handbrake ? 0.90 : h.angularDamping;
      angularVelocity *= Math.pow(angularDamping, dt * 60);
      angularVelocity = Phaser.Math.Clamp(angularVelocity, -3.1, 3.1);
      heading += angularVelocity * dt;

      // Mass/speed drops side grip. Handbrake drops it further.
      const momentumFactor = (Math.abs(forwardSpeed) * (h.mass / 1000)) / 900;
      let grip = h.gripBase - momentumFactor;
      grip = Math.max(input.handbrake ? h.handbrakeGripMin : h.gripMin, grip);

      const newForwardX = Math.cos(heading);
      const newForwardY = Math.sin(heading);
      const desiredVX = newForwardX * forwardSpeed;
      const desiredVY = newForwardY * forwardSpeed;

      const blend = 1 - Math.pow(grip, dt * 60);
      vx = vx + (desiredVX - vx) * blend;
      vy = vy + (desiredVY - vy) * blend;

      const maxVel = h.maxSpeed * 1.12;
      const velMag = Math.hypot(vx, vy);
      if (velMag > maxVel) {
        vx = (vx / velMag) * maxVel;
        vy = (vy / velMag) * maxVel;
      }

      car.heading = heading;
      car.angularVelocity = angularVelocity;
      car.velocityX = vx;
      car.velocityY = vy;
      car.vx = vx;
      car.vy = vy;
      car.speed = forwardSpeed;
      car.isHandbraking = input.handbrake;
      car.isBraking = input.throttle < 0;

      if (car.body) car.body.setVelocity(vx, vy);
      car.setRotation(heading + Math.PI / 2);

      // Heavy-feel visuals.
      const lateralSlip = vx * Math.cos(heading + Math.PI / 2) + vy * Math.sin(heading + Math.PI / 2);
      this.addHeavySkidMark(Math.hypot(vx, vy), lateralSlip, input.handbrake);
      this.renderHeavySkidMarks(dt);
      this.updateHeavyBrakeLights(dt, input.throttle < 0);
      this.updateHeavyBodyRollVisual(dt, lateralSlip, angularVelocity, Math.hypot(vx, vy));

      const movingSpeed = Math.hypot(vx, vy);
      const targetZoom = movingSpeed > 240 ? CAMERA.carFastZoom : (movingSpeed > 135 ? CAMERA.carMidZoom : CAMERA.carSlowZoom);
      this.cameras.main.setZoom(Phaser.Math.Linear(this.cameras.main.zoom, targetZoom, 0.045));

      this.lastCarPhysicsDebug = {
        speed: Math.round(movingSpeed),
        forwardSpeed: Math.round(forwardSpeed),
        grip: Math.round(grip * 100) / 100,
        mass: h.mass,
        angularVelocity: Math.round(angularVelocity * 100) / 100,
        lateralSlip: Math.round(lateralSlip),
        headingDeg: Math.round(Phaser.Math.RadToDeg(heading))
      };
    };

    // More forceful wall impact response.

      const vx = this.car.velocityX ?? this.car.vx ?? 0;
      const vy = this.car.velocityY ?? this.car.vy ?? 0;
      const spd = Math.hypot(vx, vy);

      this.car.velocityX = vx * -0.18;
      this.car.velocityY = vy * -0.18;
      this.car.vx = this.car.velocityX;
      this.car.vy = this.car.velocityY;
      this.car.speed = (this.car.speed || 0) * 0.28;
      this.car.angularVelocity = (this.car.angularVelocity || 0) * -0.35;

  // VEHICLE_SKIDS_DAMAGE_AI_COLLISION_PATCH_001:
  // Persistent tire skid canvas + bumper momentum transfer + damage/sparks + smoother waypoint AI.
  // Applies to Malcolm/player-vs-traffic interactions; NPC route graph remains intact.

  const VEHICLE_PHYSICS_PROFILE = {
    meridian_sentinel_lx: { mass: 1850, w: 80, h: 132 },
    meridian_sentinel_patrol: { mass: 1950, w: 76, h: 124 },
    blackthorne_regent: { mass: 1550, w: 72, h: 120 },

    fairline_metro: { mass: 1050, w: 66, h: 108 },
    ironcrest_hauler: { mass: 2350, w: 82, h: 132 },
    halcyon_crown_imperial: { mass: 2050, w: 80, h: 132 },
    sterling_diplomat: { mass: 2100, w: 80, h: 132 },
    solara_mirage: { mass: 1350, w: 76, h: 124 },
    northstar_vantage: { mass: 1550, w: 78, h: 128 }
  };

  function rhVehicleModelIdFromKey(key) {
    return String(key || '')
      .replace(/_top(_128)?$/, '')
      .replace(/^traffic_/, '')
      .replace(/^vehicle_/, '');
  }

  function rhGetVehiclePhysicsProfile(modelKey) {
    const id = rhVehicleModelIdFromKey(modelKey);
    const byId = VEHICLE_PHYSICS_PROFILE[id];
    if (byId) return byId;
    const meta = (typeof rhVehicleMetaFor === 'function') ? rhVehicleMetaFor(modelKey) : null;
    return { mass: 1500, w: meta?.w || 72, h: meta?.h || 120 };
  }

  function rhAngleWrap(a) {
    while (a < -Math.PI) a += Math.PI * 2;
    while (a > Math.PI) a -= Math.PI * 2;
    return a;

  if (typeof GameScene !== 'undefined') {
    GameScene.prototype.ensurePersistentSkidCanvas = function() {
      if (this.persistentSkidLayer) return;
      const key = 'persistent_tire_skid_canvas';
      try {
        if (!this.textures.exists(key)) {
          const tex = this.textures.createCanvas(key, WORLD_W, WORLD_H);
          const ctx = tex.getContext();
          ctx.clearRect(0, 0, WORLD_W, WORLD_H);
          tex.refresh();
        }
        this.persistentSkidTexture = this.textures.get(key);
        this.persistentSkidCtx = this.persistentSkidTexture.getContext();
        this.persistentSkidLayer = this.add.image(0, 0, key)
          .setOrigin(0, 0)
          .setDepth(24)
          .setAlpha(0.84);
        this.persistentSkidDirty = false;
      } catch (err) {
        // Mobile-safe fallback: one retained graphics layer. It is capped by drawing only high-slip events.
        this.persistentSkidFallbackGraphics = this.add.graphics().setDepth(24);
        this.persistentSkidLayer = this.persistentSkidFallbackGraphics;
      }
    };

    GameScene.prototype.drawPersistentSkidSegment = function(x1, y1, x2, y2, intensity = 0.5, width = 4) {
      this.ensurePersistentSkidCanvas();
      intensity = Phaser.Math.Clamp(intensity, 0.08, 1);
      if (this.persistentSkidCtx && this.persistentSkidTexture) {
        const ctx = this.persistentSkidCtx;
        ctx.save();
        ctx.strokeStyle = `rgba(12, 12, 15, ${0.16 + intensity * 0.30})`;
        ctx.lineWidth = width;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        ctx.restore();
        this.persistentSkidDirty = true;
      } else if (this.persistentSkidFallbackGraphics) {
        this.persistentSkidFallbackGraphics.lineStyle(width, 0x09090b, 0.18 + intensity * 0.26);
        this.persistentSkidFallbackGraphics.beginPath();
        this.persistentSkidFallbackGraphics.moveTo(x1, y1);
        this.persistentSkidFallbackGraphics.lineTo(x2, y2);
        this.persistentSkidFallbackGraphics.strokePath();
      }
    };

    GameScene.prototype.flushPersistentSkidCanvas = function() {

    GameScene.prototype.addPersistentWheelSkidsForPlayer = function() {
      if (!this.inCar || !this.car) return;
      const car = this.car;
      const vx = car.velocityX ?? car.vx ?? 0;
      const vy = car.velocityY ?? car.vy ?? 0;
      const speed = Math.hypot(vx, vy);
      if (speed < 55) {
        car._lastSkidLeft = null;
        car._lastSkidRight = null;
        return;
      }

      const heading = car.heading || 0;
      const travelAngle = Math.atan2(vy, vx);
      const angularDeviation = Math.abs(Math.sin(heading - travelAngle));
      const lateralSlip = vx * Math.cos(heading + Math.PI / 2) + vy * Math.sin(heading + Math.PI / 2);
      const intensity = Phaser.Math.Clamp(angularDeviation * (speed / 115) + Math.abs(lateralSlip) / 210 + (car.isHandbraking ? 0.38 : 0), 0, 1);

      if (intensity < 0.16) {
        car._lastSkidLeft = null;
        car._lastSkidRight = null;
        return;
      }

      const rearX = car.x + Math.cos(heading + Math.PI) * 43;
      const rearY = car.y + Math.sin(heading + Math.PI) * 43;
      const sideX = Math.cos(heading + Math.PI / 2) * 16;
      const sideY = Math.sin(heading + Math.PI / 2) * 16;
      const left = { x: rearX + sideX, y: rearY + sideY };
      const right = { x: rearX - sideX, y: rearY - sideY };

      if (car._lastSkidLeft && car._lastSkidRight) {
        const width = car.isHandbraking ? 5 : 4;
        this.drawPersistentSkidSegment(car._lastSkidLeft.x, car._lastSkidLeft.y, left.x, left.y, intensity, width);
        this.drawPersistentSkidSegment(car._lastSkidRight.x, car._lastSkidRight.y, right.x, right.y, intensity, width);
      }
      car._lastSkidLeft = left;
      car._lastSkidRight = right;
    };

    GameScene.prototype.ensureVehicleDamageEffects = function() {
