<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>The Report — Raven Hook Central v0.3 Layered Build</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05070b;
      font-family: "Courier New", monospace;
      touch-action: none;
      user-select: none;
    }
    #game { width: 100vw; height: 100vh; }
    canvas { image-rendering: pixelated; }
  </style>
</head>
<body>
<div id="game"></div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script>
(() => {
  const VIEW_W = 960;
  const VIEW_H = 540;
  const WORLD_W = 2048;
  const WORLD_H = 1536;

  const COLORS = {
    white: 0xffffff,
    black: 0x000000,
    blue: 0x3d7dff,
    cyan: 0x45e6ff,
    pink: 0xff4fab,
    red: 0xff3f45,
    green: 0x55ff7a,
    yellow: 0xffdf59,
    orange: 0xff9a3d,
    purple: 0xb86cff,
    road: 0x161b22,
    building: 0x1d242d,
    buildingStroke: 0x6b7380,
    glass: 0x16344c,
    neonBlue: 0x4bbcff,
    neonPink: 0xff4fb8,
    amber: 0xffbd55
  };

  const GAME = {
    day: 1,
    xp: 0,
    rank: "Detective Trainee",
    car: { fuel: 76, damage: 0, trunk: [] },
    case: {
      id: "bennys_shoplifting",
      active: false,
      complete: false,
      suspectArrested: false,
      evidenceCollected: false,
      evidenceInTrunk: false,
      witnessStatement: false,
      reportFiled: false
    }
  };

  const RH_CENTRAL_V03 = {
    id: "rh_central_v03",
    name: "Raven Hook Central v0.3",
    width: WORLD_W,
    height: WORLD_H,
    layers: {
      ground: "assets/maps/rh_central_ground.png",
      buildingsRef: "assets/reference/layer_02_building_exterior_sheet.png",
      interiorsRef: "assets/reference/layer_03_interior_blocks_sheet.png",
      rooftopsRef: "assets/reference/layer_04_rooftop_blocks_sheet.png",
      propsRef: "assets/reference/layer_05_props_sheet.png",
      collisionMaskRef: "assets/reference/layer_06_collision_navigation_mask.png",
      interactionMaskRef: "assets/reference/layer_07_interaction_zones_mask.png",
      spawnMaskRef: "assets/reference/layer_08_spawn_placement_mask.png"
    },
    campuses: {
      "RH-CEN-01": { name: "Precinct Block", type: "station", x: 0, y: 0, w: 1024, h: 1536 },
      "RH-CEN-02": { name: "Market Block", type: "patrol", x: 1024, y: 0, w: 1024, h: 1536 }
    }
  };

  // Production collision rectangles. These are the real gameplay blockers.
  const COLLISION_RECTS = [
    { id: "precinct", x: 285, y: 155, w: 565, h: 430, type: "building" },
    { id: "garage", x: 725, y: 145, w: 210, h: 315, type: "building" },
    { id: "report_room", x: 205, y: 905, w: 320, h: 300, type: "building" },
    { id: "evidence_dropoff", x: 610, y: 910, w: 315, h: 295, type: "building" },
    { id: "bennys_market", x: 1180, y: 150, w: 640, h: 430, type: "building" },
    { id: "bennys_loading_dock", x: 1810, y: 215, w: 145, h: 390, type: "large_prop" },
    { id: "red_gull_diner", x: 1140, y: 835, w: 420, h: 300, type: "building" },
    { id: "laundromat", x: 1630, y: 835, w: 285, h: 310, type: "building" },
    { id: "payphone_blocker", x: 1580, y: 1185, w: 70, h: 78, type: "large_prop" },
    { id: "north_left_curb", x: 0, y: 0, w: 2048, h: 40, type: "curb" },
    { id: "south_left_curb", x: 0, y: 1496, w: 2048, h: 40, type: "curb" }
  ];

  const INTERACTION_ZONES = [
    { id: "precinct_front", x: 500, y: 585, w: 100, h: 70, type: "door", target: "precinct_interior", label: "Precinct Entrance" },
    { id: "garage_door", x: 772, y: 462, w: 110, h: 60, type: "door", target: "garage_interior", label: "Garage" },
    { id: "precinct_roof_access", x: 820, y: 245, w: 70, h: 130, type: "roof", target: "precinct_roof", label: "Precinct Roof" },
    { id: "detective_trunk", x: 485, y: 770, w: 130, h: 115, type: "trunk", label: "Trunk" },
    { id: "report_room_door", x: 340, y: 1210, w: 110, h: 60, type: "door", target: "report_room", label: "Report Room" },
    { id: "report_desk", x: 280, y: 1020, w: 190, h: 105, type: "report", label: "Report Desk" },
    { id: "evidence_door", x: 720, y: 1210, w: 110, h: 60, type: "door", target: "evidence_dropoff", label: "Evidence Door" },
    { id: "evidence_counter", x: 685, y: 1020, w: 190, h: 105, type: "evidence_dropoff", label: "Evidence Counter" },
    { id: "bennys_front", x: 1415, y: 575, w: 130, h: 70, type: "door", target: "bennys_interior", label: "Benny's Front" },
    { id: "bennys_back", x: 1805, y: 365, w: 70, h: 120, type: "door", target: "bennys_backdoor", label: "Benny's Back Door" },
    { id: "bennys_roof_ladder", x: 1758, y: 195, w: 85, h: 120, type: "roof", target: "bennys_roof", label: "Benny's Roof" },
    { id: "bennys_shoplifting_trigger", x: 1300, y: 255, w: 320, h: 210, type: "crime_trigger", crime: "bennys_shoplifting", label: "Shoplifting Trigger" },
    { id: "bennys_evidence", x: 1510, y: 380, w: 80, h: 80, type: "evidence", evidenceId: "stolen_cigarettes", label: "Stolen Cigarettes" },
    { id: "bennys_witness", x: 1370, y: 505, w: 115, h: 80, type: "witness", npcId: "marlene_pike", label: "Clerk Witness" },
    { id: "red_gull_front", x: 1305, y: 1145, w: 120, h: 65, type: "door", target: "red_gull_interior", label: "Red Gull" },
    { id: "red_gull_witness", x: 1280, y: 1020, w: 135, h: 95, type: "witness", npcId: "diner_witness", label: "Diner Witness" },
    { id: "laundromat_front", x: 1740, y: 1148, w: 110, h: 65, type: "door", target: "laundromat_interior", label: "Laundromat" },
    { id: "payphone", x: 1575, y: 1185, w: 95, h: 95, type: "payphone", label: "Payphone" },
    { id: "loading_dock", x: 1815, y: 360, w: 120, h: 220, type: "loading_dock", label: "Loading Dock" }
  ];

  const SPAWN_POINTS = [
    { id: "player_start", x: 550, y: 675, type: "player" },
    { id: "detective_sedan", x: 535, y: 815, type: "vehicle", vehicle: "unmarked_sedan" },
    { id: "backup_sedan", x: 815, y: 525, type: "vehicle", vehicle: "backup_sedan" },
    { id: "precinct_worker", x: 465, y: 670, type: "pedestrian" },
    { id: "bennys_suspect", x: 1390, y: 345, type: "suspect", npc: "eddie_cross" },
    { id: "bennys_suspect_flee", x: 1810, y: 530, type: "suspect_flee" },
    { id: "bennys_clerk", x: 1395, y: 520, type: "witness", npc: "marlene_pike" },
    { id: "stolen_cigarettes", x: 1535, y: 410, type: "evidence", evidence: "stolen_cigarettes" },
    { id: "diner_witness", x: 1330, y: 1035, type: "witness", npc: "diner_witness" },
    { id: "laundromat_civilian", x: 1770, y: 1180, type: "pedestrian" },
    { id: "traffic_west_entry", x: -40, y: 760, type: "traffic_spawn" },
    { id: "traffic_east_exit", x: 2090, y: 760, type: "traffic_despawn" },
    { id: "traffic_east_entry", x: 2090, y: 1320, type: "traffic_spawn" },
    { id: "traffic_west_exit", x: -40, y: 1320, type: "traffic_despawn" }
  ];

  const VEHICLES = {
    unmarked_sedan: {
      mass: 1.25,
      topSpeed: 430,
      acceleration: 520,
      brakeForce: 680,
      friction: 0.985,
      traction: 0.074,
      steeringRate: 2.95,
      damageResistance: 1.0
    }
  };

  function makeText(scene, x, y, value, size = 16, color = "#fff", fixed = false) {
    const t = scene.add.text(x, y, value, {
      fontFamily: "Courier New",
      fontSize: `${size}px`,
      color,
      stroke: "#000",
      strokeThickness: 3,
      wordWrap: { width: 900 }
    });
    if (fixed) t.setScrollFactor(0).setDepth(2000);
    return t;
  }

  function rectOverlapsSprite(rect, sprite) {
    return Phaser.Geom.Rectangle.Overlaps(
      new Phaser.Geom.Rectangle(rect.x, rect.y, rect.w, rect.h),
      sprite.getBounds()
    );
  }

  function distance(a, b) { return Phaser.Math.Distance.Between(a.x, a.y, b.x, b.y); }
  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

  class TitleScene extends Phaser.Scene {
    constructor() { super("TitleScene"); }
    preload() {
      this.load.image("ground", RH_CENTRAL_V03.layers.ground);
    }
    create() {
      this.cameras.main.setBackgroundColor("#05070b");
      const g = this.add.graphics();
      g.fillStyle(0x05070b, 1).fillRect(0, 0, VIEW_W, VIEW_H);
      for (let i = 0; i < 24; i++) {
        const x = Phaser.Math.Between(-40, VIEW_W);
        const h = Phaser.Math.Between(60, 250);
        const w = Phaser.Math.Between(30, 80);
        g.fillStyle(0x0e1720, 1).fillRect(x, VIEW_H - 150 - h, w, h);
        if (i % 3 === 0) g.fillStyle(COLORS.neonPink, 0.55).fillRect(x + 6, VIEW_H - 150 - h + 22, w - 12, 3);
        if (i % 4 === 0) g.fillStyle(COLORS.cyan, 0.45).fillRect(x + 6, VIEW_H - 150 - h + 48, w - 12, 3);
      }
      g.fillStyle(0x111827, 1).fillRect(0, VIEW_H - 145, VIEW_W, 145);
      g.lineStyle(4, COLORS.amber, 0.65).lineBetween(0, VIEW_H - 78, VIEW_W, VIEW_H - 78);
      makeText(this, VIEW_W / 2, 88, "THE REPORT", 58, "#f4d28a").setOrigin(0.5);
      makeText(this, VIEW_W / 2, 150, "RAVEN HOOK CENTRAL v0.3", 24, "#86e7ff").setOrigin(0.5);
      makeText(this, VIEW_W / 2, 194, "LAYERED PRODUCTION MAP TEST", 18, "#ff78bd").setOrigin(0.5);
      makeText(this, VIEW_W / 2, 245, "Precinct → Market → Crime → Evidence → Trunk → Report", 18, "#ffffff").setOrigin(0.5);
      makeText(this, VIEW_W / 2, 325, "ENTER / TAP TO START", 24, "#f4d28a").setOrigin(0.5);
      makeText(this, VIEW_W / 2, 388, "Debug: C collision | I interactions | P spawns | M map overlay refs", 15, "#eeeeee").setOrigin(0.5);
      this.input.keyboard.once("keydown-ENTER", () => this.scene.start("GameScene"));
      this.input.once("pointerdown", () => this.scene.start("GameScene"));
    }
  }

  class GameScene extends Phaser.Scene {
    constructor() { super("GameScene"); }

    preload() {
      this.load.image("ground", RH_CENTRAL_V03.layers.ground);
      this.load.image("layer02", RH_CENTRAL_V03.layers.buildingsRef);
      this.load.image("layer03", RH_CENTRAL_V03.layers.interiorsRef);
      this.load.image("layer04", RH_CENTRAL_V03.layers.rooftopsRef);
      this.load.image("layer05", RH_CENTRAL_V03.layers.propsRef);
      this.load.image("layer06", RH_CENTRAL_V03.layers.collisionMaskRef);
      this.load.image("layer07", RH_CENTRAL_V03.layers.interactionMaskRef);
      this.load.image("layer08", RH_CENTRAL_V03.layers.spawnMaskRef);
    }

    create() {
      this.physics.world.setBounds(0, 0, WORLD_W, WORLD_H);
      this.cameras.main.setBounds(0, 0, WORLD_W, WORLD_H);
      this.cameras.main.setBackgroundColor("#070b10");

      this.keys = this.input.keyboard.addKeys({
        up: "W", down: "S", left: "A", right: "D",
        arrowUp: "UP", arrowDown: "DOWN", arrowLeft: "LEFT", arrowRight: "RIGHT",
        interact: "E", arrest: "SPACE", trunk: "T", report: "R",
        debugCollision: "C", debugInteract: "I", debugSpawns: "P", debugMap: "M"
      });

      this.mobile = { up: false, down: false, left: false, right: false, a: false, b: false, x: false, y: false };
      this.inCar = false;
      this.message = "Start at Raven Hook Precinct. Enter the unmarked sedan or drive to Benny's Market.";
      this.objective = "Reach Benny's Market and trigger the shoplifting case.";
      this.dispatch = "Raven Hook Dispatch: Central patrol is active.";
      this.messageTimer = 4500;
      this.shiftMinutes = 8 * 60;
      this.playerInventory = [];
      this.closestZone = null;
      this.debug = { collision: false, interaction: false, spawns: false, mapRef: false };
      this.debugGraphics = this.add.graphics().setDepth(1100);

      this.add.image(0, 0, "ground").setOrigin(0, 0).setDisplaySize(WORLD_W, WORLD_H).setDepth(0);
      this.drawProductionPlaceholders();
      this.createCollision();
      this.createEntities();
      this.createHUD();
      this.createMobileControls();
      this.bindKeys();

      this.cameras.main.startFollow(this.player, true, 0.08, 0.08);
      this.cameras.main.setZoom(0.82);
    }

    bindKeys() {
      this.input.keyboard.on("keydown-E", () => this.handleInteract());
      this.input.keyboard.on("keydown-SPACE", () => this.tryArrest());
      this.input.keyboard.on("keydown-T", () => this.handleTrunk());
      this.input.keyboard.on("keydown-R", () => this.tryReport());
      this.input.keyboard.on("keydown-C", () => { this.debug.collision = !this.debug.collision; this.redrawDebug(); });
      this.input.keyboard.on("keydown-I", () => { this.debug.interaction = !this.debug.interaction; this.redrawDebug(); });
      this.input.keyboard.on("keydown-P", () => { this.debug.spawns = !this.debug.spawns; this.redrawDebug(); });
      this.input.keyboard.on("keydown-M", () => { this.debug.mapRef = !this.debug.mapRef; this.toggleReferenceOverlay(); });
    }

    drawProductionPlaceholders() {
      const g = this.add.graphics().setDepth(2);
      const drawB = (r, label, color, neon) => {
        g.fillStyle(color, 0.88).fillRoundedRect(r.x, r.y, r.w, r.h, 10);
        g.lineStyle(3, neon, 0.95).strokeRoundedRect(r.x, r.y, r.w, r.h, 10);
        g.fillStyle(0x000000, 0.32).fillRect(r.x + 8, r.y + r.h - 42, r.w - 16, 34);
        makeText(this, r.x + r.w / 2, r.y + r.h - 33, label, 16, "#ffffff").setOrigin(0.5).setDepth(3);
      };
      drawB({ x: 285, y: 155, w: 565, h: 430 }, "RAVEN HOOK PRECINCT", 0x1c2a37, COLORS.neonBlue);
      drawB({ x: 725, y: 145, w: 210, h: 315 }, "GARAGE", 0x222931, COLORS.neonBlue);
      drawB({ x: 205, y: 905, w: 320, h: 300 }, "REPORT ROOM", 0x2a2420, COLORS.amber);
      drawB({ x: 610, y: 910, w: 315, h: 295 }, "EVIDENCE DROP-OFF", 0x202a2f, COLORS.cyan);
      drawB({ x: 1180, y: 150, w: 640, h: 430 }, "BENNY'S MARKET", 0x2a222d, COLORS.neonPink);
      drawB({ x: 1810, y: 215, w: 145, h: 390 }, "LOADING", 0x1e2024, COLORS.amber);
      drawB({ x: 1140, y: 835, w: 420, h: 300 }, "RED GULL DINER", 0x321e22, COLORS.red);
      drawB({ x: 1630, y: 835, w: 285, h: 310 }, "LAUNDROMAT", 0x1d3139, COLORS.cyan);
      g.fillStyle(0x101419, 0.8).fillRoundedRect(1580, 1185, 70, 78, 6);
      g.lineStyle(2, COLORS.neonPink, 1).strokeRoundedRect(1580, 1185, 70, 78, 6);
      makeText(this, 1615, 1270, "PAYPHONE", 12, "#ffb6df").setOrigin(0.5).setDepth(3);
    }

    createCollision() {
      this.walls = this.physics.add.staticGroup();
      COLLISION_RECTS.forEach(r => {
        if (r.type === "curb") return;
        const rect = this.add.rectangle(r.x + r.w / 2, r.y + r.h / 2, r.w, r.h, 0xff0000, 0);
        rect.setData("id", r.id);
        this.physics.add.existing(rect, true);
        this.walls.add(rect);
      });
    }

    createEntities() {
      const playerSpawn = SPAWN_POINTS.find(s => s.id === "player_start");
      this.player = this.add.rectangle(playerSpawn.x, playerSpawn.y, 22, 28, COLORS.blue).setDepth(30);
      this.player.name = "detective";
      this.physics.add.existing(this.player);
      this.player.body.setCollideWorldBounds(true);
      this.player.body.setSize(22, 28);
      this.playerFacing = "S";

      const carSpawn = SPAWN_POINTS.find(s => s.id === "detective_sedan");
      this.car = this.add.container(carSpawn.x, carSpawn.y).setDepth(25);
      const shadow = this.add.rectangle(7, 8, 34, 62, 0x000000, 0.35);
      const body = this.add.rectangle(0, 0, 32, 58, 0x202329, 1).setStrokeStyle(2, 0x9db5c7, 1);
      const hood = this.add.rectangle(0, -17, 24, 14, 0x2a2f36, 1);
      const light = this.add.rectangle(0, -30, 22, 4, 0x6aa8ff, 0.85);
      this.car.add([shadow, body, hood, light]);
      this.physics.add.existing(this.car);
      this.car.body.setSize(32, 58);
      this.car.body.setCollideWorldBounds(true);
      this.car.heading = -Math.PI / 2;
      this.car.vx = 0;
      this.car.vy = 0;
      this.car.rotationFrame = 0;
      this.car.damageFlash = body;

      this.physics.add.collider(this.player, this.walls);
      this.physics.add.collider(this.car, this.walls, () => this.carHitWall());

      this.suspect = this.add.rectangle(-100, -100, 22, 28, COLORS.red).setDepth(28);
      this.suspect.activeCase = false;
      this.physics.add.existing(this.suspect);
      this.suspect.body.setCollideWorldBounds(true);
      this.physics.add.collider(this.suspect, this.walls);

      const ev = SPAWN_POINTS.find(s => s.id === "stolen_cigarettes");
      this.evidence = this.add.circle(ev.x, ev.y, 11, COLORS.yellow).setDepth(27);
      this.evidence.visible = false;
      this.evidence.collected = false;

      const wit = SPAWN_POINTS.find(s => s.id === "bennys_clerk");
      this.witness = this.add.rectangle(wit.x, wit.y, 22, 28, COLORS.purple).setDepth(27);
      this.witness.visible = false;
      this.physics.add.existing(this.witness);
      this.witness.body.setImmovable(true);

      this.civilians = [];
      const civSpawns = SPAWN_POINTS.filter(s => s.type === "pedestrian");
      for (let i = 0; i < 7; i++) {
        const s = civSpawns[i % civSpawns.length] || { x: 100 + i * 70, y: 760 };
        const c = this.add.circle(s.x + Phaser.Math.Between(-50, 50), s.y + Phaser.Math.Between(-50, 50), 8, 0xbfc7d1, 1).setDepth(20);
        this.physics.add.existing(c);
        c.body.setCollideWorldBounds(true);
        c.nodeTarget = new Phaser.Math.Vector2(c.x + Phaser.Math.Between(-120, 120), c.y + Phaser.Math.Between(-120, 120));
        this.civilians.push(c);
        this.physics.add.collider(c, this.walls);
      }

      this.trafficCars = [];
      for (let i = 0; i < 4; i++) this.spawnTraffic(i);
    }

    spawnTraffic(i) {
      const y = i % 2 === 0 ? 760 : 1320;
      const x = i % 2 === 0 ? -80 - i * 260 : WORLD_W + 80 + i * 260;
      const car = this.add.rectangle(x, y, 30, 55, [0x334455, 0x553333, 0x334433, 0x555133][i % 4]).setDepth(22);
      car.setAngle(i % 2 === 0 ? 90 : -90);
      this.physics.add.existing(car);
      car.body.setSize(30, 55);
      car.body.setVelocity(i % 2 === 0 ? 90 : -90, 0);
      this.trafficCars.push(car);
      this.physics.add.collider(car, this.walls);
    }

    createHUD() {
      this.hudBg = this.add.rectangle(10, 10, 940, 92, 0x02060a, 0.72).setOrigin(0, 0).setScrollFactor(0).setDepth(2000);
      this.hudText = makeText(this, 20, 18, "", 14, "#ffffff", true);
      this.carText = makeText(this, 20, 64, "", 14, "#86e7ff", true);
      this.promptText = makeText(this, VIEW_W / 2, VIEW_H - 40, "", 15, "#f4d28a", true).setOrigin(0.5);
      this.layerText = makeText(this, VIEW_W - 20, 18, "", 12, "#ffb6df", true).setOrigin(1, 0);
      this.messageText = makeText(this, VIEW_W / 2, 118, "", 16, "#ffffff", true).setOrigin(0.5);
    }

    createMobileControls() {
      const addBtn = (x, y, label, prop, color = 0x111827) => {
        const c = this.add.container(x, y).setScrollFactor(0).setDepth(2500);
        const bg = this.add.circle(0, 0, 28, color, 0.78).setStrokeStyle(2, 0xffffff, 0.5);
        const tx = this.add.text(0, -9, label, { fontFamily: "Courier New", fontSize: "18px", color: "#ffffff" }).setOrigin(0.5);
        c.add([bg, tx]);
        c.setSize(64, 64).setInteractive();
        c.on("pointerdown", () => { this.mobile[prop] = true; if (["a","b","x","y"].includes(prop)) this.handleMobileAction(prop); });
        c.on("pointerup", () => { this.mobile[prop] = false; });
        c.on("pointerout", () => { this.mobile[prop] = false; });
        return c;
      };
      addBtn(84, VIEW_H - 118, "▲", "up");
      addBtn(84, VIEW_H - 52, "▼", "down");
      addBtn(36, VIEW_H - 84, "◀", "left");
      addBtn(132, VIEW_H - 84, "▶", "right");
      addBtn(VIEW_W - 84, VIEW_H - 120, "A", "a", 0x1f4d2f);
      addBtn(VIEW_W - 142, VIEW_H - 84, "B", "b", 0x4d1f1f);
      addBtn(VIEW_W - 84, VIEW_H - 48, "X", "x", 0x1f314d);
      addBtn(VIEW_W - 28, VIEW_H - 84, "Y", "y", 0x4d3b1f);
    }

    handleMobileAction(prop) {
      if (prop === "a") this.handleInteract();
      if (prop === "b") this.tryArrest();
      if (prop === "x") this.handleTrunk();
      if (prop === "y") this.tryReport();
    }

    inputDir() {
      const left = this.keys.left.isDown || this.keys.arrowLeft.isDown || this.mobile.left;
      const right = this.keys.right.isDown || this.keys.arrowRight.isDown || this.mobile.right;
      const up = this.keys.up.isDown || this.keys.arrowUp.isDown || this.mobile.up;
      const down = this.keys.down.isDown || this.keys.arrowDown.isDown || this.mobile.down;
      return { left, right, up, down };
    }

    update(time, delta) {
      const dt = delta / 1000;
      this.shiftMinutes += dt * 0.85;
      this.updateClosestZone();
      if (this.inCar) this.updateCar(dt); else this.updatePlayer(dt);
      this.updateCase(dt);
      this.updateCivilians(dt);
      this.updateTraffic();
      this.updateHUD();
      if (this.messageTimer > 0) this.messageTimer -= delta;
    }

    updatePlayer(dt) {
      const d = this.inputDir();
      let vx = 0, vy = 0;
      if (d.left) vx -= 1;
      if (d.right) vx += 1;
      if (d.up) vy -= 1;
      if (d.down) vy += 1;
      const len = Math.hypot(vx, vy) || 1;
      vx /= len; vy /= len;
      this.player.body.setVelocity(vx * 220, vy * 220);
      if (vx || vy) {
        const angle = Phaser.Math.RadToDeg(Math.atan2(vy, vx));
        this.playerFacing = ["E","SE","S","SW","W","NW","N","NE"][Math.round(((angle + 360) % 360) / 45) % 8];
      }
      const zoomTarget = 0.84;
      this.cameras.main.setZoom(Phaser.Math.Linear(this.cameras.main.zoom, zoomTarget, 0.05));
    }

    updateCar(dt) {
      const stats = VEHICLES.unmarked_sedan;
      const d = this.inputDir();
      const speed = Math.hypot(this.car.vx, this.car.vy);
      const speedRatio = clamp(speed / stats.topSpeed, 0.15, 1);
      if (d.left) this.car.heading -= stats.steeringRate * dt * speedRatio;
      if (d.right) this.car.heading += stats.steeringRate * dt * speedRatio;
      const fx = Math.cos(this.car.heading);
      const fy = Math.sin(this.car.heading);
      if (d.up && GAME.car.fuel > 0) {
        this.car.vx += fx * stats.acceleration * dt;
        this.car.vy += fy * stats.acceleration * dt;
        GAME.car.fuel = Math.max(0, GAME.car.fuel - dt * (0.85 + speed / 360));
      }
      if (d.down) {
        this.car.vx -= fx * stats.brakeForce * dt;
        this.car.vy -= fy * stats.brakeForce * dt;
      }
      // traction pulls movement vector slowly toward heading, leaving room for slide.
      const forwardMag = this.car.vx * fx + this.car.vy * fy;
      const targetVx = fx * forwardMag;
      const targetVy = fy * forwardMag;
      this.car.vx += (targetVx - this.car.vx) * stats.traction;
      this.car.vy += (targetVy - this.car.vy) * stats.traction;
      this.car.vx *= stats.friction;
      this.car.vy *= stats.friction;
      const currentSpeed = Math.hypot(this.car.vx, this.car.vy);
      if (currentSpeed > stats.topSpeed) {
        this.car.vx = (this.car.vx / currentSpeed) * stats.topSpeed;
        this.car.vy = (this.car.vy / currentSpeed) * stats.topSpeed;
      }
      this.car.body.setVelocity(this.car.vx, this.car.vy);
      this.car.setRotation(this.car.heading + Math.PI / 2);
      this.car.rotationFrame = Math.round(((Phaser.Math.RadToDeg(this.car.heading) + 360) % 360) / 5.625) % 64;
      const zoomTarget = currentSpeed > 300 ? 0.48 : currentSpeed > 160 ? 0.6 : 0.72;
      this.cameras.main.setZoom(Phaser.Math.Linear(this.cameras.main.zoom, zoomTarget, 0.04));
    }

    carHitWall() {
      const spd = Math.hypot(this.car.vx, this.car.vy);
      if (spd > 80) GAME.car.damage = Math.min(100, GAME.car.damage + Math.round(spd / 90));
      this.car.vx *= -0.28;
      this.car.vy *= -0.28;
      this.car.body.setVelocity(this.car.vx, this.car.vy);
    }

    updateCase(dt) {
      if (!GAME.case.active) {
        const trigger = INTERACTION_ZONES.find(z => z.id === "bennys_shoplifting_trigger");
        const actor = this.inCar ? this.car : this.player;
        if (rectOverlapsSprite(trigger, actor)) this.startShopliftingCase();
      }
      if (GAME.case.active && !GAME.case.suspectArrested && !GAME.case.complete) {
        const flee = SPAWN_POINTS.find(s => s.id === "bennys_suspect_flee");
        this.physics.moveTo(this.suspect, flee.x, flee.y, 105);
        if (distance(this.suspect, flee) < 35) {
          this.suspect.body.setVelocity(0, 0);
          this.message = "Suspect reached the back lot. Cut him off or arrest him nearby.";
          this.messageTimer = 3000;
        }
      }
    }

    startShopliftingCase() {
      GAME.case.active = true;
      this.dispatch = "Raven Hook Dispatch: Shoplifting in progress at Benny's Market.";
      this.objective = "Catch Eddie Cross, collect evidence, get clerk statement, store evidence in trunk.";
      this.message = "Case started: Benny's Market shoplifting.";
      this.messageTimer = 4000;
      const s = SPAWN_POINTS.find(p => p.id === "bennys_suspect");
      this.suspect.setPosition(s.x, s.y);
      this.suspect.activeCase = true;
      this.suspect.visible = true;
      this.evidence.visible = true;
      this.witness.visible = true;
    }

    updateCivilians(dt) {
      for (const c of this.civilians) {
        if (!c.nodeTarget || distance(c, c.nodeTarget) < 12) {
          c.nodeTarget = new Phaser.Math.Vector2(
            clamp(c.x + Phaser.Math.Between(-150, 150), 80, WORLD_W - 80),
            clamp(c.y + Phaser.Math.Between(-150, 150), 80, WORLD_H - 80)
          );
        }
        this.physics.moveTo(c, c.nodeTarget.x, c.nodeTarget.y, 45);
      }
    }

    updateTraffic() {
      for (let i = 0; i < this.trafficCars.length; i++) {
        const c = this.trafficCars[i];
        if (c.x < -120 || c.x > WORLD_W + 120) {
          c.destroy();
          this.trafficCars.splice(i, 1);
          this.spawnTraffic(i + Math.floor(Math.random() * 4));
          i--;
        }
      }
    }

    updateClosestZone() {
      const actor = this.inCar ? this.car : this.player;
      let closest = null;
      for (const z of INTERACTION_ZONES) {
        if (rectOverlapsSprite(z, actor)) { closest = z; break; }
      }
      this.closestZone = closest;
    }

    handleInteract() {
      if (this.inCar) {
        this.inCar = false;
        this.player.setVisible(true);
        this.player.setPosition(this.car.x - 34, this.car.y + 8);
        this.player.body.enable = true;
        this.car.body.setVelocity(0, 0);
        this.car.vx = this.car.vy = 0;
        this.cameras.main.startFollow(this.player, true, 0.08, 0.08);
        this.message = "Exited vehicle.";
        this.messageTimer = 2200;
        return;
      }
      if (distance(this.player, this.car) < 70) {
        this.inCar = true;
        this.player.setVisible(false);
        this.player.body.enable = false;
        this.cameras.main.startFollow(this.car, true, 0.08, 0.08);
        this.message = "Entered unmarked sedan.";
        this.messageTimer = 2200;
        return;
      }
      if (!this.closestZone) return;
      const z = this.closestZone;
      if (z.type === "crime_trigger") this.startShopliftingCase();
      if (z.type === "evidence" && GAME.case.active && !GAME.case.evidenceCollected) {
        GAME.case.evidenceCollected = true;
        this.playerInventory.push("stolen_cigarettes");
        this.evidence.visible = false;
        this.message = "Evidence collected: stolen cigarettes.";
        this.messageTimer = 3000;
      }
      if (z.type === "witness") {
        GAME.case.witnessStatement = true;
        this.message = z.npcId === "marlene_pike"
          ? "Marlene Pike: 'He stuffed cartons in his jacket and ran for the back.'"
          : "Witness statement logged.";
        this.messageTimer = 4200;
      }
      if (z.type === "evidence_dropoff") {
        this.message = GAME.case.evidenceInTrunk ? "Evidence chain logged at station." : "No trunk evidence ready for drop-off.";
        this.messageTimer = 3000;
      }
      if (z.type === "door" || z.type === "roof") {
        this.message = `${z.label}: interior/roof layer planned. Full transition comes next build.`;
        this.messageTimer = 3000;
      }
      if (z.type === "payphone") {
        this.message = "Payphone: dead line. Future case trigger point.";
        this.messageTimer = 2800;
      }
    }

    tryArrest() {
      if (!GAME.case.active || GAME.case.suspectArrested) return;
      const actor = this.inCar ? this.car : this.player;
      if (distance(actor, this.suspect) < 75) {
        GAME.case.suspectArrested = true;
        this.suspect.body.setVelocity(0, 0);
        this.suspect.setFillStyle(0x552222, 0.6);
        this.dispatch = "Dispatch: Suspect detained. Secure evidence and witness statement.";
        this.objective = "Collect evidence, talk to clerk, store evidence in trunk, return to report room.";
        this.message = "Arrested Eddie Cross.";
        this.messageTimer = 3200;
      } else {
        this.message = "No suspect close enough to arrest.";
        this.messageTimer = 2200;
      }
    }

    handleTrunk() {
      const trunkZone = INTERACTION_ZONES.find(z => z.id === "detective_trunk");
      const actor = this.inCar ? this.car : this.player;
      if (!rectOverlapsSprite(trunkZone, actor) && distance(actor, this.car) > 80) {
        this.message = "Move near the detective sedan trunk.";
        this.messageTimer = 2500;
        return;
      }
      if (this.playerInventory.includes("stolen_cigarettes") && !GAME.case.evidenceInTrunk) {
        GAME.case.evidenceInTrunk = true;
        GAME.car.trunk.push("stolen_cigarettes");
        this.message = "Stored evidence in trunk: stolen cigarettes.";
        this.messageTimer = 3000;
      } else {
        this.message = GAME.case.evidenceInTrunk ? "Trunk contains: stolen cigarettes." : "Trunk empty. Collect evidence first.";
        this.messageTimer = 3000;
      }
    }

    tryReport() {
      const reportZone = INTERACTION_ZONES.find(z => z.id === "report_desk");
      const actor = this.inCar ? this.car : this.player;
      if (rectOverlapsSprite(reportZone, actor)) {
        this.scene.start("ReportScene");
      } else {
        this.message = "Return to the Report Room desk at Raven Hook Precinct.";
        this.messageTimer = 2800;
      }
    }

    updateHUD() {
      const speed = Math.round(Math.hypot(this.car.vx || 0, this.car.vy || 0) / 4.7);
      const hour = Math.floor(this.shiftMinutes / 60) % 24;
      const min = Math.floor(this.shiftMinutes % 60).toString().padStart(2, "0");
      const flags = [
        GAME.case.active ? "CASE" : "PATROL",
        GAME.case.suspectArrested ? "ARREST" : "NO ARREST",
        GAME.case.evidenceCollected ? "EVIDENCE" : "NO EVIDENCE",
        GAME.case.witnessStatement ? "WITNESS" : "NO WITNESS",
        GAME.case.evidenceInTrunk ? "TRUNK" : "NO TRUNK"
      ].join(" | ");
      this.hudText.setText(`${RH_CENTRAL_V03.name} | Day ${GAME.day} ${hour}:${min} | ${GAME.rank} XP ${GAME.xp}\n${this.dispatch}\n${this.objective}\n${flags}`);
      this.carText.setText(`MPH ${speed} | Fuel ${GAME.car.fuel.toFixed(0)}% | Damage ${GAME.car.damage}% | 64-frame heading index: ${this.car.rotationFrame ?? 0} | Facing: ${this.playerFacing}`);
      this.promptText.setText(this.closestZone ? `E: ${this.closestZone.label || this.closestZone.type}` : "E enter/exit | SPACE arrest | T trunk | R report");
      this.layerText.setText(`Debug C:${this.debug.collision ? "ON" : "off"} I:${this.debug.interaction ? "ON" : "off"} P:${this.debug.spawns ? "ON" : "off"} M:${this.debug.mapRef ? "ON" : "off"}`);
      this.messageText.setText(this.messageTimer > 0 ? this.message : "");
    }

    redrawDebug() {
      this.debugGraphics.clear();
      if (this.debug.collision) {
        for (const r of COLLISION_RECTS) {
          if (r.type === "curb") continue;
          const color = r.type === "large_prop" ? COLORS.orange : COLORS.red;
          this.debugGraphics.fillStyle(color, 0.22).fillRect(r.x, r.y, r.w, r.h);
          this.debugGraphics.lineStyle(3, color, 0.9).strokeRect(r.x, r.y, r.w, r.h);
        }
      }
      if (this.debug.interaction) {
        for (const z of INTERACTION_ZONES) {
          const color = z.type === "door" ? COLORS.blue : z.type === "roof" ? COLORS.green : z.type === "evidence" ? COLORS.yellow : z.type === "witness" ? COLORS.purple : z.type === "crime_trigger" ? COLORS.orange : z.type === "report" ? COLORS.cyan : 0xffffff;
          this.debugGraphics.fillStyle(color, 0.25).fillRect(z.x, z.y, z.w, z.h);
          this.debugGraphics.lineStyle(2, color, 0.95).strokeRect(z.x, z.y, z.w, z.h);
        }
      }
      if (this.debug.spawns) {
        for (const s of SPAWN_POINTS) {
          const color = s.type === "player" ? COLORS.blue : s.type === "vehicle" ? 0xffffff : s.type === "suspect" ? COLORS.red : s.type === "witness" ? COLORS.purple : s.type === "evidence" ? COLORS.yellow : s.type.includes("traffic") ? COLORS.cyan : s.type.includes("despawn") ? COLORS.green : 0xaaaaaa;
          this.debugGraphics.fillStyle(color, 0.85).fillCircle(s.x, s.y, 11);
          this.debugGraphics.lineStyle(2, 0x000000, 0.7).strokeCircle(s.x, s.y, 11);
        }
      }
    }

    toggleReferenceOverlay() {
      if (!this.refOverlay) {
        this.refOverlay = this.add.container(WORLD_W / 2, WORLD_H / 2).setDepth(1000).setVisible(false);
        const bg = this.add.rectangle(0, 0, 980, 760, 0x02060a, 0.9).setStrokeStyle(2, COLORS.cyan, 0.7);
        const img = this.add.image(0, 30, "layer06").setDisplaySize(920, 690).setAlpha(0.82);
        const txt = this.add.text(-460, -365, "Layer 06 reference mask preview. Real collision uses JS data.", { fontFamily: "Courier New", fontSize: "16px", color: "#ffffff" });
        this.refOverlay.add([bg, img, txt]);
      }
      this.refOverlay.setVisible(this.debug.mapRef);
    }
  }

  class ReportScene extends Phaser.Scene {
    constructor() { super("ReportScene"); }
    create() {
      this.cameras.main.setBackgroundColor("#101018");
      const g = this.add.graphics();
      g.fillStyle(0xe0d0a5, 1).fillRoundedRect(100, 40, VIEW_W - 200, VIEW_H - 80, 12);
      g.lineStyle(4, 0x2b2117, 1).strokeRoundedRect(100, 40, VIEW_W - 200, VIEW_H - 80, 12);
      const scoreItems = [
        ["Correct location: Benny's Market", GAME.case.active],
        ["Correct crime: Shoplifting", GAME.case.active],
        ["Suspect arrested: Eddie Cross", GAME.case.suspectArrested],
        ["Evidence collected: stolen cigarettes", GAME.case.evidenceCollected],
        ["Evidence stored in trunk", GAME.case.evidenceInTrunk],
        ["Witness statement: Marlene Pike", GAME.case.witnessStatement]
      ];
      let score = 0;
      for (const item of scoreItems) if (item[1]) score += 100;
      if (score >= 500 && !GAME.case.reportFiled) {
        GAME.xp += score;
        GAME.case.complete = true;
        GAME.case.reportFiled = true;
        GAME.day += 1;
      }
      makeText(this, VIEW_W / 2, 74, "RAVEN HOOK POLICE DEPARTMENT", 24, "#2b2117").setOrigin(0.5);
      makeText(this, VIEW_W / 2, 110, "INCIDENT REPORT — BENNY'S MARKET SHOPLIFTING", 18, "#2b2117").setOrigin(0.5);
      let y = 160;
      for (const [label, ok] of scoreItems) {
        makeText(this, 160, y, `${ok ? "✓" : "✗"} ${label}`, 18, ok ? "#134f24" : "#7a1c1c");
        y += 38;
      }
      makeText(this, 160, y + 10, `REPORT SCORE: ${score} / 600`, 22, "#2b2117");
      makeText(this, 160, y + 50, score >= 500 ? "Report accepted. Day advanced. XP awarded." : "Report incomplete. Return to the field and finish the case.", 18, score >= 500 ? "#134f24" : "#7a1c1c");
      makeText(this, VIEW_W / 2, VIEW_H - 78, "PRESS ENTER / TAP TO RETURN", 18, "#2b2117").setOrigin(0.5);
      this.input.keyboard.once("keydown-ENTER", () => this.scene.start("GameScene"));
      this.input.once("pointerdown", () => this.scene.start("GameScene"));
    }
  }

  const config = {
    type: Phaser.AUTO,
    parent: "game",
    width: VIEW_W,
    height: VIEW_H,
    backgroundColor: "#05070b",
    pixelArt: true,
    roundPixels: true,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: { default: "arcade", arcade: { debug: false } },
    scene: [TitleScene, GameScene, ReportScene]
  };

  new Phaser.Game(config);
})();
</script>
