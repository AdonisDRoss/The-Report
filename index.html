  function startTheme(scene) {
    if (!scene || !scene.sound || !scene.cache.audio.exists(THEME_ASSET.key)) return null;

    if (!THEME_MUSIC) {
      THEME_MUSIC = scene.sound.add(THEME_ASSET.key, {
        loop: true,
        volume: MUSIC_SETTINGS.volume
      });
    }

    applyMusicSettings();

    const playNow = () => {
      if (MUSIC_SETTINGS.enabled && THEME_MUSIC && !THEME_MUSIC.isPlaying) {
        THEME_MUSIC.play();
      }
    };

    if (scene.sound.locked) {
      scene.sound.once(Phaser.Sound.Events.UNLOCKED, playNow);
    } else {
      playNow();
    }

    return THEME_MUSIC;
  }

  function toggleTheme(scene) {
    const music = THEME_MUSIC || startTheme(scene);
    MUSIC_SETTINGS.enabled = !MUSIC_SETTINGS.enabled;
    persistMusicSettings();

    if (!music) return MUSIC_SETTINGS.enabled;

    if (MUSIC_SETTINGS.enabled) {
      music.setVolume(MUSIC_SETTINGS.volume);
      if (music.isPaused) music.resume();
      if (!music.isPlaying) music.play();
    } else {
      music.pause();

    return MUSIC_SETTINGS.enabled;

  function saveGame(scene) {
    if (!scene) return false;

    const sceneKey = scene.scene?.key || 'GameScene';
    const state = {
      savedAt: Date.now(),
      sceneKey,
      game: JSON.parse(JSON.stringify(GAME)),
      music: { enabled: MUSIC_SETTINGS.enabled, volume: MUSIC_SETTINGS.volume }
    };

    if (sceneKey === 'PoliceStationScene') {
      state.floorId = scene.floorId || 'floor1';
      state.spawn = scene.playerBody ? { x: scene.playerBody.x, y: scene.playerBody.y, facing: scene.playerFacing || 'S' } : null;
    } else if (sceneKey === 'ElevatorRoomScene') {
      state.fromFloor = scene.fromFloor || 'floor1';
      state.spawn = scene.playerBody ? { x: scene.playerBody.x, y: scene.playerBody.y, facing: scene.playerFacing || 'S' } : null;
    } else {
      state.spawn = scene.player ? { x: scene.player.x, y: scene.player.y, facing: scene.playerFacing || 'S' } : null;
      state.inCar = !!scene.inCar;
      state.car = scene.car ? { x: scene.car.x, y: scene.car.y, heading: scene.car.heading || 0 } : null;
    }

    try {
      localStorage.setItem(SAVE_KEY, JSON.stringify(state));
      if (scene.message !== undefined) {
        scene.message = 'Game saved.';
        scene.messageTimer = 1800;
      }
      if (scene.promptText?.setText) scene.promptText.setText('Game saved.');
      return true;
    } catch (e) {
      if (scene.message !== undefined) {
        scene.message = 'Save failed: local storage blocked.';
        scene.messageTimer = 2400;
      }
      if (scene.promptText?.setText) scene.promptText.setText('Save failed: local storage blocked.');
      return false;
    }
  }

  function loadGame(scene) {
    let state = null;
    try {
      state = JSON.parse(localStorage.getItem(SAVE_KEY) || 'null');

    if (!state) {
      if (scene?.message !== undefined) {
        scene.message = 'No save file found.';
        scene.messageTimer = 2200;
      }
      if (scene?.promptText?.setText) scene.promptText.setText('No save file found.');
      return false;
    }

    if (state.game) {
      Object.assign(GAME, state.game);
      GAME.car = Object.assign({ fuel:76, damage:0, trunk:[], visualState:{} }, GAME.car || {}, state.game.car || {});

      MUSIC_SETTINGS.enabled = state.music.enabled !== false;
      MUSIC_SETTINGS.volume = Number.isFinite(state.music.volume) ? Phaser.Math.Clamp(state.music.volume, 0, 1) : MUSIC_SETTINGS.volume;

    closePauseMenu(scene);

        { type: 'spritesheet', key: MALCOLM_SHOOT_ASSET.key, path: MALCOLM_SHOOT_ASSET.path, fw: MALCOLM_SHOOT_ASSET.frameWidth, fh: MALCOLM_SHOOT_ASSET.frameHeight },
        { type: 'spritesheet', key: EDDIE_CROSS_ASSET.key, path: EDDIE_CROSS_ASSET.path, fw: EDDIE_CROSS_ASSET.frameWidth, fh: EDDIE_CROSS_ASSET.frameHeight },
        { type: 'spritesheet', key: RAMOS_WALK_ASSET.key, path: RAMOS_WALK_ASSET.path, fw: RAMOS_WALK_ASSET.frameWidth, fh: RAMOS_WALK_ASSET.frameHeight },
        { type: 'spritesheet', key: RAMOS_TALK_ASSET.key, path: RAMOS_TALK_ASSET.path, fw: RAMOS_TALK_ASSET.frameWidth, fh: RAMOS_TALK_ASSET.frameHeight },
        { type: 'spritesheet', key: RAMOS_SHOOT_ASSET.key, path: RAMOS_SHOOT_ASSET.path, fw: RAMOS_SHOOT_ASSET.frameWidth, fh: RAMOS_SHOOT_ASSET.frameHeight },
        { type: 'spritesheet', key: 'detective_sedan_clean_64', path: 'assets/vehicles/detective_sedan/detective_sedan_clean_64.png', fw: 128, fh: 128 },
        { type: 'spritesheet', key: 'detective_sedan_shadow_64', path: 'assets/vehicles/detective_sedan/detective_sedan_shadow_64.png', fw: 128, fh: 128 },
        { type: 'spritesheet', key: 'detective_sedan_lights_overlay_64', path: 'assets/vehicles/detective_sedan/detective_sedan_lights_overlay_64.png', fw: 128, fh: 128 },
        { type: 'spritesheet', key: 'detective_sedan_damage_64', path: 'assets/vehicles/detective_sedan/detective_sedan_damage_64.png', fw: 128, fh: 128 },
        { type: 'spritesheet', key: 'detective_sedan_trunk_open_64', path: 'assets/vehicles/detective_sedan/detective_sedan_trunk_open_64.png', fw: 128, fh: 128 },
        { type: 'spritesheet', key: 'detective_sedan_driver_door_open_64', path: 'assets/vehicles/detective_sedan/detective_sedan_driver_door_open_64.png', fw: 128, fh: 128 },
        { type: 'spritesheet', key: 'detective_sedan_smoke_fire_64', path: 'assets/vehicles/detective_sedan/detective_sedan_smoke_fire_64.png', fw: 128, fh: 128 },
        ...CIVILIAN_ASSETS.map(a => ({ type:'spritesheet', key:a.key, path:a.path, fw:a.fw, fh:a.fh })),
        ...POLICE_NPC_ASSETS.map(a => ({ type:'spritesheet', key:a.key, path:a.path, fw:a.fw, fh:a.fh })),
        ...TRAFFIC_VEHICLE_ASSETS.map(a => ({ type:'spritesheet', key:a.key, path:a.path, fw:a.fw, fh:a.fh })),
        ...SINGLE_VEHICLE_ASSETS.map(a => ({ type:'image', key:a.key, path:a.path }))
      ];

      this.assetErrors = [];
      this.load.on('filecomplete', (key) => {
        if (key === GROUND_ASSET.key) this.applyGroundMap();
        if (key === MAP_OVERLAY_ASSET.key && this.applyMapOverlay) this.applyMapOverlay();
        if (key === BUILDING_SHEET_ASSET.key) this.applyBuildingSheet();
        if (BUILDING_IMAGE_ASSETS.some(b => b.key === key)) this.applyBuildingImages();
        if (key === PLAYER_ASSET.key) this.ensurePlayerSprite();
        if (key === EDDIE_CROSS_ASSET.key) this.ensureEddieCrossSprite();
        if ([RAMOS_WALK_ASSET.key, RAMOS_TALK_ASSET.key, RAMOS_SHOOT_ASSET.key].includes(key)) this.ensureRamosCompanion();
        this.ensureSpriteLayers();
        this.syncVehicleSprites();
        if (this.refreshWorldNpcSprites) this.refreshWorldNpcSprites();
        if (this.applyMapOverlay) this.applyMapOverlay();

        if (this.textures.exists(PLAYER_ASSET.key)) {
          this.message = 'Detective player sprite loaded.';
          this.messageTimer = 1800;
        } else if (this.textures.exists('detective_sedan_clean_64')) {
          this.carArtReady = true;
          this.message = 'Detective sedan asset loaded.';
          this.messageTimer = 1800;
        }
      });

      this.load.on('loaderror', (file) => {
        const src = file?.src || file?.url || file?.key || 'unknown';
        this.assetErrors.push(src);
        console.warn('Optional asset failed:', file.key, src);

        // If the transparent filename is missing, try the non-transparent filename as a fallback.
        if (file?.key === PLAYER_ASSET.key && !this._triedPlayerFallback) {
          this._triedPlayerFallback = true;
          this.load.spritesheet(PLAYER_ASSET.key, A(PLAYER_ASSET.fallbackPath), { frameWidth: PLAYER_ASSET.frameWidth, frameHeight: PLAYER_ASSET.frameHeight });
          return;
        }

        this.message = `Asset failed: ${file?.key || 'unknown'} — fallback still playable.`;
        this.messageTimer = 2600;
      });

      for (const f of files) {
        if (this.textures.exists(f.key)) continue;
        if (f.type === 'image') this.load.image(f.key, A(f.path));
        else this.load.spritesheet(f.key, A(f.path), { frameWidth: f.fw, frameHeight: f.fh });
      }
      if (!this.load.isLoading()) this.load.start();
    }

    bindKeys() {
      this.input.keyboard.on('keydown-E', () => this.handleInteract());
      this.input.keyboard.on('keydown-SPACE', () => this.tryArrest());
      this.input.keyboard.on('keydown-T', () => this.handleTrunk());
      this.input.keyboard.on('keydown-Y', () => this.ramosSmallTalk());
      this.input.keyboard.on('keydown-F', () => this.malcolmShoot());
      this.input.keyboard.on('keydown-R', () => this.tryReport());
      this.input.keyboard.on('keydown-C', () => { this.debug.collision = !this.debug.collision; this.redrawDebug(); });
      this.input.keyboard.on('keydown-G', () => { this.debug.collision = !this.debug.collision; this.redrawDebug(); });
      this.input.keyboard.on('keydown-I', () => { this.debug.interaction = !this.debug.interaction; this.redrawDebug(); });
      this.input.keyboard.on('keydown-P', () => { this.debug.spawns = !this.debug.spawns; this.redrawDebug(); });
      this.input.keyboard.on('keydown-N', () => this.toggleRouteDebug());
      this.input.keyboard.on('keydown-B', () => this.handleCarOrArrest());
      this.input.keyboard.on('keydown-M', () => {
        const on = toggleTheme(this);
        this.message = on ? 'Theme music on.' : 'Theme music paused.';
        this.messageTimer = 1800;
      });
      this.input.keyboard.on('keydown', (e) => this.vehicleDebug(e));
    }



    applyEntrySpawn() {
      if (!this.entryData?.spawn || !this.player) return;
      const { x, y } = this.entryData.spawn;
      this.inCar = false;
      this.player.setPosition(x, y);
      if (this.player.body) {
        this.player.body.enable = true;
        this.player.body.setVelocity(0, 0);
      }
      if (this.car?.body) this.car.body.setVelocity(0, 0);
      if (this.playerSprite) this.playerSprite.setVisible(true).setPosition(x, y);
      this.message = this.entryData.message || 'Back on Raven Hook streets.';
      this.messageTimer = 2200;
    }

    enterBuilding(zone) {
      const info = BUILDING_ENTRIES[zone.id];
      if (!info) {
        this.message = `${zone.label || 'Door'} is locked for now.`;
        this.messageTimer = 1800;
        return;
      }

      if (this.player?.body) this.player.body.setVelocity(0, 0);

      if (info.scene === 'PoliceStationScene') {
        this.scene.start('PoliceStationScene', {
          floor: 'floor1',
          spawn: null,
          fromAutoTransition: true,
          message: 'Entered Raven Hook Police Station.'
        });
        return;
      }

      this.scene.start('InteriorScene', {
        buildingId: info.id,
        title: info.title,
        subtitle: info.subtitle,
        returnSpawn: info.returnSpawn
      });
    }

    toggleBuildingArt() {
      const currentVisible = this.realBuildingImages?.[0]?.visible ?? this.realBuildingSheet?.[0]?.visible ?? false;
      const nextVisible = !currentVisible;
      if (this.realBuildingImages) this.realBuildingImages.forEach(img => img.setVisible(nextVisible));
      if (this.realBuildingSheet) this.realBuildingSheet.forEach(img => img.setVisible(nextVisible));
      if (this.buildingGraphics) this.buildingGraphics.setVisible(!nextVisible);
      if (this.buildingLabels) this.buildingLabels.forEach(t => t.setVisible(!nextVisible));
      this.message = nextVisible ? 'Building PNGs ON.' : 'Building fallback boxes ON.';
      this.messageTimer = 1800;
    }

    vehicleDebug(e) {
      const vs = GAME.car.visualState; let handled = true;
      if (e.key === '1') { vs.trunkOpen = vs.driverDoorOpen = vs.hoodOpen = vs.smokeFire = vs.destroyed = false; GAME.car.damage = 0; this.message = 'Vehicle state: clean.'; }
      else if (e.key === '2') { vs.driverDoorOpen = !vs.driverDoorOpen; vs.trunkOpen = vs.hoodOpen = false; this.message = `Driver door ${vs.driverDoorOpen ? 'open' : 'closed'}.`; }
      else if (e.key === '3') { vs.trunkOpen = !vs.trunkOpen; vs.driverDoorOpen = vs.hoodOpen = false; this.message = `Trunk ${vs.trunkOpen ? 'open' : 'closed'}.`; }
      else if (e.key === '5') { vs.lightsOn = !vs.lightsOn; this.message = `Lights ${vs.lightsOn ? 'on' : 'off'}.`; }
      else if (e.key === '6') { GAME.car.damage = clamp(GAME.car.damage + 25, 0, 100); this.message = `Damage test: ${GAME.car.damage}%.`; }
      else if (e.key === '7') { vs.smokeFire = !vs.smokeFire; this.message = `Smoke/fire ${vs.smokeFire ? 'on' : 'off'}.`; }
      else if (e.key === '0') { vs.trunkOpen = vs.driverDoorOpen = vs.hoodOpen = vs.smokeFire = vs.destroyed = false; vs.lightsOn = true; GAME.car.damage = 0; this.message = 'Vehicle state reset.'; }
      else handled = false;
      if (handled) { this.messageTimer = 2500; this.syncVehicleSprites(); }
    }

    drawGround() {
      const g = this.groundGraphics = this.add.graphics().setDepth(0);
      g.fillStyle(0x111820, 1).fillRect(0, 0, WORLD_W, WORLD_H);
      g.fillStyle(0x171d25, 1).fillRect(0, 680, WORLD_W, 180);
      g.fillStyle(0x171d25, 1).fillRect(0, 1240, WORLD_W, 170);
      g.fillStyle(0x20262e, 1).fillRect(0, 610, WORLD_W, 38);
      g.fillStyle(0x20262e, 1).fillRect(0, 860, WORLD_W, 38);
      g.fillStyle(0x20262e, 1).fillRect(0, 1170, WORLD_W, 38);
      g.fillStyle(0x20262e, 1).fillRect(0, 1410, WORLD_W, 38);
      g.lineStyle(3, 0x4b5563, 0.5);
      for (let x = 0; x < WORLD_W; x += 160) { g.lineBetween(x, 760, x + 70, 760); g.lineBetween(x, 1320, x + 70, 1320); }
      g.lineStyle(2, COLORS.neonBlue, 0.18).lineBetween(0, 650, WORLD_W, 650);
      g.lineStyle(2, COLORS.neonPink, 0.18).lineBetween(0, 1450, WORLD_W, 1450);
    }

    drawBuildings() {
      // Base page already contains building footprint pads.
      // Keep this empty so old Raven Hook Central building overlays do not fight the rebuilt 4096x4096 map.
      this.buildingLabels = [];
      this.buildingGraphics = this.add.graphics().setDepth(ROOF_DEPTH);
    }

    createCollision() {
      this.walls = this.physics.add.staticGroup();
      for (const r of COLLISION_RECTS) { const rect = this.add.rectangle(r.x + r.w/2, r.y + r.h/2, r.w, r.h, 0xff0000, 0); this.physics.add.existing(rect, true); this.walls.add(rect); }
    }

    createEntities() {
      const ps = SPAWN_POINTS.find(s => s.id === 'player_start');
      this.player = this.add.rectangle(ps.x, ps.y, 22, 28, COLORS.blue, 0).setDepth(30); this.physics.add.existing(this.player); this.player.body.setCollideWorldBounds(true); this.playerFacing = 'S';
      const cs = SPAWN_POINTS.find(s => s.id === 'detective_sedan');
      this.car = this.add.container(cs.x, cs.y).setDepth(25); this.carFallback = this.add.rectangle(0,0,32,58,0x202329,1).setStrokeStyle(2,0x9db5c7,1); this.car.add([this.carFallback]);
      this.physics.add.existing(this.car); this.car.body.setSize(34,62); this.car.body.setCollideWorldBounds(true); this.car.heading = -Math.PI/2; this.car.vx = 0; this.car.vy = 0; this.car.rotationFrame = 0;
      this.physics.add.collider(this.player, this.walls); this.physics.add.collider(this.car, this.walls, () => this.carHitWall());
      this.suspect = this.add.rectangle(-100, -100, 22, 28, COLORS.red).setDepth(28); this.physics.add.existing(this.suspect); this.physics.add.collider(this.suspect, this.walls); this.suspect.visible = false; this.suspectActive = false; this.suspectFacing = 'E';
      const ev = SPAWN_POINTS.find(s => s.id === 'stolen_cigarettes'); this.evidence = this.add.circle(ev.x, ev.y, 11, COLORS.yellow).setDepth(27); this.evidence.visible = false;
      const wt = SPAWN_POINTS.find(s => s.id === 'bennys_clerk'); this.witness = this.add.rectangle(wt.x, wt.y, 22, 28, COLORS.purple).setDepth(27); this.witness.visible = false;
      this.civilians = []; this.trafficCars = []; this.createCivilians(); this.createTrafficCars();
      this.createRamosCompanion(ps.x - 54, ps.y + 18);
    }

    ensureSpriteLayers() {
      if (!this.textures.exists('detective_sedan_clean_64')) return;
      if (!this.spriteLayersMade) {
        this.car.removeAll(true);
        this.spriteLayersMade = true;
      }
      if (!this.carShadowSprite) {
        if (this.textures.exists('detective_sedan_shadow_64')) this.carShadowSprite = this.add.sprite(5,7,'detective_sedan_shadow_64',0).setAlpha(0.48).setScale(0.54);
        else this.carShadowSprite = this.add.rectangle(5,7,34,62,0x000000,0.35);
        this.car.add(this.carShadowSprite);
      }
      if (!this.carBaseSprite) {
        this.carBaseSprite = this.add.sprite(0,0,'detective_sedan_clean_64',0).setScale(0.54);
        this.car.add(this.carBaseSprite);
      }
      if (!this.carLightsSprite && this.textures.exists('detective_sedan_lights_overlay_64')) {
        this.carLightsSprite = this.add.sprite(0,0,'detective_sedan_lights_overlay_64',0).setAlpha(0.78).setScale(0.54);
        this.car.add(this.carLightsSprite);
      }
      if (!this.carDamageSprite && this.textures.exists('detective_sedan_damage_64')) {
        this.carDamageSprite = this.add.sprite(0,0,'detective_sedan_damage_64',0).setAlpha(0).setVisible(false).setScale(0.54);
        this.car.add(this.carDamageSprite);
      }
      if (!this.carSmokeSprite && this.textures.exists('detective_sedan_smoke_fire_64')) {
        this.carSmokeSprite = this.add.sprite(0,0,'detective_sedan_smoke_fire_64',0).setAlpha(0).setVisible(false).setScale(0.54);
        this.car.add(this.carSmokeSprite);
      }
    }

    applyGroundMap() {
      if (this.realGround || !this.textures.exists(GROUND_ASSET.key)) return;
      this.realGround = this.add.image(0, 0, GROUND_ASSET.key).setOrigin(0, 0).setDisplaySize(WORLD_W, WORLD_H).setDepth(0);
      if (this.groundGraphics) this.groundGraphics.setVisible(false);
      this.message = 'Raven Hook ground map loaded.';
      this.messageTimer = 1800;
    }


    applyBuildingImages() {
      if (this.realBuildingImages) return;
      const allReady = BUILDING_IMAGE_ASSETS.every(b => this.textures.exists(b.key));
      if (!allReady) return;

      if (this.realBuildingSheet) {
        this.realBuildingSheet.forEach(img => img.destroy());
        this.realBuildingSheet = null;
      }

      this.realBuildingImages = [];
      for (const b of BUILDING_IMAGE_ASSETS) {
        const [x, y, w, h] = b.place;
        const img = this.add.image(x, y, b.key)
          .setOrigin(0, 0)
          .setDisplaySize(w, h)
          .setDepth(ROOF_DEPTH);
        img.setName(b.name);
        this.realBuildingImages.push(img);
      }

      if (this.buildingGraphics) this.buildingGraphics.setVisible(false);
      if (this.buildingLabels) this.buildingLabels.forEach(t => t.setVisible(false));

      this.message = 'Building PNGs loaded from assets/buildings.';
      this.messageTimer = 2600;
    }

    applyBuildingSheet() {
      if (this.realBuildingSheet || this.realBuildingImages || !this.textures.exists(BUILDING_SHEET_ASSET.key)) return;

      const pieces = [
        { name: 'precinct', crop: [20, 25, 470, 430], place: [302, 158, 525, 402] },
        { name: 'garage', crop: [505, 55, 150, 315], place: [740, 158, 180, 286] },
        { name: 'bennys_market', crop: [720, 40, 640, 465], place: [1195, 162, 592, 386] },
        { name: 'report_room', crop: [40, 635, 220, 265], place: [222, 922, 280, 260] },
        { name: 'evidence_dropoff', crop: [335, 635, 250, 275], place: [630, 925, 274, 258] },
        { name: 'red_gull_diner', crop: [655, 640, 350, 280], place: [1155, 852, 385, 270] },
        { name: 'laundromat', crop: [1080, 640, 275, 300], place: [1645, 852, 252, 278] },
        { name: 'payphone', crop: [1010, 770, 70, 145], place: [1590, 1192, 54, 72] }
      ];

      this.realBuildingSheet = [];
      for (const p of pieces) {
        const [cx, cy, cw, ch] = p.crop;
        const [x, y, w, h] = p.place;
        const img = this.add.image(x, y, BUILDING_SHEET_ASSET.key)
          .setOrigin(0, 0)
          .setCrop(cx, cy, cw, ch)
          .setDisplaySize(w, h)
          .setDepth(ROOF_DEPTH);
        img.setName(p.name);
        this.realBuildingSheet.push(img);
      }

      if (this.buildingLabels) this.buildingLabels.forEach(t => t.setVisible(false));

      this.message = 'Building sheet loaded from assets/reference.';
      this.messageTimer = 2200;
    }


    createEddieCrossAnims() {
      if (this.anims.exists('eddie_cross_walk_south')) return;
      const rows = [
        ['south', 0], ['southwest', 1], ['west', 2], ['northwest', 3],
        ['north', 4], ['northeast', 5], ['east', 6], ['southeast', 7]
      ];
      for (const [name, row] of rows) {
        this.anims.create({
          key: `eddie_cross_walk_${name}`,
          frames: this.anims.generateFrameNumbers(EDDIE_CROSS_ASSET.key, { start: row * 4, end: row * 4 + 3 }),
          frameRate: 9,
          repeat: -1
        });
      }
    }

    directionFromVelocity(vx, vy, fallback = 'S') {
      if (Math.abs(vx) < 2 && Math.abs(vy) < 2) return fallback;
      const angle = Phaser.Math.RadToDeg(Math.atan2(vy, vx));
      return ['E','SE','S','SW','W','NW','N','NE'][Math.round(((angle + 360) % 360) / 45) % 8];
    }

    eddieFrameForFacing(facing = 'S') {
      const rowByFacing = { S: 0, SW: 1, W: 2, NW: 3, N: 4, NE: 5, E: 6, SE: 7 };
      return (rowByFacing[facing] || 0) * 4;
    }

    eddieAnimForFacing(facing = 'E') {
      const nameByFacing = { S: 'south', SW: 'southwest', W: 'west', NW: 'northwest', N: 'north', NE: 'northeast', E: 'east', SE: 'southeast' };
      return `eddie_cross_walk_${nameByFacing[facing] || 'east'}`;
    }

    ensureEddieCrossSprite() {
      if (this.eddieSprite || !this.textures.exists(EDDIE_CROSS_ASSET.key) || !this.suspect) return;
      this.createEddieCrossAnims();
      this.eddieSprite = this.add.sprite(this.suspect.x, this.suspect.y, EDDIE_CROSS_ASSET.key, this.eddieFrameForFacing(this.suspectFacing || 'E'))
        .setOrigin(0.5, EDDIE_CROSS_ASSET.originY)
        .setScale(EDDIE_CROSS_ASSET.scale)
        .setDepth(29);
      this.eddieSprite.setVisible(!!this.suspectActive);
      this.suspect.setVisible(false);
      this.updateEddieCrossSprite(false);
      this.message = 'Eddie Cross sprite loaded.';
      this.messageTimer = 1800;
    }

    updateEddieCrossSprite(moving = false) {
      if (!this.eddieSprite || !this.suspect) return;
      this.eddieSprite.setPosition(this.suspect.x, this.suspect.y);
      this.eddieSprite.setVisible(!!this.suspectActive);
      this.suspect.setVisible(false);
      if (!this.eddieSprite.visible) return;

      const facing = this.suspectFacing || 'E';
      if (moving && !GAME.case.suspectArrested) {
        const key = this.eddieAnimForFacing(facing);
        if (this.eddieSprite.anims.currentAnim?.key !== key || !this.eddieSprite.anims.isPlaying) {
          this.eddieSprite.play(key, true);
        }
      } else {
        this.eddieSprite.anims.stop();
        this.eddieSprite.setFrame(this.eddieFrameForFacing(facing));
      }
    }

    createPlayerAnims() {
      if (this.anims.exists('detective_walk_south')) return;
      const rows = [
        ['south', 0], ['southwest', 1], ['west', 2], ['northwest', 3],
        ['north', 4], ['northeast', 5], ['east', 6], ['southeast', 7]
      ];
      for (const [name, row] of rows) {
        this.anims.create({
          key: `detective_walk_${name}`,
          frames: this.anims.generateFrameNumbers(PLAYER_ASSET.key, { start: row * 6, end: row * 6 + 5 }),
          frameRate: 8,
          repeat: -1
        });
      }
    }

    frameForFacing() {
      const rowByFacing = { S: 0, SW: 1, W: 2, NW: 3, N: 4, NE: 5, E: 6, SE: 7 };
      return (rowByFacing[this.playerFacing] || 0) * 6;
    }

    animForFacing() {
      const nameByFacing = { S: 'south', SW: 'southwest', W: 'west', NW: 'northwest', N: 'north', NE: 'northeast', E: 'east', SE: 'southeast' };
      return `detective_walk_${nameByFacing[this.playerFacing] || 'south'}`;
    }

    ensurePlayerSprite() {
      if (this.playerSprite || !this.textures.exists(PLAYER_ASSET.key) || !this.player) return;
      this.createPlayerAnims();
      this.playerSprite = this.add.sprite(this.player.x, this.player.y, PLAYER_ASSET.key, this.frameForFacing())
        .setOrigin(0.5, PLAYER_ASSET.originY)
        .setScale(PLAYER_ASSET.scale)
        .setDepth(31);
      this.player.setVisible(false);
      this.updatePlayerSprite(false);
    }

    updatePlayerSprite(moving = false) {
      if (!this.playerSprite || !this.player) return;
      this.playerSprite.setPosition(this.player.x, this.player.y);
      this.playerSprite.setVisible(this.player.body.enable && !this.inCar);
      if (!this.playerSprite.visible) return;

      if (this.playerActionUntil && (this.time.now || 0) < this.playerActionUntil) return;
      this.restorePlayerWalkTexture();

      if (moving) {
        const key = this.animForFacing();
        if (this.playerSprite.anims.currentAnim?.key !== key || !this.playerSprite.anims.isPlaying) this.playerSprite.play(key, true);

    updateCivilians(delta = 16) {
      for (const civ of this.civilians) {
        if (!civ.body) continue;
        const bx = civ.body.x, by = civ.body.y;
        if (civ.sprite) {
          if (civ.sprite.setPosition) civ.sprite.setPosition(bx, by);
          else { civ.sprite.x = bx; civ.sprite.y = by; }
        }
        if (civ.pauseTimer > 0) {
          civ.pauseTimer -= delta;
          if (civ.body.body) civ.body.body.setVelocity(0, 0);
          if (civ.sprite?.anims?.isPlaying) civ.sprite.anims.stop();
          if (civ.sprite?.setFrame && this.textures.exists(civ.assetKey)) {
            civ.sprite.setFrame((NPC_DIR_ROW[civ.facing] ?? 0) * 4);
          }
          continue;
        }
        if (!civ.targetNodeId) {
          const cur = CITY_SW_MAP[civ.nodeId];
          if (!cur || !cur.links.length) { civ.pauseTimer = 1000; continue; }
          const opts = cur.links.filter(l => l !== civ.prevNodeId);
          civ.prevNodeId = civ.nodeId;
          civ.targetNodeId = opts.length ? opts[Phaser.Math.Between(0, opts.length - 1)] : cur.links[0];
        }
        const tgt = CITY_SW_MAP[civ.targetNodeId];
        if (!tgt) { civ.targetNodeId = null; continue; }
        const dx = tgt.x - bx, dy = tgt.y - by, d = Math.hypot(dx, dy);
        if (d < 14) {
          civ.nodeId = civ.targetNodeId; civ.targetNodeId = null;
          civ.pauseTimer = Phaser.Math.Between(400, 1800);
          if (civ.body.body) civ.body.body.setVelocity(0, 0);
          continue;
        }
        let slow = false;
        for (const o of this.civilians) {
          if (o === civ || !o.body) continue;
          if (Math.hypot(o.body.x - bx, o.body.y - by) < 30) { slow = true; break; }
        }
        const spd = slow ? civ.speed * 0.35 : civ.speed;
        if (civ.body.body) civ.body.body.setVelocity((dx / d) * spd, (dy / d) * spd);
        const ang = Phaser.Math.RadToDeg(Math.atan2(dy, dx));
        civ.facing = ['E','SE','S','SW','W','NW','N','NE'][Math.round(((ang + 360) % 360) / 45) % 8];
        if (civ.sprite && this.textures.exists(civ.assetKey)) {
          const animKey = `civ_walk_${civ.assetKey}_${civ.facing}`;
          if (!this.anims.exists(animKey)) {

          }

            civ.sprite.play(animKey, true);
          }
        }
      }
    }

    createTrafficCars() {

            .setStrokeStyle(2, 0x9db5c7, 0.7).setDepth(23);
          sprite._isFallback = true;
        }
        this.trafficCars.push({
          body, sprite, vehicleKey: cfg.vk, route,
          wpIndex: (cfg.sw + 1) % route.waypoints.length,
          heading: 0, maxSpeed: cfg.vk === 'ironcrest_hauler' ? 56 : cfg.vk === 'meridian_sentinel_patrol' ? 60 : 72,
          waitTimer: 0, blockedTimer: 0, state: 'driving',
        });
      }
    }

    updateTrafficCars(delta = 16) {
      if (!this.trafficCars?.length) return;
      for (const car of this.trafficCars) {
        if (!car.body) continue;
        const bx = car.body.x, by = car.body.y;
        if (car.sprite) {
          if (car.sprite.setPosition) car.sprite.setPosition(bx, by);
          else { car.sprite.x = bx; car.sprite.y = by; }
        }
        if (car.waitTimer > 0) {
          car.waitTimer -= delta;
          if (car.body.body) car.body.body.setVelocity(0, 0);
          continue;
        }
        const wp = car.route.waypoints[car.wpIndex];
        if (!wp) continue;
        const dx = wp.x - bx, dy = wp.y - by, d = Math.hypot(dx, dy);
        if (d < 20) {
          if (wp.stop) car.waitTimer = Phaser.Math.Between(800, 1800);
          car.wpIndex = (car.wpIndex + 1) % car.route.waypoints.length;
          continue;
        }
        car.heading = Math.atan2(dy, dx);
        let emergStop = false, slowDown = false;
        for (const other of this.trafficCars) {
          if (other === car || !other.body) continue;
          const ox = other.body.x - bx, oy = other.body.y - by;
          const od = Math.hypot(ox, oy);
          if (od > 220) continue;
          const dot = ox * Math.cos(car.heading) + oy * Math.sin(car.heading);
          if (dot <= 0) continue;
          if (od < 90)  { emergStop = true; break; }
          if (od < 180) slowDown = true;
        }
        if (emergStop) {
          if (car.body.body) car.body.body.setVelocity(0, 0);
          car.blockedTimer += delta;
          if (car.blockedTimer > 3200) {
            car.wpIndex = (car.wpIndex + 2) % car.route.waypoints.length;
            car.blockedTimer = 0;
          }
        } else {
          car.blockedTimer = 0;
          const spd = slowDown ? car.maxSpeed * 0.45 : car.maxSpeed;
          if (car.body.body) car.body.body.setVelocity((dx / d) * spd, (dy / d) * spd);
        }
        if (car.sprite && !car.sprite._isFallback) {
          car.sprite.setFrame(this.getVehicleFrameFromAngle(car.heading));
        } else if (car.sprite?._isFallback) {
          car.sprite.setRotation?.(car.heading + Math.PI / 2);
        }
      }
    }

    checkAutoTransitions() {

      const h = this.getStrictHotspot(['stairs_to_floor2', 'stairs_to_floor1', 'station_exit_main', 'station_elevator']);
      if (!h) return;

      this.transitionLocked = true;
      if (this.playerBody?.body) this.playerBody.body.setVelocity(0, 0);

      if (h.id === 'station_exit_main') {
        this.scene.start('GameScene', {
          fromStationExit: true,
          spawn: { x: 1010, y: 570 },
          message: 'Exited Raven Hook Police Station.'
        });
        return;
      }

      if (h.id === 'station_elevator') {
        this.enterElevatorRoom();
        return;
      }

      if (h.id === 'stairs_to_floor2') {
        this.changeStationFloor('floor2', 'stairsFromFloor1', 'Came up the stairs to Floor 2.');
        return;
      }

      if (h.id === 'stairs_to_floor1') {
        this.changeStationFloor('floor1', 'stairsFromFloor2', 'Came down the stairs to Floor 1.');
        return;
      }
    }



    malcolmShootFrame(facing = this.playerFacing || 'S') {
      const rows = { S:0, SW:2, W:2, NW:2, N:1, NE:3, E:3, SE:3 };
      return (rows[facing] ?? 0) * MALCOLM_SHOOT_ASSET.cols;
    }

    malcolmShootAnimKey(facing = this.playerFacing || 'S') {
      const name = ({ S:'south', SW:'west', W:'west', NW:'west', N:'north', NE:'east', E:'east', SE:'east' })[facing] || 'south';
      return `malcolm_shoot_${name}`;
    }

    createMalcolmShootAnims() {
      if (this.anims.exists('malcolm_shoot_south') || !this.textures.exists(MALCOLM_SHOOT_ASSET.key)) return;
      const rows = [['south',0], ['north',1], ['west',2], ['east',3]];
      for (const [name, row] of rows) {
        this.anims.create({
          key: `malcolm_shoot_${name}`,
          frames: this.anims.generateFrameNumbers(MALCOLM_SHOOT_ASSET.key, {
            start: row * MALCOLM_SHOOT_ASSET.cols,
            end: row * MALCOLM_SHOOT_ASSET.cols + MALCOLM_SHOOT_ASSET.cols - 1
          }),
          frameRate: 12,
          repeat: 0
        });
      }
    }

    malcolmShoot() {
      if (this.inCar || !this.player || !this.player.body?.enable) {
        this.message = 'Exit the car before firing.';
        this.messageTimer = 1300;
        return;
      }

      const now = this.time.now || 0;
      if (now - (this.malcolmLastShotAt || 0) < 380) return;
      this.malcolmLastShotAt = now;

      this.ensurePlayerSprite();
      this.createMalcolmShootAnims();

      if (this.playerSprite && this.textures.exists(MALCOLM_SHOOT_ASSET.key)) {
        this.playerSprite.setTexture(MALCOLM_SHOOT_ASSET.key);
        this.playerSprite.setOrigin(0.5, MALCOLM_SHOOT_ASSET.originY);
        this.playerSprite.setScale(MALCOLM_SHOOT_ASSET.scale);
        this.playerSprite.play(this.malcolmShootAnimKey(this.playerFacing), true);
        this.playerActionUntil = now + 520;
      }

      const dir = {
        S:{x:0,y:1}, SW:{x:-0.7,y:0.7}, W:{x:-1,y:0}, NW:{x:-0.7,y:-0.7},
        N:{x:0,y:-1}, NE:{x:0.7,y:-0.7}, E:{x:1,y:0}, SE:{x:0.7,y:0.7}
      }[this.playerFacing || 'S'] || {x:0,y:1};

      const sx = this.player.x + dir.x * 24;
      const sy = this.player.y + dir.y * 24;
      const ex = sx + dir.x * 310;
      const ey = sy + dir.y * 310;

      const tracer = this.add.line(0, 0, sx, sy, ex, ey, 0xffe27a, 0.96).setOrigin(0, 0).setLineWidth(3).setDepth(85);
      const flash = this.add.circle(sx, sy, 10, 0xfff1a6, 0.95).setDepth(86);
      this.tweens.add({ targets:[tracer, flash], alpha:0, duration:135, onComplete:()=>{ tracer.destroy(); flash.destroy(); } });

      this.message = 'Malcolm fires.';
      this.messageTimer = 800;
    }

    restorePlayerWalkTexture() {
      if (!this.playerSprite || !this.textures.exists(PLAYER_ASSET.key)) return;
      if (this.playerSprite.texture?.key !== PLAYER_ASSET.key) {
        this.playerSprite.setTexture(PLAYER_ASSET.key);
        this.playerSprite.setOrigin(0.5, PLAYER_ASSET.originY);
        this.playerSprite.setScale(PLAYER_ASSET.scale);
      }
    }

    ramosIsOnDuty() {
      return !!(GAME.ramos && GAME.ramos.onDuty && !GAME.ramos.dismissed);
    }

    ramosFrame(asset, facing) {
      const rows = { S:0, SW:2, W:2, NW:2, N:1, NE:3, E:3, SE:3 };
      return (rows[facing] ?? 0) * asset.cols;
    }

    ramosAnimKey(mode, facing) {
      const name = ({ S:'south', SW:'west', W:'west', NW:'west', N:'north', NE:'east', E:'east', SE:'east' })[facing] || 'south';
      return `ramos_${mode}_${name}`;
    }

    createRamosAnims() {
      if (this.anims.exists('ramos_walk_south')) return;

      const make = (mode, asset, frameRate, repeat) => {
        const rows = [['south',0], ['north',1], ['west',2], ['east',3]];
        for (const [name, row] of rows) {
          this.anims.create({
            key: `ramos_${mode}_${name}`,
            frames: this.anims.generateFrameNumbers(asset.key, {
              start: row * asset.cols,
              end: row * asset.cols + asset.cols - 1
            }),
            frameRate,
            repeat
          });
        }
      };

      if (this.textures.exists(RAMOS_WALK_ASSET.key)) make('walk', RAMOS_WALK_ASSET, 9, -1);
      if (this.textures.exists(RAMOS_TALK_ASSET.key)) make('talk', RAMOS_TALK_ASSET, 7, 0);
      if (this.textures.exists(RAMOS_SHOOT_ASSET.key)) make('shoot', RAMOS_SHOOT_ASSET, 10, 0);
    }

    createRamosCompanion(x = 500, y = 680) {
      this.ramosFacing = this.ramosFacing || 'S';
      this.ramosActionUntil = 0;

      this.ramosBody = this.add.rectangle(x, y, 24, 34, COLORS.purple, 0).setDepth(29);
      this.physics.add.existing(this.ramosBody);
      this.ramosBody.body.setCollideWorldBounds(true);
      this.physics.add.collider(this.ramosBody, this.walls);

      this.ensureRamosCompanion();
      this.setRamosVisible(this.ramosIsOnDuty() && !GAME.ramos.inCar);
    }

    ensureRamosCompanion() {
      if (!this.ramosBody || this.ramosSprite || !this.textures.exists(RAMOS_WALK_ASSET.key)) return;
      this.createRamosAnims();
      this.ramosSprite = this.add.sprite(this.ramosBody.x, this.ramosBody.y, RAMOS_WALK_ASSET.key, this.ramosFrame(RAMOS_WALK_ASSET, this.ramosFacing))
        .setOrigin(0.5, RAMOS_WALK_ASSET.originY)
        .setScale(RAMOS_WALK_ASSET.scale)
        .setDepth(30);
      this.setRamosVisible(this.ramosIsOnDuty() && !GAME.ramos.inCar);
    }

    setRamosVisible(on) {
      if (this.ramosBody?.body) this.ramosBody.body.enable = !!on;
      if (this.ramosBody) this.ramosBody.setVisible(false);
      if (this.ramosSprite) this.ramosSprite.setVisible(!!on);
    }

    isRamosNearPlayer(range = 105) {
      if (!this.ramosIsOnDuty() || GAME.ramos.inCar || !this.ramosBody || !this.player) return false;
      return Phaser.Math.Distance.Between(this.player.x, this.player.y, this.ramosBody.x, this.ramosBody.y) <= range;
    }

    ramosFollowOffset() {
      const offsets = {
        S:{x:-54,y:-44}, SW:{x:48,y:-38}, W:{x:64,y:8}, NW:{x:46,y:46},
        N:{x:54,y:50}, NE:{x:-46,y:46}, E:{x:-64,y:8}, SE:{x:-48,y:-38}
      };
      return offsets[this.playerFacing] || offsets.S;
    }

    ramosDirectionFromVector(vx, vy) {
      if (Math.abs(vx) < 0.01 && Math.abs(vy) < 0.01) return this.ramosFacing || 'S';
      const angle = Phaser.Math.RadToDeg(Math.atan2(vy, vx));
      return ['E','SE','S','SW','W','NW','N','NE'][Math.round(((angle+360)%360)/45)%8];
    }

    updateRamosCompanion(time, delta) {
      if (!this.ramosBody) return;

      if (!this.ramosIsOnDuty()) {
        this.setRamosVisible(false);
        return;
      }

      if (this.inCar || GAME.ramos.inCar) {
        GAME.ramos.inCar = true;
        this.setRamosVisible(false);
        if (this.ramosBody.body) this.ramosBody.body.setVelocity(0, 0);
        return;
      }

      GAME.ramos.inCar = false;
      this.ensureRamosCompanion();
      this.setRamosVisible(true);

      const off = this.ramosFollowOffset();
      const tx = this.player.x + off.x;
      const ty = this.player.y + off.y;
      const dx = tx - this.ramosBody.x;
      const dy = ty - this.ramosBody.y;
      const dist = Math.hypot(dx, dy);
      let moving = false;

      if (dist > 48 && this.ramosBody.body) {
        const speed = dist > 180 ? 235 : 170;
        this.ramosBody.body.setVelocity((dx / dist) * speed, (dy / dist) * speed);
        this.ramosFacing = this.ramosDirectionFromVector(dx, dy);
        moving = true;
      } else if (this.ramosBody.body) {
        this.ramosBody.body.setVelocity(0, 0);
      }

      if (!this.ramosSprite) return;
      this.ramosSprite.setPosition(this.ramosBody.x, this.ramosBody.y);

      if (this.ramosActionUntil && (this.time.now || 0) < this.ramosActionUntil) return;

      if (this.ramosSprite.texture.key !== RAMOS_WALK_ASSET.key) this.ramosSprite.setTexture(RAMOS_WALK_ASSET.key);
      if (moving) this.ramosSprite.play(this.ramosAnimKey('walk', this.ramosFacing), true);
      else {
        this.ramosSprite.anims.stop();
        this.ramosSprite.setFrame(this.ramosFrame(RAMOS_WALK_ASSET, this.ramosFacing));
      }
    }

    ramosSpeak(text) {
      this.message = text;
      this.messageTimer = 4200;
      if (this.promptText?.setText) this.promptText.setText(text);
      if (this.ramosSprite && this.textures.exists(RAMOS_TALK_ASSET.key)) {
        this.ramosSprite.setTexture(RAMOS_TALK_ASSET.key);
        this.ramosSprite.setScale(RAMOS_TALK_ASSET.stationScale || RAMOS_TALK_ASSET.scale);
        this.ramosSprite.play(this.ramosAnimKey('talk', this.ramosFacing || this.playerFacing || 'S'), true);
        this.ramosActionUntil = (this.time.now || 0) + 1500;
      }
    }

    ramosSmallTalk() {
      if (!this.ramosIsOnDuty()) {
        this.message = 'Ramos is back at the station.';
        this.messageTimer = 2200;
        return;
      }
      const i = GAME.ramos.smallTalkIndex % RAMOS_SMALL_TALK_LINES.length;
      GAME.ramos.smallTalkIndex += 1;
      this.ramosSpeak(RAMOS_SMALL_TALK_LINES[i]);
    }

    ramosShoot() {
      if (!this.ramosIsOnDuty() || GAME.ramos.inCar || !this.ramosBody) return;
      const now = this.time.now || 0;
      if (now - (this.ramosLastShotAt || 0) < 450) return;
      this.ramosLastShotAt = now;

      if (this.ramosSprite && this.textures.exists(RAMOS_SHOOT_ASSET.key)) {
        this.ramosSprite.setTexture(RAMOS_SHOOT_ASSET.key);
        this.ramosSprite.setScale(RAMOS_SHOOT_ASSET.stationScale || RAMOS_SHOOT_ASSET.scale);
        this.ramosSprite.play(this.ramosAnimKey('shoot', this.ramosFacing || this.playerFacing || 'S'), true);
        this.ramosActionUntil = now + 750;
      }

      const dir = {
        S:{x:0,y:1}, SW:{x:-0.7,y:0.7}, W:{x:-1,y:0}, NW:{x:-0.7,y:-0.7},
        N:{x:0,y:-1}, NE:{x:0.7,y:-0.7}, E:{x:1,y:0}, SE:{x:0.7,y:0.7}
      }[this.ramosFacing || 'S'] || {x:0,y:1};

      const sx = this.ramosBody.x + dir.x * 24;
      const sy = this.ramosBody.y + dir.y * 24;
      const ex = sx + dir.x * 260;
      const ey = sy + dir.y * 260;

      const tracer = this.add.line(0, 0, sx, sy, ex, ey, 0xffe27a, 0.95).setOrigin(0, 0).setLineWidth(3).setDepth(80);
      const flash = this.add.circle(sx, sy, 9, 0xfff1a6, 0.9).setDepth(81);
      this.tweens.add({ targets:[tracer, flash], alpha:0, duration:140, onComplete:()=>{ tracer.destroy(); flash.destroy(); } });
      this.ramosSpeak('Ramos: Covering!');
    }

    ramosActionTalk() {
      if (!GAME.ramos.introduced) {
        GAME.ramos.introduced = true;
        GAME.ramos.onDuty = true;
        GAME.ramos.dismissed = false;
        GAME.ramos.inCar = false;
        this.ramosSpeak("Ramos: Detective King? Elena Ramos. Captain assigned me to ride with you. I’m your new partner.");
        return true;
      }

      this.ramosSmallTalk();
      return true;
    }

    canUseCar() {
      if (this.inCar) return true;
      if (!this.player || !this.car) return false;
      const dx = Math.abs(this.player.x - this.car.x);
      const dy = Math.abs(this.player.y - this.car.y);
      return dist(this.player, this.car) < CAR_INTERACT_RANGE || (dx < 260 && dy < 260);
    }

    handleCarOrArrest() {
      if (this.canUseCar()) {
        this.handleInteract();
        return;
      }
      this.tryArrest();
    }

    handleCarOrShoot() {
      if (this.canUseCar()) {
        this.handleInteract();
        return;
      }
      this.malcolmShoot();
    }

    handleInteract() {
      if(this.inCar){
        this.inCar=false;
        GAME.ramos.inCar = false;
        this.player.setVisible(false).setPosition(this.car.x-34,this.car.y+8);
        this.player.body.enable=true;
        this.updatePlayerSprite(false);
        if (this.ramosBody) this.ramosBody.setPosition(this.player.x + 48, this.player.y + 10);
        this.car.body.setVelocity(0,0); this.car.vx=this.car.vy=0;
        this.cameras.main.startFollow(this.player,true,CAMERA.followLerp,CAMERA.followLerp);
        this.cameras.main.setDeadzone(42, 32);
        this.cameras.main.setZoom(CAMERA.playerZoom);
        GAME.car.visualState.driverDoorOpen=true; this.syncVehicleSprites();
        this.time.delayedCall(900,()=>{GAME.car.visualState.driverDoorOpen=false;this.syncVehicleSprites();});
        this.message=GAME.ramos.onDuty && !GAME.ramos.dismissed ? 'Exited vehicle. Ramos steps out passenger side.' : 'Exited vehicle.';
        this.messageTimer=2200; return;
      }
      if(dist(this.player,this.car)<CAR_INTERACT_RANGE){
        this.inCar=true;
        if (GAME.ramos.onDuty && !GAME.ramos.dismissed) GAME.ramos.inCar = true;
        this.player.setVisible(false); this.player.body.enable=false;
        if(this.playerSprite) this.playerSprite.setVisible(false);
        this.setRamosVisible(false);
        this.cameras.main.startFollow(this.car,true,CAMERA.followLerp,CAMERA.followLerp);
        this.cameras.main.setDeadzone(62, 48);
        GAME.car.visualState.driverDoorOpen=true; this.syncVehicleSprites();
        this.time.delayedCall(700,()=>{GAME.car.visualState.driverDoorOpen=false;this.syncVehicleSprites();});
        this.message=GAME.ramos.onDuty && !GAME.ramos.dismissed ? 'Entered unmarked sedan. Ramos gets in passenger side.' : 'Entered unmarked sedan.';
        this.messageTimer=2200; return;
      }
      if (!this.closestZone && this.isRamosNearPlayer()) {
        this.ramosActionTalk();
        return;
      }
      if(!this.closestZone) return;
      const z=this.closestZone;
      if(z.type==='door') this.enterBuilding(z);
      if(z.type==='crime_trigger') this.startShopliftingCase();
      if(z.type==='evidence'&&GAME.case.active&&!GAME.case.evidenceCollected){
        GAME.case.evidenceCollected=true; this.playerInventory.push('stolen_cigarettes'); this.evidence.visible=false;
        this.message='Evidence collected: stolen cigarettes.'; this.messageTimer=3000;
      }
      if(z.type==='witness'){
        GAME.case.witnessStatement=true;
        this.message=z.npcId==='marlene_pike'?"Marlene Pike: 'He stuffed cartons in his jacket and ran for the back.'":'Witness statement logged.';
        this.messageTimer=4200;
      }
    }
    tryArrest(){
      if (this.canUseCar && this.canUseCar()) {
        this.handleInteract();
        return;
      }
      if (!GAME.case.active || GAME.case.suspectArrested) return;
      const actor = this.inCar ? this.car : this.player;
      if (dist(actor, this.suspect) < 75) {
        GAME.case.suspectArrested = true;
        this.suspectActive = true;
        this.suspect.body.setVelocity(0, 0);
        this.suspect.setFillStyle(0x552222, 0);
        this.suspect.visible = false;
        this.updateEddieCrossSprite(false);
        this.dispatch = 'Dispatch: Suspect detained. Secure evidence and witness statement.';
        this.objective = 'Collect evidence, talk to clerk, store evidence in trunk, return to report room.';
        this.message = 'Arrested Eddie Cross.';
        this.messageTimer = 3200;
      } else {
        this.message = 'No suspect close enough to arrest.';
        this.messageTimer = 2200;
      }
    }
    handleTrunk(){ const actor=this.inCar?this.car:this.player; if(dist(actor,this.car)>100){ this.message='Move near the detective sedan trunk.'; this.messageTimer=2500; return; } GAME.car.visualState.trunkOpen=true; this.syncVehicleSprites(); this.time.delayedCall(2200,()=>{GAME.car.visualState.trunkOpen=false;this.syncVehicleSprites();}); if(this.playerInventory.includes('stolen_cigarettes')&&!GAME.case.evidenceInTrunk){ GAME.case.evidenceInTrunk=true; GAME.car.trunk.push('stolen_cigarettes'); this.message='Stored evidence in trunk: stolen cigarettes.'; } else this.message=GAME.case.evidenceInTrunk?'Trunk contains: stolen cigarettes.':'Trunk empty. Collect evidence first.'; this.messageTimer=3000; }
    tryReport(){ const rz=INTERACTION_ZONES.find(z=>z.id==='report_desk'); if(overlap(rz,this.inCar?this.car:this.player)) this.scene.start('ReportScene'); else { this.message='Return to the Report Room desk at Raven Hook Precinct.'; this.messageTimer=2800; } }
    updateHUD(){ const speed=Math.round(Math.hypot(this.car.vx||0,this.car.vy||0)/4.7); const hour=Math.floor(this.shiftMinutes/60)%24; const min=Math.floor(this.shiftMinutes%60).toString().padStart(2,'0'); const flags=[GAME.case.active?'CASE':'PATROL', GAME.case.suspectArrested?'ARREST':'NO ARREST', GAME.case.evidenceCollected?'EVIDENCE':'NO EVIDENCE', GAME.case.witnessStatement?'WITNESS':'NO WITNESS', GAME.case.evidenceInTrunk?'TRUNK':'NO TRUNK'].join(' | '); this.hudText.setText(`Raven Hook World Base v0.4 | Day ${GAME.day} ${hour}:${min} | ${GAME.rank} XP ${GAME.xp}\n${this.dispatch}\n${this.objective}\n${flags}`); const vs=GAME.car.visualState; const carState=vs.trunkOpen?'TRUNK':vs.driverDoorOpen?'DOOR':(vs.smokeFire||GAME.car.damage>=70)?'SMOKE':'NORMAL'; this.carText.setText(`MPH ${speed} | Fuel ${GAME.car.fuel.toFixed(0)}% | Damage ${GAME.car.damage}% | Frame ${this.car.rotationFrame??0} | Car ${carState} | CarArt ${this.spriteLayersMade?'SPRITE':'FALLBACK'} | Player ${this.playerSprite?'SPRITE':'loading'} | Eddie ${this.eddieSprite?'SPRITE':'fallback'} | Map ${this.realGround?'PNG':'fallback'} | Bldg ${this.realBuildingImages?'pngs':this.realBuildingSheet?'sheet':'fallback'} | Music ${THEME_MUSIC?.isPlaying?'ON':'off'}`); this.promptText.setText(this.closestZone?`A/E: ${this.closestZone.label||this.closestZone.type}`:(this.isRamosNearPlayer()?'A/E interact | X car/shoot | B car/arrest | Y Ramos talk | T trunk':'A/E interact | X car/shoot | B car/arrest | Y talk | T trunk')); this.layerText.setText(`Debug C/G:${this.debug.collision?'ON':'off'} I:${this.debug.interaction?'ON':'off'} P:${this.debug.spawns?'ON':'off'} | STICK:${this.mobile.useStick?'ON':'off'} | ZOOM:${this.cameras.main.zoom.toFixed(2)}`); this.messageText.setText(this.messageTimer>0?this.message:''); }
    redrawDebug(){ this.debugGraphics.clear(); if(this.debug.collision) for(const r of COLLISION_RECTS){ const color=r.type==='large_prop'?COLORS.orange:COLORS.red; this.debugGraphics.fillStyle(color,0.22).fillRect(r.x,r.y,r.w,r.h); this.debugGraphics.lineStyle(3,color,0.9).strokeRect(r.x,r.y,r.w,r.h);} if(this.debug.interaction) for(const z of INTERACTION_ZONES){ const color=z.type==='door'?COLORS.blue:z.type==='evidence'?COLORS.yellow:z.type==='witness'?COLORS.purple:z.type==='crime_trigger'?COLORS.orange:z.type==='report'?COLORS.cyan:0xffffff; this.debugGraphics.fillStyle(color,0.25).fillRect(z.x,z.y,z.w,z.h); this.debugGraphics.lineStyle(2,color,0.95).strokeRect(z.x,z.y,z.w,z.h);} if(this.debug.spawns) for(const s of SPAWN_POINTS){ const color=s.type==='player'?COLORS.blue:s.type==='vehicle'?0xffffff:s.type==='suspect'?COLORS.red:s.type==='witness'?COLORS.purple:s.type==='evidence'?COLORS.yellow:0xaaaaaa; this.debugGraphics.fillStyle(color,0.85).fillCircle(s.x,s.y,11); this.debugGraphics.lineStyle(2,0,0.7).strokeCircle(s.x,s.y,11);} }
  }



  class PoliceStationScene extends Phaser.Scene {

    preload() {
      if (!this.cache.audio.exists(THEME_ASSET.key)) this.load.audio(THEME_ASSET.key, A(THEME_ASSET.path));
      for (const level of Object.values(POLICE_STATION_LEVEL_ASSETS)) {
        this.load.image(level.baseKey, A(level.basePath));
        this.load.image(level.propsKey, A(level.propsPath));
      }

      this.load.image(POLICE_STATION_ASSETS.propSheet.key, A(POLICE_STATION_ASSETS.propSheet.path));

      this.load.spritesheet(MALCOLM_STATION_ASSET.key, A(MALCOLM_STATION_ASSET.path), {
        frameWidth: MALCOLM_STATION_ASSET.frameWidth,
        frameHeight: MALCOLM_STATION_ASSET.frameHeight
      });

      this.load.spritesheet(MALCOLM_SHOOT_ASSET.key, A(MALCOLM_SHOOT_ASSET.path), {
        frameWidth: MALCOLM_SHOOT_ASSET.frameWidth,
        frameHeight: MALCOLM_SHOOT_ASSET.frameHeight
      });

      for (const ramosAsset of [RAMOS_WALK_ASSET, RAMOS_TALK_ASSET, RAMOS_SHOOT_ASSET]) {
        this.load.spritesheet(ramosAsset.key, A(ramosAsset.path), {
          frameWidth: ramosAsset.frameWidth,
          frameHeight: ramosAsset.frameHeight
        });
      }

      this.load.spritesheet(PLAYER_ASSET.key, A(PLAYER_ASSET.path), {
        frameWidth: PLAYER_ASSET.frameWidth,
        frameHeight: PLAYER_ASSET.frameHeight
      });

      this.load.on('loaderror', (file) => {
        if (file?.key === PLAYER_ASSET.key && !this._triedPlayerFallback) {
          this._triedPlayerFallback = true;
          this.load.spritesheet(PLAYER_ASSET.key, A(PLAYER_ASSET.fallbackPath), {
            frameWidth: PLAYER_ASSET.frameWidth,
            frameHeight: PLAYER_ASSET.frameHeight
          });
        }
      });

      // Police NPC walk sheets for station interiors (graceful fail on missing assets)
      for (const pna of POLICE_NPC_ASSETS) {
        if (!this.textures.exists(pna.key)) {
          this.load.spritesheet(pna.key, A(pna.path), { frameWidth: pna.fw, frameHeight: pna.fh });
        }
      }
    }

    create() {
      this.stationW = 1600;
      this.stationH = 1000;
      this.stationPlayerScale = MALCOLM_STATION_ASSET.scale;
      this.floorId = POLICE_STATION_LEVEL_ASSETS[this.entryData.floor] ? this.entryData.floor : 'floor1';
      this.floorData = POLICE_STATION_LEVEL_ASSETS[this.floorId];

      this.physics.world.setBounds(0, 0, this.stationW, this.stationH);
      this.cameras.main.setBounds(0, 0, this.stationW, this.stationH);
      this.cameras.main.setBackgroundColor('#05070b');

      this.keys = this.input.keyboard.addKeys({
        up: 'W', down: 'S', left: 'A', right: 'D',
        arrowUp: 'UP', arrowDown: 'DOWN', arrowLeft: 'LEFT', arrowRight: 'RIGHT',
        interact: 'E', enter: 'ENTER'
      });

      this.mobile = MOBILE_INPUT_STATE;
      this.uiObjects = [];
      this.floorMenuOpen = false;
      this.transitionLocked = false;
      this.transitionCooldown = this.entryData.fromAutoTransition ? 900 : 350;

      this.add.image(0, 0, this.floorData.baseKey)
        .setOrigin(0, 0)
        .setDisplaySize(this.stationW, this.stationH)
        .setDepth(0);

      this.stationPropsLayer = this.add.image(0, 0, this.floorData.propsKey)
        .setOrigin(0, 0)
        .setDisplaySize(this.stationW, this.stationH)
        .setDepth(8)
        .setVisible(true);

      this.hotspots = this.makeHotspotsForFloor(this.floorId);

      this.walls = this.physics.add.staticGroup();
      this.addCollisionRects();

      const spawn = this.entryData.spawn || this.floorData.spawns.default;
      const startX = spawn.x;
      const startY = spawn.y;

      this.playerBody = this.add.rectangle(startX, startY, 42, 64, COLORS.blue, 0.0).setDepth(30);
      this.physics.add.existing(this.playerBody);
      this.playerBody.body.setCollideWorldBounds(true);
      this.physics.add.collider(this.playerBody, this.walls);

      this.playerFacing = spawn.facing || 'S';
      this.playerSprite = null;

      if (this.textures.exists(MALCOLM_STATION_ASSET.key)) {
        this.createPlayerAnims();
        this.playerSprite = this.add.sprite(startX, startY, MALCOLM_STATION_ASSET.key, this.frameForFacing())
          .setOrigin(0.5, MALCOLM_STATION_ASSET.originY)
          .setScale(this.stationPlayerScale)
          .setDepth(31);
      } else if (this.textures.exists(PLAYER_ASSET.key)) {
        this.createPlayerAnims();
        this.playerSprite = this.add.sprite(startX, startY, PLAYER_ASSET.key, 0)
          .setOrigin(0.5, PLAYER_ASSET.originY)
          .setScale(1.45)
          .setDepth(31);
      } else {
        this.playerFallback = this.add.rectangle(startX, startY, 42, 64, COLORS.blue, 1).setDepth(31);
      }

      this.createRamosCompanion(startX - 64, startY + 18);
      this.stationNpcs = [];
      if (this.floorId === 'floor1') this.createStationPoliceNPCs();

      this.cameras.main.startFollow(this.playerBody, true, CAMERA.followLerp, CAMERA.followLerp);
      this.cameras.main.setDeadzone(42, 32);
      this.cameras.main.setZoom(0.68);

      this.promptBg = this.add.rectangle(VIEW_W / 2, VIEW_H - 38, 760, 42, 0x02060a, 0.72)
        .setScrollFactor(0)
        .setDepth(2000);
      this.promptText = makeText(this, VIEW_W / 2, VIEW_H - 47, this.floorData.title, 15, '#f4d28a', true)
        .setOrigin(0.5)
        .setDepth(2001);
      this.infoText = makeText(this, 18, 18, `${this.floorData.title} | A/E interact | Stairs change floors | Front door exits`, 14, '#86e7ff', true)
        .setDepth(2001);
      this.registerStationUi(this.promptBg);
      this.registerStationUi(this.promptText);
      this.registerStationUi(this.infoText);

      this.input.keyboard.on('keydown-E', () => this.handleInteract());
      this.input.keyboard.on('keydown-ENTER', () => this.handleInteract());
      this.input.keyboard.on('keydown-A', () => this.handleInteract());
      this.input.keyboard.on('keydown-T', () => this.ramosSmallTalk());
      this.input.keyboard.on('keydown-F', () => this.malcolmShoot());
      this.input.keyboard.on('keydown-O', () => { if (this.stationPropsLayer) this.stationPropsLayer.setVisible(!this.stationPropsLayer.visible); });
      this.input.keyboard.on('keydown', (event) => this.handleFloorPromptKey(event));

      launchGlobalMobileControls(this);
      this.setupStationUiCamera();
      installPauseMenu(this);
      // Keep title theme alive after scene transition. On iOS this also retries after the user tap.
      this.time.delayedCall(150, () => startTheme(this));
      this.input.once('pointerdown', () => startTheme(this));


      if (this.entryData.message) this.promptText.setText(this.entryData.message);
      if (this.entryData.fromElevatorRoom) this.cameras.main.fadeIn(180, 0, 0, 0);
    }

    registerStationUi(obj) {
      if (!obj) return obj;
      if (!this.uiObjects) this.uiObjects = [];
      if (!this.uiObjects.includes(obj)) this.uiObjects.push(obj);
      if (obj.setScrollFactor) obj.setScrollFactor(0);
      if (obj.setDepth && obj.depth < 2000) obj.setDepth(2000);
      if (this.cameras?.main) this.cameras.main.ignore(obj);
      return obj;
    }

    setupStationUiCamera() {
      if (this.uiCamera) return;

      const uiObjects = (this.uiObjects || []).filter(Boolean);

      this.uiCamera = this.cameras.add(0, 0, VIEW_W, VIEW_H)
        .setScroll(0, 0)
        .setZoom(1)
        .setName('StationUICamera');

      this.uiCamera.roundPixels = true;
      this.cameras.main.ignore(uiObjects);

      const uiSet = new Set(uiObjects);
      const worldObjects = this.children.list.filter(obj => !uiSet.has(obj));
      this.uiCamera.ignore(worldObjects);
    }
