name: Import Raven Hook Vehicle Set

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-vehicle-set:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check vehicle ZIP
        run: |
          ls -lah
          test -f the_report_vehicle_set_WORKFLOW_PACK.zip

      - name: Unzip vehicle set
        run: |
          unzip -o the_report_vehicle_set_WORKFLOW_PACK.zip

      - name: Show imported vehicle files
        run: |
          find assets/vehicles -type f | sort || true
          find config/vehicles -type f | sort || true
          find docs/vehicles -type f | sort || true
          find docs/previews/vehicles -type f | sort || true

      - name: Commit imported vehicle set
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/vehicles config/vehicles docs/vehicles docs/previews/vehicles README_VEHICLE_SET.md
          if git diff --cached --quiet; then
            echo "No vehicle changes to commit."
          else
            git commit -m "Import Raven Hook vehicle set"
            git push
          fi
