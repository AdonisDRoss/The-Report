name: Import Police HQ Building Overlays

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-police-hq-building-overlays:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check overlay ZIP
        run: |
          ls -lah
          test -f police_hq_building_overlays_PHASER_READY.zip

      - name: Unzip overlay pack
        run: |
          rm -rf /tmp/police_hq_building_overlays
          mkdir -p /tmp/police_hq_building_overlays
          unzip -o police_hq_building_overlays_PHASER_READY.zip -d /tmp/police_hq_building_overlays

      - name: Copy overlays to game assets
        run: |
          mkdir -p assets/maps/raven_hook/chunk_a_police_hq/buildings
          cp /tmp/police_hq_building_overlays/*.png assets/maps/raven_hook/chunk_a_police_hq/buildings/

      - name: Copy overlay docs
        run: |
          mkdir -p docs/map/police_hq/building_overlays
          cp /tmp/police_hq_building_overlays/README_UPLOAD_PATHS.txt docs/map/police_hq/building_overlays/README_UPLOAD_PATHS.txt || true
          cp /tmp/police_hq_building_overlays/import_police_hq_building_overlays.yml docs/map/police_hq/building_overlays/import_police_hq_building_overlays.yml || true

      - name: Show imported files
        run: |
          find assets/maps/raven_hook/chunk_a_police_hq/buildings -type f | sort
          find docs/map/police_hq/building_overlays -type f | sort || true

      - name: Commit imported overlays
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/maps/raven_hook/chunk_a_police_hq/buildings docs/map/police_hq/building_overlays
          if git diff --cached --quiet; then
            echo "No overlay changes to commit."
          else
            git commit -m "Import Police HQ building overlays"
            git push
          fi
