mkdir -p .github/workflows

cat > .github/workflows/main.yml <<'YAML'
name: Import Raven Hook Assets 1-4

"on":
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Check required ZIP files in root
        run: |
          test -f the_report_raven_hook_FINAL_KIMS_FIXED_part01a_hero_processed.zip
          test -f the_report_raven_hook_FINAL_KIMS_FIXED_part01b_hero_processed.zip
          test -f the_report_raven_hook_FINAL_KIMS_FIXED_part02_fillers_processed.zip
          test -f the_report_raven_hook_FINAL_KIMS_FIXED_part03_overlays_config_docs.zip

      - name: Make folders
        run: |
          mkdir -p assets/buildings/hero
          mkdir -p assets/buildings/fillers
          mkdir -p assets/buildings/overlays
          mkdir -p assets/buildings/references
          mkdir -p config
          mkdir -p src
          mkdir -p docs

      - name: Import hero buildings part 1
        run: |
          unzip -o the_report_raven_hook_FINAL_KIMS_FIXED_part01a_hero_processed.zip

      - name: Import hero buildings part 2
        run: |
          unzip -o the_report_raven_hook_FINAL_KIMS_FIXED_part01b_hero_processed.zip

      - name: Import filler buildings
        run: |
          unzip -o the_report_raven_hook_FINAL_KIMS_FIXED_part02_fillers_processed.zip

      - name: Import overlays config docs
        run: |
          unzip -o the_report_raven_hook_FINAL_KIMS_FIXED_part03_overlays_config_docs.zip

      - name: Skip map and backups
        run: |
          echo "Skipping part04_map.zip."
          echo "Skipping backups."
          echo "Skipping Kim/filler patch."

      - name: Show imported files
        run: |
          echo "Hero buildings:"
          find assets/buildings/hero -type f | sort || true

          echo "Filler buildings:"
          find assets/buildings/fillers -type f | sort || true

          echo "Overlays:"
          find assets/buildings/overlays -type f | sort || true

          echo "Config:"
          find config -type f | sort || true

          echo "Src:"
          find src -type f | sort || true

      - name: Commit imported assets
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add assets/buildings config src docs

          if git diff --cached --quiet; then
            echo "No asset changes to commit."
          else
            git commit -m "Import Raven Hook building assets 1-4"
            git push
          fi
YAML
