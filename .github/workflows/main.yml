name: Unzip The Report Patch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip-patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip police NPC traffic patch
        run: |
          unzip -o the_report_police_npc_traffic_patch.zip
          rm -f the_report_police_npc_traffic_patch.zip

      - name: Commit patch files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html assets data README_PATCH.txt

          git commit -m "Add police station NPCs sidewalk pedestrians and traffic AI" || echo "No changes to commit"

          git push
