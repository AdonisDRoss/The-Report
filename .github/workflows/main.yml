name: Import Raven Hook Police Sprites V2 Safe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-police-sprites:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check police sprite zip
        run: |
          ls -lah
          test -f the_report_police_sprites_V2_SAFE_WORKFLOW_PACK.zip

      - name: Unzip police sprite set
        run: |
          unzip -o the_report_police_sprites_V2_SAFE_WORKFLOW_PACK.zip

      - name: Show imported police files
        run: |
          find assets/characters/police -type f | sort || true
          find config/characters -type f | sort || true
          find docs/characters/police -type f | sort || true
          find docs/previews/police -type f | sort || true

      - name: Commit imported police sprites
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/characters/police config/characters docs/characters/police docs/previews/police README_POLICE_SPRITES_V2_SAFE.txt
          if git diff --cached --quiet; then
            echo "No police sprite changes to commit."
          else
            git commit -m "Import Raven Hook police sprites V2 safe"
            git push
          fi
