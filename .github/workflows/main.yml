name: Import Raven Hook Assets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-assets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check zip files
        run: |
          ls -lah
          test -f the_report_raven_hook_FINAL_KIMS_FIXED_part01a_hero_processed.zip
          test -f the_report_raven_hook_FINAL_KIMS_FIXED_part01b_hero_processed.zip
          test -f the_report_raven_hook_FINAL_KIMS_FIXED_part02_fillers_processed.zip
          test -f the_report_raven_hook_FINAL_KIMS_FIXED_part03_overlays_config_docs.zip

      - name: Create folders
        run: |
          mkdir -p assets/buildings/hero
          mkdir -p assets/buildings/fillers
          mkdir -p assets/buildings/overlays
          mkdir -p assets/buildings/references
          mkdir -p config
          mkdir -p src
          mkdir -p docs

      - name: Unzip Raven Hook assets
        run: |
          unzip -o the_report_raven_hook_FINAL_KIMS_FIXED_part01a_hero_processed.zip
          unzip -o the_report_raven_hook_FINAL_KIMS_FIXED_part01b_hero_processed.zip
          unzip -o the_report_raven_hook_FINAL_KIMS_FIXED_part02_fillers_processed.zip
          unzip -o the_report_raven_hook_FINAL_KIMS_FIXED_part03_overlays_config_docs.zip

      - name: Show result
        run: |
          find assets/buildings -type f | sort || true
          find config -type f | sort || true
          find src -type f | sort || true
          find docs -type f | sort || true

      - name: Commit imported assets
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add assets/buildings config src docs

          if git diff --cached --quiet; then
            echo "No asset changes to commit."
          else
            git commit -m "Import Raven Hook building assets"
            git push
          fi
