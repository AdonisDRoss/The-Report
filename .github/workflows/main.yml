name: Install The Report Patch ZIP

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: "Patch ZIP filename in repo root"
        required: true
        default: "the_report_playthrough_part1_core.zip"

permissions:
  contents: write

jobs:
  install-patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show repo files
        run: |
          echo "Repo root:"
          ls -lah

      - name: Check patch ZIP exists
        run: |
          if [ ! -f "${{ github.event.inputs.zip_name }}" ]; then
            echo "Missing ZIP: ${{ github.event.inputs.zip_name }}"
            echo "Upload the ZIP to the repo root first."
            exit 1
          fi

      - name: Backup current index
        run: |
          if [ -f index.html ]; then
            cp index.html "index_backup_before_patch.html"
          fi

      - name: Unzip patch
        run: |
          unzip -o "${{ github.event.inputs.zip_name }}"

      - name: Remove uploaded ZIP after install
        run: |
          rm -f "${{ github.event.inputs.zip_name }}"

      - name: Show changed files
        run: |
          git status --short

      - name: Commit installed patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html index_backup_before_patch.html assets data README_PATCH.txt README_WORLD_OVERLAY_PATCH.txt || true

          git commit -m "Install The Report patch ZIP" || echo "No changes to commit"

          git push
