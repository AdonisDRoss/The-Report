name: Import Intersection Car Assist Fix

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-intersection-car-assist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Find ZIP
        run: |
          ls -lah
          ZIP_FILE="$(ls -1 *intersection*car*assist*.zip 2>/dev/null | head -n 1 || true)"
          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: Upload the_report_intersection_car_assist.zip to repo root."
            exit 1
          fi
          echo "ZIP_FILE=$ZIP_FILE" >> "$GITHUB_ENV"
          echo "Using ZIP: $ZIP_FILE"

      - name: Unzip patch
        run: unzip -o "$ZIP_FILE"

      - name: Verify patch
        run: |
          test -f index.html
          grep -q "INTERSECTION_CAR_ASSIST_PATCH_021" index.html
          grep -q "intersection-car-assist-021" index.html

      - name: Commit patch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html README_INTERSECTION_CAR_ASSIST.md
          if git diff --cached --quiet; then
            echo "No intersection assist changes to commit."
          else
            git commit -m "Improve car intersections and acceleration"
            git push
          fi
