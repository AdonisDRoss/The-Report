name: Import Sprite Road Car Input Fix

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find ZIP
        run: |
          ls -lah
          ZIP_FILE="$(ls -1 *sprite*road*car*input*fix*.zip 2>/dev/null | head -n 1 || true)"
          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: Upload the_report_sprite_road_car_input_fix.zip to repo root."
            exit 1
          fi
          echo "ZIP_FILE=$ZIP_FILE" >> "$GITHUB_ENV"
          echo "Using ZIP: $ZIP_FILE"

      - name: Unzip patch
        run: unzip -o "$ZIP_FILE"

      - name: Verify patch
        run: |
          test -f index.html
          test -f assets/characters/main_detective/main_detective_movement_8dir_96x96_transparent.png
          test -f assets/characters/npcs/partners/ramos/ramos_movement_8dir_96x96.png
          grep -q "SPRITE_ROAD_CAR_INPUT_FIX_020" index.html
          grep -q "sprite-road-car-input-fix-020" index.html

      - name: Commit patch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html assets/characters/main_detective assets/characters/npcs/partners/ramos docs/previews/sprites README_SPRITE_ROAD_CAR_INPUT_FIX.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Fix sprites collision and car input"
            git push
          fi
