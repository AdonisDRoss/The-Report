name: Import Malcolm Morning Start Patch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-malcolm-morning-start:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Find ZIP
        run: |
          ls -lah
          ZIP_FILE="$(ls -1 *malcolm*morning*start*.zip 2>/dev/null | head -n 1 || true)"
          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: Upload the_report_malcolm_morning_start.zip to repo root."
            exit 1
          fi
          echo "ZIP_FILE=$ZIP_FILE" >> "$GITHUB_ENV"
          echo "Using ZIP: $ZIP_FILE"

      - name: Unzip patch
        run: unzip -o "$ZIP_FILE"

      - name: Verify patch
        run: |
          test -f index.html
          test -f assets/interiors/malcolm_apartment/malcolm_apartment_morning_1499x1049.png
          test -f assets/interiors/kims_corner_market/kims_corner_market_clean_1254x1254.png
          test -f assets/characters/main_detective/malcolm_sleep_walk_4x8_96x96.png
          test -f assets/characters/main_detective/malcolm_sleeping_bed_4x1_192x128.png
          grep -q "MALCOLM_MORNING_START_PATCH_022" index.html
          grep -q "malcolm-morning-start-022" index.html

      - name: Commit patch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html assets/interiors assets/characters/main_detective docs/previews/interiors README_MALCOLM_MORNING_START.md
          if git diff --cached --quiet; then
            echo "No Malcolm morning start changes to commit."
          else
            git commit -m "Add Malcolm apartment morning start"
            git push
          fi
