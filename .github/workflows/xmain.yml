name: Import Chunk B Correct Nodes

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-chunk-b-nodes:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check ZIP
        run: |
          ls -lah
          test -f the_report_chunk_b_nodes_correct_side.zip

      - name: Unzip patch
        run: |
          unzip -o the_report_chunk_b_nodes_correct_side.zip

      - name: Verify files
        run: |
          test -f index.html
          test -f assets/city/chunks/east_market/raven_hook_chunk_b_east_market_2048.png
          test -f config/pathing/chunk_b_east_market_nodes.json
          grep -q "CHUNK_B_NODES_CORRECT_SIDE_PATCH_010" index.html
          grep -q "installChunkBNodesCorrectSidePatch010" index.html

      - name: Commit nodes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html assets/city/chunks/east_market config/pathing docs/map/east_market README_CHUNK_B_NODES_CORRECT_SIDE.md

          if git diff --cached --quiet; then
            echo "No node changes to commit."
          else
            git commit -m "Fix Chunk B vehicle and pedestrian nodes"
            git push
          fi
