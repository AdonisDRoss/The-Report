name: Import Chunk C Civic Center Split

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-chunk-c-split:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Find split ZIPs
        run: |
          ls -lah
          PART1="$(ls -1 *chunk*c*civic*center*part01*.zip 2>/dev/null | head -n 1 || true)"
          PART2="$(ls -1 *chunk*c*civic*center*part02*.zip 2>/dev/null | head -n 1 || true)"
          if [ -z "$PART1" ]; then
            echo "ERROR: Missing part 01 ZIP in repo root."
            echo "Upload: the_report_chunk_c_civic_center_part01_index_config_chunk.zip"
            exit 1
          fi
          if [ -z "$PART2" ]; then
            echo "ERROR: Missing part 02 ZIP in repo root."
            echo "Upload: the_report_chunk_c_civic_center_part02_world_base.zip"
            exit 1
          fi
          echo "PART1=$PART1" >> "$GITHUB_ENV"
          echo "PART2=$PART2" >> "$GITHUB_ENV"
          echo "Using PART1: $PART1"
          echo "Using PART2: $PART2"

      - name: Unzip part 01
        run: unzip -o "$PART1"

      - name: Unzip part 02
        run: unzip -o "$PART2"

      - name: Verify files
        run: |
          test -f index.html
          test -f assets/city/chunks/civic_center/raven_hook_chunk_c_civic_center_2048.png
          test -f assets/city/pages/raven_hook_world_abc_base_4096x4096.png
          test -f config/map/chunk_c_civic_center_manifest.json
          test -f config/pathing/chunk_c_civic_center_nodes.json
          grep -q "CHUNK_C_CIVIC_CENTER_GAME_READY_PATCH_015" index.html
          grep -q "raven_hook_world_abc_base_4096x4096" index.html

      - name: Commit Chunk C split import
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html assets/city/chunks/civic_center assets/city/pages config/map config/pathing docs/map/civic_center README_CHUNK_C_CIVIC_CENTER_GAME_READY.md README_CHUNK_C_SPLIT_PART01.txt README_CHUNK_C_SPLIT_PART02.txt
          if git diff --cached --quiet; then
            echo "No Chunk C split changes to commit."
          else
            git commit -m "Add Chunk C civic center"
            git push
          fi
